syntax = "proto3";

import "enum_e_error_code.proto";

package zproto;

message FishingResultReportReply {
	bool durabilityExhausted = 1 [json_name = "durabilityExhausted"];
	bool isBurst = 2 [json_name = "isBurst"];
	bool BaitExhausted = 3 [json_name = "BaitExhausted"];
	int32 size = 4 [json_name = "size"];
	bool sizeNewRecord = 5 [json_name = "sizeNewRecord"];
	EErrorCode errCode = 6 [json_name = "errCode"];
}
