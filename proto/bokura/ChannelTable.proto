syntax = "proto3";

import "table_basic.proto";

package bokura;

message ChannelTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Type = 673 [json_name = "Type"];
	mlstring ChannelName = 1563 [json_name = "ChannelName"];
	string ChannelStyle = 884 [json_name = "ChannelStyle"];
	int32 FunctionId = 149 [json_name = "FunctionId"];
	int_array SubFunctionId = 800 [json_name = "SubFunctionId"];
	int32 Sort = 1643 [json_name = "Sort"];
	string_array ChannelFunc = 794 [json_name = "ChannelFunc"];
}

message ChannelTableMgr {
	map<int32, ChannelTableBase> datas = 1 [json_name = "datas"];
}
