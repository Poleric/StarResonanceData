syntax = "proto3";

import "table_basic.proto";

package bokura;

message EquipEffectDetileTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 EffectLibID = 672 [json_name = "EffectLibID"];
	int32 LibType = 908 [json_name = "LibType"];
	int_array EquipPart = 1740 [json_name = "EquipPart"];
	int32 EffectType = 527 [json_name = "EffectType"];
	int32 EffectConfig = 110 [json_name = "EffectConfig"];
