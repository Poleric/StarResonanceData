syntax = "proto3";

import "table_basic.proto";

package bokura;

message FaceStickerTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int_array DefaultColor = 1931 [json_name = "DefaultColor"];
	int32 ColorId = 1137 [json_name = "ColorId"];
	int32 Back = 251 [json_name = "Back"];
	int32 Move = 1173 [json_name = "Move"];
	int32 Rotate = 1421 [json_name = "Rotate"];
	int32 Scale = 1925 [json_name = "Scale"];
	vector3 DefaultScale = 537 [json_name = "DefaultScale"];
	vector2 DefaultPosition = 1451 [json_name = "DefaultPosition"];
	float DefaultRotate = 1670 [json_name = "DefaultRotate"];
}

message FaceStickerTableMgr {
	map<int32, FaceStickerTableBase> datas = 1 [json_name = "datas"];
}
