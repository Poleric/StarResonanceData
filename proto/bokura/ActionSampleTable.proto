syntax = "proto3";

import "table_basic.proto";

package bokura;

message ActionSampleTableBase {
	int64 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	number_table MotionInfo = 264 [json_name = "MotionInfo"];
	bool HasMotion = 1733 [json_name = "HasMotion"];
}

message ActionSampleTableMgr {
	map<int64, ActionSampleTableBase> datas = 1 [json_name = "datas"];
}
