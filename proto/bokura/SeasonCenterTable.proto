syntax = "proto3";

package bokura;

message SeasonCenterTableBase {
	int32 FunctionId = 149 [json_name = "FunctionId"];
	string NameRemark = 1535 [json_name = "NameRemark"];
	int32 Sort = 1643 [json_name = "Sort"];
}

message SeasonCenterTableMgr {
	map<int32, SeasonCenterTableBase> datas = 1 [json_name = "datas"];
}
