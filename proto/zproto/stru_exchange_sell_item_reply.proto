syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_exchange_sell_item_data.proto";

package zproto;

message ExchangeSellItemReply {
	repeated ExchangeSellItemData items = 2 [json_name = "items"];
	map<uint32, uint32> withDrawItem = 3 [json_name = "withDrawItem"];
	int32 limit = 4 [json_name = "limit"];
	int32 rate = 5 [json_name = "rate"];
	EErrorCode errCode = 6 [json_name = "errCode"];
}
