syntax = "proto3";

import "table_basic.proto";

package bokura;

message TrapTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	int32 SkillId = 1087 [json_name = "SkillId"];
	int_array BuffIds = 1916 [json_name = "BuffIds"];
	float TriggerRange = 360 [json_name = "TriggerRange"];
	int32 AttributeId = 1825 [json_name = "AttributeId"];
	int32 ModelId = 555 [json_name = "ModelId"];
	int_array LifeInfo = 412 [json_name = "LifeInfo"];
	int_array Tags = 232 [json_name = "Tags"];
}

message TrapTableMgr {
	map<int32, TrapTableBase> datas = 1 [json_name = "datas"];
}
