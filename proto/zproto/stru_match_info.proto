syntax = "proto3";

import "enum_e_error_code.proto";
import "enum_e_match_status.proto";
import "stru_match_key_info.proto";
import "stru_match_player_info.proto";

package zproto;

message MatchInfo {
	EMatchStatus matchStatus = 2 [json_name = "matchStatus"];
	int64 matchTime = 3 [json_name = "matchTime"];
	map<int64, MatchPlayerInfo> matchPlayerInfo = 5 [json_name = "matchPlayerInfo"];
	string matchToken = 6 [json_name = "matchToken"];
	int64 matchReadyTime = 7 [json_name = "matchReadyTime"];
	MatchKeyInfo matchKeyInfo = 8 [json_name = "matchKeyInfo"];
	string matchGrainKey = 9 [json_name = "matchGrainKey"];
	EErrorCode errCode = 10 [json_name = "errCode"];
}
