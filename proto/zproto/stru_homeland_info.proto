syntax = "proto3";

import "stru_community_player_info.proto";
import "stru_home_land_clutter_generation_record.proto";
import "stru_home_land_clutter_info.proto";
import "stru_homeland_decoration_info.proto";
import "stru_structure.proto";
import "stru_structure_group_info.proto";

package zproto;

message HomelandInfo {
	int64 ownerCharId = 1 [json_name = "ownerCharId"];
	int64 homelandId = 2 [json_name = "homelandId"];
	int32 fieldId = 3 [json_name = "fieldId"];
	string name = 4 [json_name = "name"];
	int32 level = 5 [json_name = "level"];
	int64 exp = 6 [json_name = "exp"];
	int32 cleanliness = 7 [json_name = "cleanliness"];
	int64 lastsubtractcleanlinesstime = 8 [json_name = "lastsubtractcleanlinesstime"];
	HomeLandClutterInfo homeLandClutter = 9 [json_name = "homeLandClutter"];
	HomeLandClutterGenerationRecord homeLandClutterGenerationRecord = 10 [json_name = "homeLandClutterGenerationRecord"];
	map<int64, Structure> structures = 11 [json_name = "structures"];
	map<int64, StructureGroupInfo> groups = 12 [json_name = "groups"];
	map<int64, CommunityPlayerInfo> cohabitant = 13 [json_name = "cohabitant"];
	HomelandDecorationInfo outerDecorationInfo = 14 [json_name = "outerDecorationInfo"];
	HomelandDecorationInfo innerDecorationInfo = 15 [json_name = "innerDecorationInfo"];
	repeated int32 unlockedAreas = 16 [json_name = "unlockedAreas"];
	int32 HousingType = 17 [json_name = "HousingType"];
}
