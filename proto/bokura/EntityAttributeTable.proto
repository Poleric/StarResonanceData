syntax = "proto3";

import "table_basic.proto";

package bokura;

message EntityAttributeTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Comment = 11 [json_name = "Comment"];
	int32 Season = 620 [json_name = "Season"];
	int32 EquipLevel = 367 [json_name = "EquipLevel"];
	int32 EquipLevelVariate = 152 [json_name = "EquipLevelVariate"];
	int32 MaxHp = 439 [json_name = "MaxHp"];
	int32 Attack = 1316 [json_name = "Attack"];
	int32 Defense = 1973 [json_name = "Defense"];
	int32 IgnoreDefense = 868 [json_name = "IgnoreDefense"];
	int32 IgnoreDefensePCT = 860 [json_name = "IgnoreDefensePCT"];
	int32 FireDefense = 1414 [json_name = "FireDefense"];
	int32 WaterDefense = 1493 [json_name = "WaterDefense"];
	int32 WoodDefense = 1403 [json_name = "WoodDefense"];
	int32 ElectricityDefense = 2908 [json_name = "ElectricityDefense"];
	int32 WindDefense = 1184 [json_name = "WindDefense"];
	int32 RockDefense = 1140 [json_name = "RockDefense"];
	int32 LightDefense = 265 [json_name = "LightDefense"];
	int32 DarkDefense = 1796 [json_name = "DarkDefense"];
	int32 MaxStunned = 489 [json_name = "MaxStunned"];
	int32 MaxExtinction = 1165 [json_name = "MaxExtinction"];
	int32 CritResist = 1225 [json_name = "CritResist"];
	int_table MeterValue = 318 [json_name = "MeterValue"];
}

message EntityAttributeTableMgr {
	map<int32, EntityAttributeTableBase> datas = 1 [json_name = "datas"];
}
