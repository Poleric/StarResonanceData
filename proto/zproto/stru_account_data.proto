syntax = "proto3";

import "enum_system_type.proto";
import "stru_dirty_mask.proto";

package zproto;

message AccountData {
	string openId = 1 [json_name = "openId"];
	int32 sdkType = 2 [json_name = "sdkType"];
	string accountId = 3 [json_name = "accountId"];
	string accountUuid = 4 [json_name = "accountUuid"];
	SystemType os = 5 [json_name = "os"];
}
