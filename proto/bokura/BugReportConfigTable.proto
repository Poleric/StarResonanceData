syntax = "proto3";

package bokura;

message BugReportConfigTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 DataType = 682 [json_name = "DataType"];
	int32 DataIndex = 1373 [json_name = "DataIndex"];
	string DataValue = 569 [json_name = "DataValue"];
	string DataValue2 = 1651 [json_name = "DataValue2"];
	string Desc = 1953 [json_name = "Desc"];
}

message BugReportConfigTableMgr {
	map<int32, BugReportConfigTableBase> datas = 1 [json_name = "datas"];
}
