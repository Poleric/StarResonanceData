syntax = "proto3";

import "stru_game_table_data.proto";
import "stru_int_vec3.proto";
import "stru_structure_farmland_info.proto";
import "stru_structure_fashion_data.proto";
import "stru_structure_lamplight_info.proto";
import "stru_structure_material_info.proto";
import "stru_structure_sub_model_data.proto";
import "stru_vec4.proto";

package zproto;

message Structure {
	int64 uuid = 1 [json_name = "uuid"];
	int64 clientUuid = 2 [json_name = "clientUuid"];
	int64 groupId = 3 [json_name = "groupId"];
	int32 itemId = 4 [json_name = "itemId"];
	int64 charId = 5 [json_name = "charId"];
	IntVec3 position = 6 [json_name = "position"];
	Vec4 quaternion = 7 [json_name = "quaternion"];
	int64 operatorCharId = 8 [json_name = "operatorCharId"];
	string name = 9 [json_name = "name"];
	StructureMaterialInfo materialInfo = 10 [json_name = "materialInfo"];
	StructureLamplightInfo lamplightInfo = 11 [json_name = "lamplightInfo"];
	StructureFarmlandInfo farmlandInfo = 12 [json_name = "farmlandInfo"];
	StructureFashionData fashionData = 13 [json_name = "fashionData"];
	StructureSubModelData subModelData = 14 [json_name = "subModelData"];
	GameTableData gameTableData = 15 [json_name = "gameTableData"];
}
