syntax = "proto3";

import "stru_homeland_lamplight_info.proto";
import "stru_homeland_material_info.proto";

package zproto;

message HomelandDecorationInfo {
	HomelandLamplightInfo lamplightInfo = 1 [json_name = "lamplightInfo"];
	map<int32, HomelandMaterialInfo> materialInfos = 2 [json_name = "materialInfos"];
}
