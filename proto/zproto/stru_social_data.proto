package zproto;

message SocialData {
	int64 charId = 1 [json_name = "charId"];
	string accountId = 2 [json_name = "accountId"];
	BasicData basicData = 3 [json_name = "basicData"];
	AvatarInfo avatarInfo = 4 [json_name = "avatarInfo"];
	FaceData faceData = 5 [json_name = "faceData"];
	ProfessionData professionData = 6 [json_name = "professionData"];
	EquipData equipData = 7 [json_name = "equipData"];
	FashionData fashionData = 8 [json_name = "fashionData"];
	SettingData settingData = 9 [json_name = "settingData"];
	SceneData sceneData = 10 [json_name = "sceneData"];
	UserAttrData userAttrData = 11 [json_name = "userAttrData"];
	CharTeam teamData = 12 [json_name = "teamData"];
	UnionData unionData = 13 [json_name = "unionData"];
	AccountData accountData = 14 [json_name = "accountData"];
	FunctionData functionData = 15 [json_name = "functionData"];
	PersonalZone personalZone = 16 [json_name = "personalZone"];
	WarehouseData warehouse = 17 [json_name = "warehouse"];
	SeasonRankData seasonRank = 18 [json_name = "seasonRank"];
	FishSocialData fishData = 19 [json_name = "fishData"];
	CommunityData communityData = 20 [json_name = "communityData"];
	PrivilegeData privilegeData = 21 [json_name = "privilegeData"];
	MasterModeDungeonData masterModeDungeonData = 22 [json_name = "masterModeDungeonData"];
}
