syntax = "proto3";

import "table_basic.proto";

package bokura;

message EntityStandardAttrTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Season = 620 [json_name = "Season"];
	int32 EquipLevel = 367 [json_name = "EquipLevel"];
	int_table MaxHp = 439 [json_name = "MaxHp"];
	int_table Attack = 1316 [json_name = "Attack"];
	int32 BodyPartMaxHp = 482 [json_name = "BodyPartMaxHp"];
}

message EntityStandardAttrTableMgr {
	map<int32, EntityStandardAttrTableBase> datas = 1 [json_name = "datas"];
}
