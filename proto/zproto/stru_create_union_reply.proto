syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_union_info.proto";
import "stru_user_summary_data.proto";

package zproto;

message CreateUnionReply {
	int64 nextJoinTime = 1 [json_name = "nextJoinTime"];
	UnionInfo info = 2 [json_name = "info"];
	UserSummaryData presidentInfo = 3 [json_name = "presidentInfo"];
	EErrorCode errCode = 4 [json_name = "errCode"];
}
