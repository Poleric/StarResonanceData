syntax = "proto3";

import "table_basic.proto";

package bokura;

message FashionTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Type = 673 [json_name = "Type"];
	int32 SortID = 504 [json_name = "SortID"];
	string Model = 421 [json_name = "Model"];
	string_table Model2 = 1679 [json_name = "Model2"];
	string ModelId = 555 [json_name = "ModelId"];
	int32 FashionType = 397 [json_name = "FashionType"];
	int_array HidePart = 471 [json_name = "HidePart"];
	int_array HairId = 650 [json_name = "HairId"];
	int_table DefaultColor = 1931 [json_name = "DefaultColor"];
	int_array ColorPart = 539 [json_name = "ColorPart"];
	int32 ColorGroupId = 1091 [json_name = "ColorGroupId"];
	int32 IsHide = 1851 [json_name = "IsHide"];
	int32 ArmLength = 1431 [json_name = "ArmLength"];
	int32 ArmWidth = 1263 [json_name = "ArmWidth"];
	int32 WaistLength = 1949 [json_name = "WaistLength"];
	int32 WaistWidth = 1480 [json_name = "WaistWidth"];
	int32 LegLength = 538 [json_name = "LegLength"];
	int32 LegWidth = 1990 [json_name = "LegWidth"];
	string SwitchName = 227 [json_name = "SwitchName"];
	int32 HeadwearType = 528 [json_name = "HeadwearType"];
}

message FashionTableMgr {
	map<int32, FashionTableBase> datas = 1 [json_name = "datas"];
}
