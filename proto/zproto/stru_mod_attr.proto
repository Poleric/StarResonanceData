syntax = "proto3";

import "stru_mod_attr_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message ModAttr {
	int32 loadFlag = 1 [json_name = "loadFlag"];
	int32 type = 2 [json_name = "type"];
	int32 level = 3 [json_name = "level"];
	repeated ModAttrInfo modAttrInfo = 4 [json_name = "modAttrInfo"];
}
