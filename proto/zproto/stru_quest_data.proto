syntax = "proto3";

import "enum_e_quest_step_status.proto";
import "stru_dirty_mask.proto";

package zproto;

message QuestData {
	uint32 id = 1 [json_name = "id"];
	uint32 stepId = 2 [json_name = "stepId"];
	uint32 state = 3 [json_name = "state"];
	map<int32, int32> targetNum = 4 [json_name = "targetNum"];
	map<int32, int32> targetMaxNum = 5 [json_name = "targetMaxNum"];
	int64 stepLimitTime = 6 [json_name = "stepLimitTime"];
	EQuestStepStatus stepStatus = 7 [json_name = "stepStatus"];
	uint32 addLimitTime = 8 [json_name = "addLimitTime"];
	map<int32, int32> targetType = 9 [json_name = "targetType"];
}
