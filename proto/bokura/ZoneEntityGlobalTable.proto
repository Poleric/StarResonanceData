syntax = "proto3";

import "table_basic.proto";

package bokura;

message ZoneEntityGlobalTableBase {
	int32 UId = 2028 [json_name = "UId"];
	number_array Position = 686 [json_name = "Position"];
	float Rotation = 783 [json_name = "Rotation"];
	string OptionData = 853 [json_name = "OptionData"];
	number_array ZoneParam = 444 [json_name = "ZoneParam"];
	int32 SourceType = 380 [json_name = "SourceType"];
}

message ZoneEntityGlobalTableMgr {
	map<int32, ZoneEntityGlobalTableBase> datas = 1 [json_name = "datas"];
}
