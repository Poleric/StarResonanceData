syntax = "proto3";

import "table_basic.proto";

package bokura;

message ModDecomposeTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 ModLvl = 395 [json_name = "ModLvl"];
	int32 ModType = 34 [json_name = "ModType"];
	int_table ModDecomposeA = 1033 [json_name = "ModDecomposeA"];
	int_table ModDecomposeB = 81 [json_name = "ModDecomposeB"];
}

message ModDecomposeTableMgr {
	map<int32, ModDecomposeTableBase> datas = 1 [json_name = "datas"];
}
