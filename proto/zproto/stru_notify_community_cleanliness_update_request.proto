syntax = "proto3";

package zproto;

message NotifyCommunityCleanlinessUpdateRequest {
	int32 newCleanliness = 1 [json_name = "newCleanliness"];
	int64 newLastSubtractCleanlinessSec = 2 [json_name = "newLastSubtractCleanlinessSec"];
	int32 oldCleanliness = 3 [json_name = "oldCleanliness"];
	int32 actualSubtract = 4 [json_name = "actualSubtract"];
}
