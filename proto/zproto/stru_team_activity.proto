syntax = "proto3";

import "stru_assign_scene_params.proto";
import "enum_e_team_activity_state.proto";
import "enum_e_team_activity_type.proto";
import "stru_team_activity_dungeon_info.proto";
import "stru_team_dungeon_key_info.proto";

package zproto;

message TeamActivity {
	uint32 activityId = 1 [json_name = "activityId"];
	ETeamActivityState state = 2 [json_name = "state"];
	int64 time = 3 [json_name = "time"];
	TeamActivityDungeonInfo dungeonInfo = 4 [json_name = "dungeonInfo"];
	repeated int64 agreeMem = 5 [json_name = "agreeMem"];
	repeated int64 checkMembers = 6 [json_name = "checkMembers"];
	int64 refuseId = 7 [json_name = "refuseId"];
	AssignSceneParams assignSceneParams = 8 [json_name = "assignSceneParams"];
	map<int64, TeamDungeonKeyInfo> awardCountInfo = 9 [json_name = "awardCountInfo"];
	ETeamActivityType activityType = 10 [json_name = "activityType"];
}
