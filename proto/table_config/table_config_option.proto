syntax = "proto3";

import "google/protobuf/descriptor.proto";

package table_config;

extend google.protobuf.MessageOptions {
	MessageTable msg_table = 70000 [json_name = "msgTable"];
}

extend google.protobuf.FieldOptions {
	TableConfigFieldOption field_option = 70100 [json_name = "fieldOption"];
}

message MessageTable {
	string msg_type = 1 [json_name = "msgType"];
	repeated string pbs_path = 2 [json_name = "pbsPath"];
}

message SecondaryKey {
	int32 id = 1 [json_name = "id"];
	int32 index = 2 [json_name = "index"];
}

message TableConfigFieldOption {
	bool primary_key = 1 [json_name = "primaryKey"];
	bool non_unique = 2 [json_name = "nonUnique"];
	repeated SecondaryKey secondary_keys = 3 [json_name = "secondaryKeys"];
}
