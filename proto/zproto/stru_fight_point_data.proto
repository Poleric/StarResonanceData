syntax = "proto3";

import "stru_fight_point_sub_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message FightPointData {
	int32 functionType = 1 [json_name = "functionType"];
	int32 totalPoint = 2 [json_name = "totalPoint"];
	int32 point = 3 [json_name = "point"];
	map<int32, FightPointSubData> subFunctionData = 4 [json_name = "subFunctionData"];
}
