syntax = "proto3";

import "stru_social_data.proto";

package zproto;

message AccountInfo {
	string accountId = 1 [json_name = "accountId"];
	string openId = 2 [json_name = "openId"];
	repeated SocialData chars = 3 [json_name = "chars"];
	string token = 5 [json_name = "token"];
	int64 restrictTime = 6 [json_name = "restrictTime"];
	map<int64, int64> deleteCharIdsLeftTime = 7 [json_name = "deleteCharIdsLeftTime"];
	uint32 banReason = 8 [json_name = "banReason"];
}
