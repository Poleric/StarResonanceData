syntax = "proto3";

import "stru_affix_data.proto";
import "enum_e_item_bind_flag.proto";
import "stru_equip_attr.proto";
import "stru_item_extend_data.proto";
import "stru_mod_attr.proto";
import "stru_mod_new_attr.proto";
import "stru_dirty_mask.proto";

package zproto;

message Item {
	int64 uuid = 1 [json_name = "uuid"];
	int32 configId = 2 [json_name = "configId"];
	int64 count = 3 [json_name = "count"];
	int32 invalid = 4 [json_name = "invalid"];
	EItemBindFlag bindFlag = 5 [json_name = "bindFlag"];
	int64 createTime = 6 [json_name = "createTime"];
	int64 expireTime = 7 [json_name = "expireTime"];
	int32 optSrc = 8 [json_name = "optSrc"];
	int32 quality = 9 [json_name = "quality"];
	EquipAttr equipAttr = 10 [json_name = "equipAttr"];
	ModAttr modAttr = 11 [json_name = "modAttr"];
	int64 coolDownExpireTime = 12 [json_name = "coolDownExpireTime"];
	ModNewAttr modNewAttr = 13 [json_name = "modNewAttr"];
	AffixData affixData = 14 [json_name = "affixData"];
	map<int32, ItemExtendData> extendAttr = 15 [json_name = "extendAttr"];
	int32 rewardId = 16 [json_name = "rewardId"];
	map<int32, int32> geneSequence = 17 [json_name = "geneSequence"];
	int32 geneSource = 18 [json_name = "geneSource"];
	bool locked = 19 [json_name = "locked"];
}
