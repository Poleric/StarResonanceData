syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_season_dungeon_affix.proto";

package zproto;

message GetSeasonDungeonListReply {
	repeated uint32 dungeonIdList = 2 [json_name = "dungeonIdList"];
	map<uint32, SeasonDungeonAffix> dungeonAffixes = 3 [json_name = "dungeonAffixes"];
	EErrorCode errCode = 4 [json_name = "errCode"];
}
