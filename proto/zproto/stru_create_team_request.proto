syntax = "proto3";

import "enum_e_team_member_type.proto";

package zproto;

message CreateTeamRequest {
	int64 charId = 2 [json_name = "charId"];
	uint32 targetId = 3 [json_name = "targetId"];
	bool isAutoMatch = 4 [json_name = "isAutoMatch"];
	bool isShowInHall = 5 [json_name = "isShowInHall"];
	ETeamMemberType teamMemberType = 6 [json_name = "teamMemberType"];
}
