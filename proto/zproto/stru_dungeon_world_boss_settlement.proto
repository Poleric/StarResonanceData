syntax = "proto3";

import "stru_dungeon_award.proto";
import "stru_dungeon_boss_rank.proto";
import "stru_dirty_mask.proto";

package zproto;

message DungeonWorldBossSettlement {
	int32 bossHpPercent = 1 [json_name = "bossHpPercent"];
	DungeonBossRank dungeonBossRank = 2 [json_name = "dungeonBossRank"];
	map<int64, DungeonAward> award = 3 [json_name = "award"];
	map<int64, DungeonAward> bossRankAward = 4 [json_name = "bossRankAward"];
	map<int64, DungeonAward> lastHitAward = 5 [json_name = "lastHitAward"];
}
