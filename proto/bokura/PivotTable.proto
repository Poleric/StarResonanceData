syntax = "proto3";

import "table_basic.proto";

package bokura;

message PivotTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int32 MapID = 175 [json_name = "MapID"];
	mlstring AreaName = 1408 [json_name = "AreaName"];
	int_array SettingOffNum = 162 [json_name = "SettingOffNum"];
	int_array CirculateAward = 1952 [json_name = "CirculateAward"];
	string PivotPic = 274 [json_name = "PivotPic"];
	int32 PivotArea = 1354 [json_name = "PivotArea"];
	int32 CameraId = 472 [json_name = "CameraId"];
}

message PivotTableMgr {
	map<int32, PivotTableBase> datas = 1 [json_name = "datas"];
}
