syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_show_team.proto";

package zproto;

message GetNearTeamListReply {
	repeated ShowTeam teamList = 1 [json_name = "teamList"];
	bool isRefresh = 2 [json_name = "isRefresh"];
	int32 memberCount = 4 [json_name = "memberCount"];
	bool IgnoreSelfTalent = 5 [json_name = "IgnoreSelfTalent"];
	EErrorCode errCode = 6 [json_name = "errCode"];
}
