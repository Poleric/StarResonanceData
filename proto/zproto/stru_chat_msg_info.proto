syntax = "proto3";

import "stru_chat_hypertext.proto";
import "stru_chat_multi_lang_notice.proto";
import "stru_chat_picture_emoji.proto";
import "stru_chat_voice.proto";
import "enum_chit_chat_msg_type.proto";

package zproto;

message ChatMsgInfo {
	ChitChatMsgType msgType = 1 [json_name = "msgType"];
	int64 targetId = 2 [json_name = "targetId"];
	string msgText = 3 [json_name = "msgText"];
	ChatMultiLangNotice multiLangNotice = 4 [json_name = "multiLangNotice"];
	ChatPictureEmoji pictureEmoji = 5 [json_name = "pictureEmoji"];
	ChatVoice voice = 6 [json_name = "voice"];
	ChatHypertext chatHypertext = 7 [json_name = "chatHypertext"];
}
