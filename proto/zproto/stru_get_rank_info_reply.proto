syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_fish_rank_list.proto";

package zproto;

message GetRankInfoReply {
	int32 fishId = 1 [json_name = "fishId"];
	int32 fishRankType = 2 [json_name = "fishRankType"];
	FishRankList rankList = 3 [json_name = "rankList"];
	EErrorCode errCode = 4 [json_name = "errCode"];
}
