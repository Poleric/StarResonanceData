import "stru_sync_language_request.proto";
import "stru_take_award_by_cd_key_request.proto";
import "stru_upload_face_success_request.proto";

package zproto;

message GrpcCharactor {
	message Login_Ret {
		LoginReply ret = 1 [json_name = "ret"];
	}

	message Login {
		LoginRequest vRequest = 1 [json_name = "vRequest"];
	}

	message CreateChar_Ret {
		CreateCharReply ret = 1 [json_name = "ret"];
	}

	message CreateChar {
		CreateCharRequest vRequest = 1 [json_name = "vRequest"];
	}

	message SelectChar_Ret {
		SelectCharReply ret = 1 [json_name = "ret"];
	}

	message SelectChar {
		SelectCharRequest vRequest = 1 [json_name = "vRequest"];
	}

	message DeleteChar_Ret {
		DeleteCharReply ret = 1 [json_name = "ret"];
	}

	message DeleteChar {
		DeleteCharRequest vRequest = 1 [json_name = "vRequest"];
	}

	message Reconnect_Ret {
		ReconnectReply ret = 1 [json_name = "ret"];
	}

	message Reconnect {
		ReconnectRequest vRequest = 1 [json_name = "vRequest"];
	}

	message ExitGame {
		ExitGameRequest vRequest = 1 [json_name = "vRequest"];
	}

	message ReportMSdk_Ret {
		EErrorCode ret = 1 [json_name = "ret"];
	}

	message ReportMSdk {
		ReportMSdkRequest vRequest = 1 [json_name = "vRequest"];
	}

	message GetFaceUpToken {
		GetFaceUpTokenRequest vRequest = 1 [json_name = "vRequest"];
