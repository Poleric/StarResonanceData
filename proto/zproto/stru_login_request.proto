syntax = "proto3";

import "stru_device_info.proto";
import "stru_launch_param.proto";

package zproto;

message LoginRequest {
	string openId = 2 [json_name = "openId"];
	string token = 3 [json_name = "token"];
	int32 sdkType = 4 [json_name = "sdkType"];
	int32 channelId = 5 [json_name = "channelId"];
	int32 os = 6 [json_name = "os"];
	int32 platformType = 7 [json_name = "platformType"];
	DeviceInfo deviceInfo = 8 [json_name = "deviceInfo"];
	string clientVersion = 9 [json_name = "clientVersion"];
	string protocolVersion = 10 [json_name = "protocolVersion"];
	string configVersion = 11 [json_name = "configVersion"];
	int32 areaId = 12 [json_name = "areaId"];
	string iOSAdServiceToken = 13 [json_name = "iOSAdServiceToken"];
	string payExtData = 14 [json_name = "payExtData"];
	string clientResourceVersion = 15 [json_name = "clientResourceVersion"];
	LaunchParam launchParam = 18 [json_name = "launchParam"];
	string areaIdToken = 19 [json_name = "areaIdToken"];
	bool isCloudGame = 20 [json_name = "isCloudGame"];
	string distinctID = 21 [json_name = "distinctID"];
	repeated string boundProviders = 22 [json_name = "boundProviders"];
	int32 language = 23 [json_name = "language"];
	string gclid = 24 [json_name = "gclid"];
	bool unsafeContainerSyncMode = 25 [json_name = "unsafeContainerSyncMode"];
}
