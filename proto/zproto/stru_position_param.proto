syntax = "proto3";

import "stru_cut_scene_point_info.proto";
import "stru_scene_point_info.proto";
import "stru_scene_pos_id_info.proto";

package zproto;

message PositionParam {
	ScenePointInfo scenePointInfo = 2 [json_name = "scenePointInfo"];
	ScenePosIdInfo scenePosInfo = 3 [json_name = "scenePosInfo"];
	CutScenePointInfo cutScenePointInfo = 4 [json_name = "cutScenePointInfo"];
}
