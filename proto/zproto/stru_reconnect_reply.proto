syntax = "proto3";

import "enum_e_error_code.proto";

package zproto;

message ReconnectReply {
	string accountId = 1 [json_name = "accountId"];
	int64 charId = 2 [json_name = "charId"];
	bool isPrivilege = 3 [json_name = "isPrivilege"];
	bool isChangeAccount = 4 [json_name = "isChangeAccount"];
	EErrorCode errCode = 5 [json_name = "errCode"];
}
