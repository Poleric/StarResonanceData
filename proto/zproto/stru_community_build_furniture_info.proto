syntax = "proto3";

import "stru_item.proto";

package zproto;

message CommunityBuildFurnitureInfo {
	int64 buildUuid = 1 [json_name = "buildUuid"];
	int32 furnitureId = 2 [json_name = "furnitureId"];
	int32 furnitureCount = 3 [json_name = "furnitureCount"];
	int64 charId = 4 [json_name = "charId"];
	int64 startTime = 5 [json_name = "startTime"];
	int64 endTime = 6 [json_name = "endTime"];
	int32 accelerateCount = 7 [json_name = "accelerateCount"];
	map<int32, int32> accelerateItems = 8 [json_name = "accelerateItems"];
	repeated Item consumeItems = 9 [json_name = "consumeItems"];
}
