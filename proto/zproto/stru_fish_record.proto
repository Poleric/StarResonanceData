syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message FishRecord {
	int32 fishId = 1 [json_name = "fishId"];
	bool firstFlag = 2 [json_name = "firstFlag"];
	int32 size = 3 [json_name = "size"];
	int64 millisecond = 4 [json_name = "millisecond"];
	int32 research = 5 [json_name = "research"];
	uint32 count = 6 [json_name = "count"];
	int32 minSize = 7 [json_name = "minSize"];
	int64 minSizemillisecond = 8 [json_name = "minSizemillisecond"];
	map<int32, int64> starCnts = 9 [json_name = "starCnts"];
}
