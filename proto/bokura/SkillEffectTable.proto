syntax = "proto3";

import "table_basic.proto";

package bokura;

message SkillEffectTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Level = 1120 [json_name = "Level"];
	string Name = 439 [json_name = "Name"];
	int32 SkillId = 1087 [json_name = "SkillId"];
	float SkillDamageDistance = 1280 [json_name = "SkillDamageDistance"];
	number_array EffectRange = 1488 [json_name = "EffectRange"];
	number_array AiReleaseSkillRange = 2036 [json_name = "AiReleaseSkillRange"];
	int_array CoolTimeOnBattleStart = 1082 [json_name = "CoolTimeOnBattleStart"];
	int32 UseRandomCoolTime = 682 [json_name = "UseRandomCoolTime"];
	number_array RandomPVECoolTime = 1917 [json_name = "RandomPVECoolTime"];
	int_array Tags = 232 [json_name = "Tags"];
	int_table BuffTags = 106 [json_name = "BuffTags"];
	int_table HitTags = 1006 [json_name = "HitTags"];
	int_table EntityTags = 427 [json_name = "EntityTags"];
	mlstring_table SkillAttrDes = 1260 [json_name = "SkillAttrDes"];
	float MaxHorizontalMotionDis = 142 [json_name = "MaxHorizontalMotionDis"];
	float STRange = 1244 [json_name = "STRange"];
	float STAngle = 29 [json_name = "STAngle"];
	float STSphereRange = 1049 [json_name = "STSphereRange"];
	bool IsInBattleState = 901 [json_name = "IsInBattleState"];
	bool TakeWeaponInSkill = 539 [json_name = "TakeWeaponInSkill"];
	bool NeedScaleCamera = 225 [json_name = "NeedScaleCamera"];
	int_array SkillLearnBuffs = 363 [json_name = "SkillLearnBuffs"];
}

message SkillEffectTableMgr {
	map<int32, SkillEffectTableBase> datas = 1 [json_name = "datas"];
}
