syntax = "proto3";

import "table_basic.proto";

package bokura;

message GuideTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Priority = 1712 [json_name = "Priority"];
	int32 GuideGroup = 1642 [json_name = "GuideGroup"];
	int_array ShowConditionType = 1621 [json_name = "ShowConditionType"];
	string ShowConditionValue = 1389 [json_name = "ShowConditionValue"];
	bool CheckCompletion = 1533 [json_name = "CheckCompletion"];
	string TriggerConditionType = 14 [json_name = "TriggerConditionType"];
	string TriggerConditionValue = 303 [json_name = "TriggerConditionValue"];
	string CompletionConditionType = 1075 [json_name = "CompletionConditionType"];
	string CompletionConditionValue = 1630 [json_name = "CompletionConditionValue"];
	int32 AutoCompleteTime = 1693 [json_name = "AutoCompleteTime"];
	bool IsShowUIFrame = 1167 [json_name = "IsShowUIFrame"];
	mlstring TextAround = 1939 [json_name = "TextAround"];
	int_array TextShowDirection = 1908 [json_name = "TextShowDirection"];
	mlstring TextMiddle = 782 [json_name = "TextMiddle"];
	int_array KeyboardId = 246 [json_name = "KeyboardId"];
	string UIView = 1534 [json_name = "UIView"];
	bool IsBlack = 965 [json_name = "IsBlack"];
	int32 ShowHelplibraryId = 464 [json_name = "ShowHelplibraryId"];
	string_array DynamicUI = 1636 [json_name = "DynamicUI"];
}

message GuideTableMgr {
	map<int32, GuideTableBase> datas = 1 [json_name = "datas"];
}
