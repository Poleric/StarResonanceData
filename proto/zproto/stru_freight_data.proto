syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message FreightData {
	int64 refreshTime = 1 [json_name = "refreshTime"];
	int32 goodsValue = 2 [json_name = "goodsValue"];
	bool setOff = 3 [json_name = "setOff"];
	bool canReceive = 4 [json_name = "canReceive"];
	repeated int32 upGoodsList = 5 [json_name = "upGoodsList"];
	repeated int32 keepGoodsList = 6 [json_name = "keepGoodsList"];
	repeated int32 downGoodsList = 7 [json_name = "downGoodsList"];
	int64 canRewardTime = 8 [json_name = "canRewardTime"];
}
