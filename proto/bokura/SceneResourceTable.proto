syntax = "proto3";

package bokura;

message SceneResourceTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 SceneLoadType = 1292 [json_name = "SceneLoadType"];
	string SceneFile = 1293 [json_name = "SceneFile"];
}

message SceneResourceTableMgr {
	map<int32, SceneResourceTableBase> datas = 1 [json_name = "datas"];
}
