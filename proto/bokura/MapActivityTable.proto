syntax = "proto3";

import "table_basic.proto";

package bokura;

message MapActivityTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int_array Scene = 1438 [json_name = "Scene"];
	string Icon = 1153 [json_name = "Icon"];
	int32 FunctionId = 149 [json_name = "FunctionId"];
	int32 RedDotId = 754 [json_name = "RedDotId"];
}

message MapActivityTableMgr {
	map<int32, MapActivityTableBase> datas = 1 [json_name = "datas"];
}
