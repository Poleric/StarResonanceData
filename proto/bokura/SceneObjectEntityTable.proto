	float RefreshRangeMax = 1572 [json_name = "RefreshRangeMax"];
	bool MultiPointsRefresh = 1408 [json_name = "MultiPointsRefresh"];
	number_array RefreshPoints = 1121 [json_name = "RefreshPoints"];
	float RefreshTimeMin = 514 [json_name = "RefreshTimeMin"];
	float RefreshTimeMax = 895 [json_name = "RefreshTimeMax"];
