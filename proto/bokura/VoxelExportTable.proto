syntax = "proto3";

import "table_basic.proto";

package bokura;

message VoxelExportTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	string SceneFilePath = 1595 [json_name = "SceneFilePath"];
	number_array CubePosition = 837 [json_name = "CubePosition"];
	number_array ColliderSize = 987 [json_name = "ColliderSize"];
	bool HasTerrain = 635 [json_name = "HasTerrain"];
	string TerrainFilePath = 1538 [json_name = "TerrainFilePath"];
}

message VoxelExportTableMgr {
	map<int32, VoxelExportTableBase> datas = 1 [json_name = "datas"];
}
