syntax = "proto3";

import "table_basic.proto";

package bokura;

message DialogueCameraTableBase {
	int64 Id = 1463 [json_name = "Id"];
	string comment = 1030 [json_name = "comment"];
	int_array TemplateIds = 1931 [json_name = "TemplateIds"];
	int32 AimTargetCharacter = 1134 [json_name = "AimTargetCharacter"];
	string AimPoint = 950 [json_name = "AimPoint"];
}

message DialogueCameraTableMgr {
	map<int64, DialogueCameraTableBase> datas = 1 [json_name = "datas"];
}
