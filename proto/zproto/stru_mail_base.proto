syntax = "proto3";

import "stru_item.proto";
import "stru_mail_extra_condition.proto";
import "stru_mail_multilingual_text.proto";
import "enum_mail_state.proto";
import "enum_mail_type.proto";

package zproto;

message MailBase {
	int64 mailUuid = 1 [json_name = "mailUuid"];
	uint32 mailConfigId = 2 [json_name = "mailConfigId"];
	int64 createTime = 3 [json_name = "createTime"];
	MailType mailType = 4 [json_name = "mailType"];
	int64 sendId = 5 [json_name = "sendId"];
	string sendName = 6 [json_name = "sendName"];
	string mailTitle = 7 [json_name = "mailTitle"];
	string mailBody = 8 [json_name = "mailBody"];
	int64 timeoutMs = 9 [json_name = "timeoutMs"];
	repeated Item appendix = 10 [json_name = "appendix"];
	MailState mailState = 11 [json_name = "mailState"];
	repeated string titlePrams = 12 [json_name = "titlePrams"];
	repeated string bodyPrams = 13 [json_name = "bodyPrams"];
	int64 acceptId = 14 [json_name = "acceptId"];
	uint32 importance = 15 [json_name = "importance"];
	repeated uint32 awardIds = 16 [json_name = "awardIds"];
	int64 RegisterBeforeTime = 17 [json_name = "RegisterBeforeTime"];
	MailExtraCondition condition = 18 [json_name = "condition"];
	bool isCollect = 19 [json_name = "isCollect"];
	repeated MailMultilingualText multilingualText = 20 [json_name = "multilingualText"];
}
