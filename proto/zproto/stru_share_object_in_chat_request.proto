syntax = "proto3";

import "enum_chit_chat_channel_type.proto";
import "enum_share_object_type.proto";

package zproto;

message ShareObjectInChatRequest {
	ChitChatChannelType channelType = 1 [json_name = "channelType"];
	ShareObjectType objectType = 2 [json_name = "objectType"];
	int64 objectUuId = 3 [json_name = "objectUuId"];
	string beforeDesc = 4 [json_name = "beforeDesc"];
	string afterDesc = 5 [json_name = "afterDesc"];
	int64 targetCharId = 6 [json_name = "targetCharId"];
	repeated int64 paramList = 7 [json_name = "paramList"];
}
