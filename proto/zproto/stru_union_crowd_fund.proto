syntax = "proto3";

package zproto;

message UnionCrowdFund {
	int64 fundBeginTime = 1 [json_name = "fundBeginTime"];
	map<int32, int64> fundPosCharId = 2 [json_name = "fundPosCharId"];
	int64 buildEndTime = 3 [json_name = "buildEndTime"];
	bool buildingFinished = 4 [json_name = "buildingFinished"];
	bool fundHasBegin = 5 [json_name = "fundHasBegin"];
}
