syntax = "proto3";

import "table_basic.proto";

package bokura;

message MonsterExploreTableBase {
	int32 MonsterId = 1262 [json_name = "MonsterId"];
	int32 Scene = 1438 [json_name = "Scene"];
	int32 Sort = 1643 [json_name = "Sort"];
	int_table Target = 1340 [json_name = "Target"];
	int32 UnlockAward = 1745 [json_name = "UnlockAward"];
	float ModelRetio = 941 [json_name = "ModelRetio"];
	mlstring Condition = 1634 [json_name = "Condition"];
}

message MonsterExploreTableMgr {
	map<int32, MonsterExploreTableBase> datas = 1 [json_name = "datas"];
}
