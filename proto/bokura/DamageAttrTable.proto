syntax = "proto3";

import "table_basic.proto";

package bokura;

message DamageAttrTableBase {
	int64 Id = 1463 [json_name = "Id"];
	int32 Level = 1120 [json_name = "Level"];
	string Name = 439 [json_name = "Name"];
	int32 DamageType = 1478 [json_name = "DamageType"];
	int32 TypeEnum = 445 [json_name = "TypeEnum"];
	string DamageScript = 1550 [json_name = "DamageScript"];
	int_array PVEDamageRadio = 612 [json_name = "PVEDamageRadio"];
	int_array PVEFixedParameter = 438 [json_name = "PVEFixedParameter"];
	int32 PVELoopTime = 664 [json_name = "PVELoopTime"];
	int_array PVEStunnedDamage = 1016 [json_name = "PVEStunnedDamage"];
	int32 PVEExtinctionDamage = 1078 [json_name = "PVEExtinctionDamage"];
	int_array PartDamageRadio = 1042 [json_name = "PartDamageRadio"];
	int_table AbnormalDamage = 1810 [json_name = "AbnormalDamage"];
	int32 DamageProperty = 1278 [json_name = "DamageProperty"];
	int32 PartDamageType = 453 [json_name = "PartDamageType"];
	number_array DamageWeight = 1615 [json_name = "DamageWeight"];
	int_array Tags = 232 [json_name = "Tags"];
	bool BehitLightIsOpen = 1780 [json_name = "BehitLightIsOpen"];
}

message DamageAttrTableMgr {
	map<int64, DamageAttrTableBase> datas = 1 [json_name = "datas"];
}
