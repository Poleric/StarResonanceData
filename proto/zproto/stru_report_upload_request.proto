syntax = "proto3";

import "enum_e_report_category_type.proto";
import "enum_e_report_reason_type.proto";
import "enum_e_report_scene_type.proto";
import "stru_report_base_info.proto";
import "stru_report_chat.proto";
import "stru_report_home.proto";
import "stru_report_picture.proto";
import "stru_report_union.proto";

package zproto;

message ReportUploadRequest {
	EReportSceneType sceneType = 1 [json_name = "sceneType"];
	EReportCategoryType categoryType = 2 [json_name = "categoryType"];
	repeated EReportReasonType reasonType = 3 [json_name = "reasonType"];
	string reportDesc = 4 [json_name = "reportDesc"];
	ReportBaseInfo reportBaseInfo = 5 [json_name = "reportBaseInfo"];
	ReportChat reportChat = 6 [json_name = "reportChat"];
	ReportPicture reportPicture = 7 [json_name = "reportPicture"];
	ReportUnion reportUnion = 8 [json_name = "reportUnion"];
	ReportHome reportHome = 9 [json_name = "reportHome"];
}
