syntax = "proto3";

import "table_basic.proto";

package bokura;

message BattlePassCardTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 BattlePassCardId = 635 [json_name = "BattlePassCardId"];
	int32 SeasonLevel = 719 [json_name = "SeasonLevel"];
	int32 SeasonExp = 1230 [json_name = "SeasonExp"];
	int_array FreeAward = 1375 [json_name = "FreeAward"];
	int_array PaidAward = 1100 [json_name = "PaidAward"];
	int32 KeyAward = 1219 [json_name = "KeyAward"];
}

message BattlePassCardTableMgr {
	map<int32, BattlePassCardTableBase> datas = 1 [json_name = "datas"];
}
