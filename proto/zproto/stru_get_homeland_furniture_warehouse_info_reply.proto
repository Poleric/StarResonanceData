syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_home_land_item_instance.proto";

package zproto;

message GetHomelandFurnitureWarehouseInfoReply {
	map<int64, HomeLandItemInstance> items = 1 [json_name = "items"];
	map<int64, int64> slots = 2 [json_name = "slots"];
	map<int64, int64> itemToSlots = 3 [json_name = "itemToSlots"];
	EErrorCode errCode = 4 [json_name = "errCode"];
}
