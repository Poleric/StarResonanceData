syntax = "proto3";

import "enum_e_exchange_pre_item_result.proto";
import "stru_item.proto";

package zproto;

message ExchangeRecordItemData {
	int32 configId = 1 [json_name = "configId"];
	int32 num = 2 [json_name = "num"];
	int32 price = 3 [json_name = "price"];
	int64 time = 4 [json_name = "time"];
	EExchangePreItemResult preResult = 5 [json_name = "preResult"];
	Item itemInfo = 6 [json_name = "itemInfo"];
}
