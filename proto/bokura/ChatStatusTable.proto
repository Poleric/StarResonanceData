syntax = "proto3";

import "table_basic.proto";

package bokura;

message ChatStatusTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring StatusName = 1457 [json_name = "StatusName"];
	string Res = 1275 [json_name = "Res"];
	bool StatusSwitch = 2033 [json_name = "StatusSwitch"];
	int32 Sequence = 831 [json_name = "Sequence"];
	int32 Priority = 1712 [json_name = "Priority"];
}

message ChatStatusTableMgr {
	map<int32, ChatStatusTableBase> datas = 1 [json_name = "datas"];
}
