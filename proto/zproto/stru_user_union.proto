syntax = "proto3";

import "stru_union_dance_history.proto";
import "stru_union_history_active.proto";
import "stru_user_union_hunt_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message UserUnion {
	int64 unionId = 1 [json_name = "unionId"];
	uint64 nextJoinTime = 2 [json_name = "nextJoinTime"];
	map<int64, uint64> reqUnionTimes = 3 [json_name = "reqUnionTimes"];
	bool joinFlag = 4 [json_name = "joinFlag"];
	repeated int64 collectedIds = 5 [json_name = "collectedIds"];
	int64 activeAwardResetTime = 6 [json_name = "activeAwardResetTime"];
	repeated int32 receivedAwardIds = 7 [json_name = "receivedAwardIds"];
	repeated UnionHistoryActive historyActivePoints = 8 [json_name = "historyActivePoints"];
	int64 activeLastRefreshTime = 9 [json_name = "activeLastRefreshTime"];
	repeated int32 finishDailyActiveIds = 10 [json_name = "finishDailyActiveIds"];
	uint64 leaveTime = 11 [json_name = "leaveTime"];
	UnionDanceHistory danceRecord = 13 [json_name = "danceRecord"];
	UserUnionHuntInfo userUnionHuntInfo = 14 [json_name = "userUnionHuntInfo"];
}
