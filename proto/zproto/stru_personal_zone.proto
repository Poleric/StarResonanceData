syntax = "proto3";

import "stru_action_info.proto";
import "stru_editor_u_i_position.proto";
import "stru_fashion_quality_collect_info.proto";
import "stru_ride_quality_collect_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message PersonalZone {
	repeated int32 onlinePeriods = 2 [json_name = "onlinePeriods"];
	repeated int32 tags = 3 [json_name = "tags"];
	map<int32, int32> medals = 5 [json_name = "medals"];
	int32 themeId = 6 [json_name = "themeId"];
	int32 businessCardStyleId = 7 [json_name = "businessCardStyleId"];
	int32 avatarFrameId = 8 [json_name = "avatarFrameId"];
	ActionInfo actionInfo = 9 [json_name = "actionInfo"];
	repeated EditorUIPosition uiPosition = 10 [json_name = "uiPosition"];
	int32 titleId = 11 [json_name = "titleId"];
	bool fashionRefreshFlag = 12 [json_name = "fashionRefreshFlag"];
	int32 fashionCollectPoint = 13 [json_name = "fashionCollectPoint"];
	map<int32, FashionQualityCollectInfo> fashionCollectQualityCount = 14 [json_name = "fashionCollectQualityCount"];
	repeated int32 photos = 15 [json_name = "photos"];
	map<int32, int32> unlockTargetRecord = 16 [json_name = "unlockTargetRecord"];
	map<int32, bool> unlockGetRewardRecord = 17 [json_name = "unlockGetRewardRecord"];
	int32 rideCollectPoint = 18 [json_name = "rideCollectPoint"];
	map<int32, RideQualityCollectInfo> rideCollectQualityCount = 19 [json_name = "rideCollectQualityCount"];
	int32 weaponSkinCollectPoint = 20 [json_name = "weaponSkinCollectPoint"];
	map<int32, int32> photosWall = 21 [json_name = "photosWall"];
}
