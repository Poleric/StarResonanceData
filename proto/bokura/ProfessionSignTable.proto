syntax = "proto3";

import "table_basic.proto";

package bokura;

message ProfessionSignTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int_array SignType = 1653 [json_name = "SignType"];
	string Card = 483 [json_name = "Card"];
	string ItemTips = 491 [json_name = "ItemTips"];
	int_array EffectType = 527 [json_name = "EffectType"];
	int_array EffectId = 1555 [json_name = "EffectId"];
	string_table Effectkey = 1761 [json_name = "Effectkey"];
}

message ProfessionSignTableMgr {
	map<int32, ProfessionSignTableBase> datas = 1 [json_name = "datas"];
}
