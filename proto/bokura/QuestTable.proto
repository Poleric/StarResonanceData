syntax = "proto3";

import "table_basic.proto";

package bokura;

message QuestTableBase {
	int32 QuestId = 874 [json_name = "QuestId"];
	mlstring QuestName = 813 [json_name = "QuestName"];
	mlstring QuestDetail = 567 [json_name = "QuestDetail"];
	int32 QuestType = 728 [json_name = "QuestType"];
	int32 QuestStep = 263 [json_name = "QuestStep"];
	int32 AwardId = 1197 [json_name = "AwardId"];
	int32 FollowQuest = 879 [json_name = "FollowQuest"];
	int_array PreQuest = 1240 [json_name = "PreQuest"];
	string PreQuestLogic = 1105 [json_name = "PreQuestLogic"];
	int_array MustPreQuest = 1049 [json_name = "MustPreQuest"];
	string_table AccessLimit = 90 [json_name = "AccessLimit"];
	string_array TimeLimit = 1722 [json_name = "TimeLimit"];
	string_table ContinueLimit = 1395 [json_name = "ContinueLimit"];
	string_table AbortLimit = 1720 [json_name = "AbortLimit"];
	string StepFlowPath = 1794 [json_name = "StepFlowPath"];
}

message QuestTableMgr {
	map<int32, QuestTableBase> datas = 1 [json_name = "datas"];
}
