syntax = "proto3";

import "stru_player_refresh_shop_record.proto";
import "stru_dirty_mask.proto";

package zproto;

message ShopRefreshRecord {
	int64 refreshTimestamp = 3 [json_name = "refreshTimestamp"];
	int32 refreshCount = 4 [json_name = "refreshCount"];
	map<int32, PlayerRefreshShopRecord> shopRefreshRecords = 5 [json_name = "shopRefreshRecords"];
}
