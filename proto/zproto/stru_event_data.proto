syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message EventData {
	int32 eventType = 1 [json_name = "eventType"];
	repeated int32 intParams = 2 [json_name = "intParams"];
	repeated int64 longParams = 3 [json_name = "longParams"];
	repeated float floatParams = 4 [json_name = "floatParams"];
	repeated string strParams = 5 [json_name = "strParams"];
}
