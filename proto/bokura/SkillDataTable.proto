syntax = "proto3";

import "table_basic.proto";

package bokura;

message SkillDataTableBase {
	int64 SKillLevelId = 84 [json_name = "SKillLevelId"];
	int64_array ActionArray = 1470 [json_name = "ActionArray"];
	int64_array EventArray = 1310 [json_name = "EventArray"];
	int64_array EffectArray = 137 [json_name = "EffectArray"];
	int64_array CameraArray = 1936 [json_name = "CameraArray"];
	int64_array MaterialArray = 1946 [json_name = "MaterialArray"];
	int64_array AudioArray = 3994 [json_name = "AudioArray"];
	int64_array BulletArray = 947 [json_name = "BulletArray"];
	int64_array TimeScaleArray = 1615 [json_name = "TimeScaleArray"];
}

message SkillDataTableMgr {
	map<int64, SkillDataTableBase> datas = 1 [json_name = "datas"];
}
