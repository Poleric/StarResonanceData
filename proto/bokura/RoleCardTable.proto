syntax = "proto3";

import "table_basic.proto";

package bokura;

message RoleCardTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string FunctionId = 149 [json_name = "FunctionId"];
	mlstring Name = 439 [json_name = "Name"];
	string System = 1444 [json_name = "System"];
	string Show = 183 [json_name = "Show"];
	string Sort = 1643 [json_name = "Sort"];
	string Check = 1274 [json_name = "Check"];
	string Icon = 1153 [json_name = "Icon"];
}

message RoleCardTableMgr {
	map<int32, RoleCardTableBase> datas = 1 [json_name = "datas"];
}
