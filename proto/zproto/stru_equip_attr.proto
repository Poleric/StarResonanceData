syntax = "proto3";

import "stru_equip_attr_set.proto";
import "stru_dirty_mask.proto";

package zproto;

message EquipAttr {
	map<uint32, uint32> baseAttrs = 4 [json_name = "baseAttrs"];
	int32 perfectionValue = 7 [json_name = "perfectionValue"];
	int32 recastCount = 8 [json_name = "recastCount"];
	int32 totalRecastCount = 9 [json_name = "totalRecastCount"];
	map<int32, int32> basicAttr = 10 [json_name = "basicAttr"];
	map<int32, int32> advanceAttr = 11 [json_name = "advanceAttr"];
	map<int32, int32> recastAttr = 12 [json_name = "recastAttr"];
	int32 perfectionLevel = 13 [json_name = "perfectionLevel"];
	map<int32, int32> rareQualityAttr = 14 [json_name = "rareQualityAttr"];
	int32 maxPerfectionValue = 15 [json_name = "maxPerfectionValue"];
	EquipAttrSet equipAttrSet = 17 [json_name = "equipAttrSet"];
	int32 breakThroughTime = 18 [json_name = "breakThroughTime"];
	map<int32, EquipAttrSet> customTransformAttr = 19 [json_name = "customTransformAttr"];
}
