syntax = "proto3";

import "table_basic.proto";

package bokura;

message EffectLibraryTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	string Path = 172 [json_name = "Path"];
	string_array Tags = 232 [json_name = "Tags"];
	string thumbnail = 619 [json_name = "thumbnail"];
}

message EffectLibraryTableMgr {
	map<int32, EffectLibraryTableBase> datas = 1 [json_name = "datas"];
}
