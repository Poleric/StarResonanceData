syntax = "proto3";

import "enum_e_match_mode.proto";
import "enum_e_match_strategy.proto";
import "stru_match_key_info.proto";
import "stru_match_player_info.proto";
import "google/protobuf/any.proto";

package zproto;

message MatchParamContext {
	EMatchMode matchMode = 1 [json_name = "matchMode"];
	string matchToken = 4 [json_name = "matchToken"];
	int64 teamId = 5 [json_name = "teamId"];
	EMatchStrategy matchStrategy = 6 [json_name = "matchStrategy"];
	google.protobuf.Any matchStrategyParam = 7 [json_name = "matchStrategyParam"];
	MatchKeyInfo matchKeyInfo = 8 [json_name = "matchKeyInfo"];
	string matchGrainKey = 9 [json_name = "matchGrainKey"];
	MatchPlayerInfo matchPlayerInfo = 10 [json_name = "matchPlayerInfo"];
	int32 dungeonId = 11 [json_name = "dungeonId"];
}
