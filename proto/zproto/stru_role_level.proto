syntax = "proto3";

import "stru_level_proficiency.proto";
import "stru_dirty_mask.proto";

package zproto;

message RoleLevel {
	int32 level = 1 [json_name = "level"];
	int64 curLevelExp = 2 [json_name = "curLevelExp"];
	map<int32, bool> ReceivedLevelList = 3 [json_name = "ReceivedLevelList"];
	LevelProficiency proficiencyInfo = 4 [json_name = "proficiencyInfo"];
	map<int32, int64> activeExpMap = 5 [json_name = "activeExpMap"];
	int32 lastSeasonDay = 6 [json_name = "lastSeasonDay"];
	int64 blessExpPool = 7 [json_name = "blessExpPool"];
	int64 grantBlessExp = 8 [json_name = "grantBlessExp"];
	int64 accumulateBlessExp = 9 [json_name = "accumulateBlessExp"];
	int64 accumulateExp = 10 [json_name = "accumulateExp"];
	int32 prevSeasonMaxLv = 11 [json_name = "prevSeasonMaxLv"];
}
