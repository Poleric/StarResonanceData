syntax = "proto3";

import "stru_community_bulletin_board.proto";
import "stru_community_invitation_info.proto";
import "stru_community_player_info.proto";
import "stru_community_quit_cohabitant.proto";

package zproto;

message NotifyCommunityInfoUpdateRequest {
	int64 houseOwnerCharId = 1 [json_name = "houseOwnerCharId"];
	int64 homelandId = 2 [json_name = "homelandId"];
	repeated int64 removeGroups = 3 [json_name = "removeGroups"];
	map<int64, CommunityBulletinBoard> addBulletinBoards = 4 [json_name = "addBulletinBoards"];
	repeated int64 removeBulletinBoards = 5 [json_name = "removeBulletinBoards"];
	map<int64, CommunityPlayerInfo> addCohabitant = 6 [json_name = "addCohabitant"];
	repeated int64 removeCohabitant = 7 [json_name = "removeCohabitant"];
	map<int64, CommunityInvitationInfo> addInvitationList = 8 [json_name = "addInvitationList"];
	repeated int64 removeInvitationList = 9 [json_name = "removeInvitationList"];
	repeated CommunityQuitCohabitant addQuitCohabitant = 10 [json_name = "addQuitCohabitant"];
	repeated CommunityQuitCohabitant removeQuitCohabitant = 11 [json_name = "removeQuitCohabitant"];
}
