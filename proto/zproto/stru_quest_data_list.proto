syntax = "proto3";

import "stru_quest_data.proto";
import "stru_quest_history.proto";
import "stru_world_quest_info.proto";
import "stru_world_quest_list.proto";
import "stru_dirty_mask.proto";

package zproto;

message QuestDataList {
	map<uint32, QuestData> questMap = 1 [json_name = "questMap"];
	map<uint32, bool> finishQuest = 2 [json_name = "finishQuest"];
	uint32 trackingId = 3 [json_name = "trackingId"];
	map<uint32, uint32> finishResetQuest = 4 [json_name = "finishResetQuest"];
	map<uint32, QuestHistory> historyMap = 5 [json_name = "historyMap"];
	int64 worldQuestTimeStamp = 6 [json_name = "worldQuestTimeStamp"];
	map<uint32, WorldQuestInfo> worldQuestInfo = 7 [json_name = "worldQuestInfo"];
	map<uint32, uint32> allWorldQuestList = 8 [json_name = "allWorldQuestList"];
	map<uint32, uint32> blueWorldQuestMap = 9 [json_name = "blueWorldQuestMap"];
	map<int32, worldQuestList> filterEventId = 10 [json_name = "filterEventId"];
	repeated uint32 acceptQuestList = 11 [json_name = "acceptQuestList"];
	repeated uint32 followWorldQuestList = 12 [json_name = "followWorldQuestList"];
	map<uint32, uint32> trackOptionalQuest = 13 [json_name = "trackOptionalQuest"];
	map<uint32, uint32> finishResetQuestCount = 14 [json_name = "finishResetQuestCount"];
	map<uint32, bool> acceptQuestMap = 15 [json_name = "acceptQuestMap"];
	uint64 version = 16 [json_name = "version"];
}
