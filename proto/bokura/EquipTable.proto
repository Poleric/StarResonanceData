syntax = "proto3";

import "table_basic.proto";

package bokura;

message EquipTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Model = 421 [json_name = "Model"];
	int32 SuitID = 641 [json_name = "SuitID"];
	int32 SuitPartID = 795 [json_name = "SuitPartID"];
	int32 EquipPart = 1740 [json_name = "EquipPart"];
	int32 EquipType = 1970 [json_name = "EquipType"];
	int32 TypeAttrLibID = 183 [json_name = "TypeAttrLibID"];
	int32 StyleEffectLibID = 319 [json_name = "StyleEffectLibID"];
	int32 MaxDurability = 41 [json_name = "MaxDurability"];
	int32 DurabilityInvalidType = 1202 [json_name = "DurabilityInvalidType"];
	int32 FashionMId = 411 [json_name = "FashionMId"];
	int32 FashionFId = 1583 [json_name = "FashionFId"];
	int_table BonusGrowTimes = 1523 [json_name = "BonusGrowTimes"];
	int32 BasicGrowRange = 1306 [json_name = "BasicGrowRange"];
}

message EquipTableMgr {
	map<int32, EquipTableBase> datas = 1 [json_name = "datas"];
}
