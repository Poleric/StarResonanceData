syntax = "proto3";

import "stru_season_bp_quest_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message SeasonBpQuestList {
	map<uint32, SeasonBpQuestData> seasonMap = 1 [json_name = "seasonMap"];
	repeated uint32 randomMap = 2 [json_name = "randomMap"];
	int64 refreshTimeStamp = 3 [json_name = "refreshTimeStamp"];
}
