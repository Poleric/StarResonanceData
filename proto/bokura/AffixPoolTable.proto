syntax = "proto3";

import "table_basic.proto";

package bokura;

message AffixPoolTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	string Description = 75 [json_name = "Description"];
	int_table Affix = 1436 [json_name = "Affix"];
	int32 AffixQuantity = 1469 [json_name = "AffixQuantity"];
	int_table EffectTypeLimit = 1532 [json_name = "EffectTypeLimit"];
	int_table TargetTypeLimit = 1783 [json_name = "TargetTypeLimit"];
}

message AffixPoolTableMgr {
	map<int32, AffixPoolTableBase> datas = 1 [json_name = "datas"];
}
