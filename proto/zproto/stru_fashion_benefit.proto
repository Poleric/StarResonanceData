syntax = "proto3";

import "stru_fashion_benefit_collection_history.proto";
import "stru_fashion_benefit_task_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message FashionBenefit {
	int32 lastRewardId = 1 [json_name = "lastRewardId"];
	int32 level = 2 [json_name = "level"];
	int32 pointsTask = 3 [json_name = "pointsTask"];
	int32 pointsCycle = 4 [json_name = "pointsCycle"];
	int32 pointsCollection = 5 [json_name = "pointsCollection"];
	map<int32, FashionBenefitTaskInfo> taskList = 6 [json_name = "taskList"];
	repeated FashionBenefitCollectionHistory collectionHistory = 7 [json_name = "collectionHistory"];
	int64 nextRefreshTime = 8 [json_name = "nextRefreshTime"];
	int32 maxPoints = 9 [json_name = "maxPoints"];
	int64 lastAddTime = 10 [json_name = "lastAddTime"];
	int32 curDayMaxPoints = 11 [json_name = "curDayMaxPoints"];
	int32 expireCycle = 12 [json_name = "expireCycle"];
	int32 lastLevel = 13 [json_name = "lastLevel"];
	int64 firtExpireTime = 14 [json_name = "firtExpireTime"];
	repeated int32 lastRewardIds = 15 [json_name = "lastRewardIds"];
}
