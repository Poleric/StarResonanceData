syntax = "proto3";

import "enum_e_exchange_item_state.proto";
import "stru_item.proto";

package zproto;

message ExchangeSellItemData {
	Item itemInfo = 1 [json_name = "itemInfo"];
	int32 WithdrawType = 2 [json_name = "WithdrawType"];
	int64 delayTime = 3 [json_name = "delayTime"];
	string uuid = 4 [json_name = "uuid"];
	int64 endTime = 5 [json_name = "endTime"];
	int32 price = 6 [json_name = "price"];
	EExchangeItemState state = 7 [json_name = "state"];
}
