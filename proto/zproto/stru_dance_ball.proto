syntax = "proto3";

import "stru_dancer_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message DanceBall {
	int32 danceId = 1 [json_name = "danceId"];
	int64 beginTime = 2 [json_name = "beginTime"];
	int64 endTime = 3 [json_name = "endTime"];
	int32 randIndex = 4 [json_name = "randIndex"];
	map<int64, DancerInfo> dancers = 5 [json_name = "dancers"];
	int32 buffId = 6 [json_name = "buffId"];
	int32 npcId = 7 [json_name = "npcId"];
	int32 npcPosIndex = 8 [json_name = "npcPosIndex"];
	int32 sumDanceScore = 9 [json_name = "sumDanceScore"];
	bool hasNotifyNpc = 10 [json_name = "hasNotifyNpc"];
}
