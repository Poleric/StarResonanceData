syntax = "proto3";

package bokura;

message TargetTrackTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Type = 673 [json_name = "Type"];
	int32 Team = 852 [json_name = "Team"];
	int32 SceneTrack = 618 [json_name = "SceneTrack"];
	int32 MapTrack = 1075 [json_name = "MapTrack"];
	int32 StartDistance = 1892 [json_name = "StartDistance"];
	int32 EndDistance = 1679 [json_name = "EndDistance"];
	string Icon = 1153 [json_name = "Icon"];
}

message TargetTrackTableMgr {
	map<int32, TargetTrackTableBase> datas = 1 [json_name = "datas"];
}
