syntax = "proto3";

import "stru_profession_skill_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message ProfessionInfo {
	int32 professionId = 1 [json_name = "professionId"];
	int32 level = 2 [json_name = "level"];
	int64 experience = 3 [json_name = "experience"];
	map<int32, ProfessionSkillInfo> skillInfoMap = 4 [json_name = "skillInfoMap"];
	repeated int32 activeSkillIds = 6 [json_name = "activeSkillIds"];
	map<int32, int32> slotSkillInfoMap = 7 [json_name = "slotSkillInfoMap"];
	int32 UseSkinId = 8 [json_name = "UseSkinId"];
}
