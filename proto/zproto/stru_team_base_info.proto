syntax = "proto3";

import "enum_e_team_member_type.proto";
import "stru_team_member_group_info.proto";

package zproto;

message TeamBaseInfo {
	int64 teamId = 1 [json_name = "teamId"];
	uint32 targetId = 2 [json_name = "targetId"];
	int64 leaderId = 3 [json_name = "leaderId"];
	string desc = 4 [json_name = "desc"];
	bool autoMatch = 5 [json_name = "autoMatch"];
	bool hallShow = 6 [json_name = "hallShow"];
	bool matching = 7 [json_name = "matching"];
	ETeamMemberType teamMemberType = 8 [json_name = "teamMemberType"];
	map<int32, TeamMemberGroupInfo> teamMemberGroupInfos = 9 [json_name = "teamMemberGroupInfos"];
	int64 createTime = 10 [json_name = "createTime"];
}
