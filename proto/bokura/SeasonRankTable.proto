syntax = "proto3";

import "table_basic.proto";

package bokura;

message SeasonRankTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 RankId = 1469 [json_name = "RankId"];
	string Des = 266 [json_name = "Des"];
	mlstring Name = 439 [json_name = "Name"];
	int32 StarLevel = 1264 [json_name = "StarLevel"];
	string IconBig = 1688 [json_name = "IconBig"];
	string IconMin = 1611 [json_name = "IconMin"];
	int32 SeasonId = 1669 [json_name = "SeasonId"];
	int_table Conditions = 1570 [json_name = "Conditions"];
	int_table EchoPoints = 1201 [json_name = "EchoPoints"];
	int32 RewardId = 1752 [json_name = "RewardId"];
	int_table CoreRewardId = 51 [json_name = "CoreRewardId"];
	int_table FinalRewardId = 539 [json_name = "FinalRewardId"];
	int32 PromotionType = 106 [json_name = "PromotionType"];
	int32 BackRankId = 1617 [json_name = "BackRankId"];
}

message SeasonRankTableMgr {
	map<int32, SeasonRankTableBase> datas = 1 [json_name = "datas"];
}
