syntax = "proto3";

import "stru_dance_ball.proto";
import "stru_union_base_data.proto";
import "stru_union_event.proto";
import "stru_union_official.proto";

package zproto;

message UnionInfo {
	UnionBaseData baseInfo = 1 [json_name = "baseInfo"];
	repeated UnionEvent unionEvents = 3 [json_name = "unionEvents"];
	map<int32, UnionOfficial> officials = 4 [json_name = "officials"];
	bool autoPass = 5 [json_name = "autoPass"];
	int64 createTime = 6 [json_name = "createTime"];
	int64 changeNameTime = 7 [json_name = "changeNameTime"];
	int64 joinCrowFundNum = 8 [json_name = "joinCrowFundNum"];
	DanceBall danceBall = 9 [json_name = "danceBall"];
	string groupId = 10 [json_name = "groupId"];
	int32 groupType = 11 [json_name = "groupType"];
	bool isNameRegist = 12 [json_name = "isNameRegist"];
}
