syntax = "proto3";

import "stru_item.proto";

package zproto;

message ExchangePriceItemData {
	int32 price = 1 [json_name = "price"];
	int32 num = 2 [json_name = "num"];
	Item itemInfo = 3 [json_name = "itemInfo"];
	string guid = 4 [json_name = "guid"];
	int64 noticeTime = 5 [json_name = "noticeTime"];
}
