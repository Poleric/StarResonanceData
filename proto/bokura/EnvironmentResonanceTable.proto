syntax = "proto3";

import "table_basic.proto";

package bokura;

message EnvironmentResonanceTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	mlstring Desc = 1953 [json_name = "Desc"];
	int32 PivotId = 1300 [json_name = "PivotId"];
	mlstring Button = 1927 [json_name = "Button"];
	int_array skill = 655 [json_name = "skill"];
	int32 position = 1863 [json_name = "position"];
	int32 SceneTag = 131 [json_name = "SceneTag"];
	int32 Time = 601 [json_name = "Time"];
	int_array TriggerBuffIds = 1397 [json_name = "TriggerBuffIds"];
	int32 SlotType = 517 [json_name = "SlotType"];
}

message EnvironmentResonanceTableMgr {
	map<int32, EnvironmentResonanceTableBase> datas = 1 [json_name = "datas"];
}
