syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_exchange_price_item_data.proto";

package zproto;

message GetExchangeItemReply {
	repeated ExchangePriceItemData items = 2 [json_name = "items"];
	int32 totalPage = 3 [json_name = "totalPage"];
	int32 curPage = 4 [json_name = "curPage"];
	EErrorCode errCode = 5 [json_name = "errCode"];
}
