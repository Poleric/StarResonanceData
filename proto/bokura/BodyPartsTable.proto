	vector3_array Direction = 1794 [json_name = "Direction"];
	vector3_array Rotate = 1421 [json_name = "Rotate"];
	vector3_array Offset = 223 [json_name = "Offset"];
	string_array Bone = 1833 [json_name = "Bone"];
	int32 ShaderIndex = 1441 [json_name = "ShaderIndex"];
	string BeHitAnimMask = 826 [json_name = "BeHitAnimMask"];
	int32 MaxHp = 439 [json_name = "MaxHp"];
	bool NotHit = 591 [json_name = "NotHit"];
	bool NotChoose = 418 [json_name = "NotChoose"];
	float OnCanHitTargetWeight = 1363 [json_name = "OnCanHitTargetWeight"];
	float OnNoHitTargetWeight = 181 [json_name = "OnNoHitTargetWeight"];
