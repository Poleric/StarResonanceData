syntax = "proto3";

import "table_basic.proto";

package bokura;

message SeasonActTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 FunctionId = 149 [json_name = "FunctionId"];
	int32 SeasonId = 1669 [json_name = "SeasonId"];
	int32 Type = 673 [json_name = "Type"];
	int32 Sort = 1643 [json_name = "Sort"];
	mlstring Name = 439 [json_name = "Name"];
	string LabelPic = 1513 [json_name = "LabelPic"];
	string BackGroundPic = 1784 [json_name = "BackGroundPic"];
	mlstring ActDes = 1165 [json_name = "ActDes"];
	mlstring OtherDes = 1266 [json_name = "OtherDes"];
	int32 PreviewAward = 1452 [json_name = "PreviewAward"];
	int32 QuickJumpType = 506 [json_name = "QuickJumpType"];
	int_array QuickJumpParam = 1617 [json_name = "QuickJumpParam"];
	mlstring UnlockDes = 1991 [json_name = "UnlockDes"];
}

message SeasonActTableMgr {
	map<int32, SeasonActTableBase> datas = 1 [json_name = "datas"];
}
