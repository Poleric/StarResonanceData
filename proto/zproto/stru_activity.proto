syntax = "proto3";

import "stru_activity_award.proto";
import "enum_e_activity_status.proto";
import "enum_e_activity_type.proto";

package zproto;

message Activity {
	int64 activityUuid = 1 [json_name = "activityUuid"];
	uint32 activityConfigId = 2 [json_name = "activityConfigId"];
	map<int32, string> activityName = 3 [json_name = "activityName"];
	EActivityType activityType = 4 [json_name = "activityType"];
	uint64 startTime = 5 [json_name = "startTime"];
	uint64 endTime = 6 [json_name = "endTime"];
	map<int32, string> notice = 8 [json_name = "notice"];
	int32 orderId = 9 [json_name = "orderId"];
	EActivityStatus status = 10 [json_name = "status"];
	map<int32, ActivityAward> awardList = 11 [json_name = "awardList"];
}
