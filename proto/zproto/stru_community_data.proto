syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message CommunityData {
	int64 communityId = 1 [json_name = "communityId"];
	int64 homelandId = 2 [json_name = "homelandId"];
	repeated int64 cohabitantIds = 3 [json_name = "cohabitantIds"];
	int64 lastExitCohabitationTime = 4 [json_name = "lastExitCohabitationTime"];
	int32 buyCount = 5 [json_name = "buyCount"];
	int32 level = 6 [json_name = "level"];
}
