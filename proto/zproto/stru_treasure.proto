syntax = "proto3";

import "stru_treasure_item_row.proto";
import "stru_dirty_mask.proto";

package zproto;

message Treasure {
	map<int32, TreasureItemRow> rows = 1 [json_name = "rows"];
	map<int32, TreasureItemRow> historyRows = 2 [json_name = "historyRows"];
	bool flag = 3 [json_name = "flag"];
	int64 refreshTime = 4 [json_name = "refreshTime"];
	repeated int32 selectedReward = 5 [json_name = "selectedReward"];
	int32 seasonId = 6 [json_name = "seasonId"];
	int32 lastSeasonId = 7 [json_name = "lastSeasonId"];
	int64 lastRefreshTime = 8 [json_name = "lastRefreshTime"];
}
