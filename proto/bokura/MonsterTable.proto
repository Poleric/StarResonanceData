syntax = "proto3";

import "table_basic.proto";

package bokura;

message MonsterTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int32 ModelID = 2011 [json_name = "ModelID"];
	int32 MonsterType = 1783 [json_name = "MonsterType"];
	int32 BloodTubeCount = 330 [json_name = "BloodTubeCount"];
	string Comment1 = 280 [json_name = "Comment1"];
	string Comment2 = 2035 [json_name = "Comment2"];
	int_array SkillIds = 1496 [json_name = "SkillIds"];
	int_array HatredBuildType = 920 [json_name = "HatredBuildType"];
	bool IsFlying = 1877 [json_name = "IsFlying"];
	int_table SightConfig = 1043 [json_name = "SightConfig"];
	bool IsAccurateSight = 143 [json_name = "IsAccurateSight"];
	int_array HatredAway = 411 [json_name = "HatredAway"];
	int32 Score = 1699 [json_name = "Score"];
	int_array HatredAwayType = 527 [json_name = "HatredAwayType"];
	int32 AttributeId = 1825 [json_name = "AttributeId"];
	float WalkSpeed = 601 [json_name = "WalkSpeed"];
	float RunSpeed = 82 [json_name = "RunSpeed"];
	float FRunSpeed = 73 [json_name = "FRunSpeed"];
	float AlertSpeed = 1159 [json_name = "AlertSpeed"];
	float MinAlertDis = 607 [json_name = "MinAlertDis"];
	float MaxAlertDis = 500 [json_name = "MaxAlertDis"];
	bool ExportVoxel = 328 [json_name = "ExportVoxel"];
	string VoxelPath = 434 [json_name = "VoxelPath"];
	int32 DefaultCamp = 1466 [json_name = "DefaultCamp"];
	bool IsShowHp = 36 [json_name = "IsShowHp"];
	number_array EntityTurnVelocity = 1703 [json_name = "EntityTurnVelocity"];
	int32 AITableReference = 995 [json_name = "AITableReference"];
	float AttackHeight = 776 [json_name = "AttackHeight"];
	float DropHeight = 1616 [json_name = "DropHeight"];
	float DashSpeed = 542 [json_name = "DashSpeed"];
	int32 MonsterFightArea = 226 [json_name = "MonsterFightArea"];
	int_array HatredAwayShow = 1715 [json_name = "HatredAwayShow"];
	int_array Tags = 232 [json_name = "Tags"];
	float TargetSelectWeight = 848 [json_name = "TargetSelectWeight"];
	int32 BornDissolutionTime = 216 [json_name = "BornDissolutionTime"];
	int32 BornTime = 1588 [json_name = "BornTime"];
	int32 InvincibleTimeWithBorn = 873 [json_name = "InvincibleTimeWithBorn"];
	float BreakingContinueTime = 1744 [json_name = "BreakingContinueTime"];
	float WeeknessDuration = 883 [json_name = "WeeknessDuration"];
	float FractureDuration = 1629 [json_name = "FractureDuration"];
	bool BehitLightIsOpen = 1780 [json_name = "BehitLightIsOpen"];
	string BornEffect = 1140 [json_name = "BornEffect"];
	int_array BornClientBuffs = 1364 [json_name = "BornClientBuffs"];
	string DeadEffect = 346 [json_name = "DeadEffect"];
	int_array DeadClientBuffs = 1638 [json_name = "DeadClientBuffs"];
	bool HudInScreen = 1956 [json_name = "HudInScreen"];
	int_array BloodMark = 1298 [json_name = "BloodMark"];
	float HudPosParam = 1941 [json_name = "HudPosParam"];
}

message MonsterTableMgr {
	map<int32, MonsterTableBase> datas = 1 [json_name = "datas"];
}
