syntax = "proto3";

import "stru_battle_pass.proto";
import "stru_season_bp_quest_list.proto";
import "stru_season_center_history.proto";
import "stru_dirty_mask.proto";

package zproto;

message SeasonCenter {
	int32 seasonId = 1 [json_name = "seasonId"];
	BattlePass battlePass = 2 [json_name = "battlePass"];
	SeasonBpQuestList bpQuestList = 3 [json_name = "bpQuestList"];
	map<uint32, SeasonCenterHistory> seasonHistory = 4 [json_name = "seasonHistory"];
}
