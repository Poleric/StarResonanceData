syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message LifeProfessionTargetInfo {
	int32 id = 1 [json_name = "id"];
	int32 value = 2 [json_name = "value"];
	int32 level = 3 [json_name = "level"];
	repeated uint32 lifeTargetRewardStates = 4 [json_name = "lifeTargetRewardStates"];
}
