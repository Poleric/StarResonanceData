syntax = "proto3";

import "stru_mentor_cyclical_data.proto";
import "stru_mentor_target_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message MentorData {
	int32 mentorType = 1 [json_name = "mentorType"];
	bool isIdipFreeze = 2 [json_name = "isIdipFreeze"];
	bool isNotShowTag = 3 [json_name = "isNotShowTag"];
	map<int32, MentorTargetData> targetMap = 4 [json_name = "targetMap"];
	MentorCyclicalData cyclicalData = 5 [json_name = "cyclicalData"];
}
