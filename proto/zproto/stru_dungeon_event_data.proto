syntax = "proto3";

import "enum_dungeon_event_result.proto";
import "enum_dungeon_event_state.proto";
import "stru_dungeon_target_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message DungeonEventData {
	int32 eventId = 1 [json_name = "eventId"];
	int32 startTime = 2 [json_name = "startTime"];
	DungeonEventState state = 3 [json_name = "state"];
	DungeonEventResult result = 4 [json_name = "result"];
	map<int32, DungeonTargetData> dungeonTarget = 5 [json_name = "dungeonTarget"];
}
