syntax = "proto3";

package zproto;

message tempPhotoCacheInfo {
	string id = 1 [json_name = "id"];
	string tempPhoto = 2 [json_name = "tempPhoto"];
	string tempOriPhoto = 3 [json_name = "tempOriPhoto"];
	string tempThumbPhoto = 4 [json_name = "tempThumbPhoto"];
	uint64 shotTime = 5 [json_name = "shotTime"];
	string shotTimeStr = 6 [json_name = "shotTimeStr"];
	string shotPlace = 7 [json_name = "shotPlace"];
	string decorateData = 8 [json_name = "decorateData"];
	uint32 height = 9 [json_name = "height"];
	uint32 width = 10 [json_name = "width"];
}
