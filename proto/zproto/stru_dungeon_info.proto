syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message DungeonInfo {
	int32 dungeonID = 1 [json_name = "dungeonID"];
	int32 completeCount = 2 [json_name = "completeCount"];
	int32 awardFlg = 3 [json_name = "awardFlg"];
	int32 score = 4 [json_name = "score"];
	int32 passTime = 5 [json_name = "passTime"];
}
