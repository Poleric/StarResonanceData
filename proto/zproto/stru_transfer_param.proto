syntax = "proto3";

import "enum_e_user_transfer_type.proto";
import "stru_position_param.proto";

package zproto;

message TransferParam {
	int32 sceneId = 1 [json_name = "sceneId"];
	EUserTransferType transferType = 2 [json_name = "transferType"];
	PositionParam positionParam = 3 [json_name = "positionParam"];
	int64 changeFlag = 4 [json_name = "changeFlag"];
	bool isServerSwitch = 5 [json_name = "isServerSwitch"];
	int32 visualLayerConfigId = 6 [json_name = "visualLayerConfigId"];
	string sceneGuid = 7 [json_name = "sceneGuid"];
	string connectGuid = 8 [json_name = "connectGuid"];
	int64 subSceneUuid = 9 [json_name = "subSceneUuid"];
	bool isRevive = 10 [json_name = "isRevive"];
}
