syntax = "proto3";

import "stru_event_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message CutSceneInfo {
	int32 cutSceneId = 1 [json_name = "cutSceneId"];
	uint32 flag = 2 [json_name = "flag"];
	uint32 sceneId = 3 [json_name = "sceneId"];
	EventData eventData = 4 [json_name = "eventData"];
}
