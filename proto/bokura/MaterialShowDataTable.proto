syntax = "proto3";

import "table_basic.proto";

package bokura;

message MaterialShowDataTableBase {
	int64 Id = 1463 [json_name = "Id"];
	float Start = 678 [json_name = "Start"];
	float Duration = 544 [json_name = "Duration"];
	float End = 1415 [json_name = "End"];
	bool IsAttacker = 920 [json_name = "IsAttacker"];
	int32 StateId = 308 [json_name = "StateId"];
	int32 GroupId = 196 [json_name = "GroupId"];
	int32 MaterialType = 1428 [json_name = "MaterialType"];
	number_array Colour = 1759 [json_name = "Colour"];
	float Power = 35 [json_name = "Power"];
	number_table ColourCurve = 1313 [json_name = "ColourCurve"];
	number_table PowerCurve = 55 [json_name = "PowerCurve"];
	number_array Colour2 = 2023 [json_name = "Colour2"];
	float Power2 = 1714 [json_name = "Power2"];
	bool IsBody = 342 [json_name = "IsBody"];
	bool IsPrimaryWeapon = 1227 [json_name = "IsPrimaryWeapon"];
	bool IsSecondaryWeapon = 2083 [json_name = "IsSecondaryWeapon"];
}

message MaterialShowDataTableMgr {
	map<int64, MaterialShowDataTableBase> datas = 1 [json_name = "datas"];
}
