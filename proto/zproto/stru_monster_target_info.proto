syntax = "proto3";

import "enum_monster_target_award.proto";
import "stru_dirty_mask.proto";

package zproto;

message MonsterTargetInfo {
	int32 id = 1 [json_name = "id"];
	int32 targetUuid = 2 [json_name = "targetUuid"];
	int32 targetType = 3 [json_name = "targetType"];
	int32 targetNum = 4 [json_name = "targetNum"];
	MonsterTargetAward awardFlag = 5 [json_name = "awardFlag"];
}
