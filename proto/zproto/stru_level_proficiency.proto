syntax = "proto3";

import "stru_unlock_proficiency.proto";
import "stru_dirty_mask.proto";

package zproto;

message LevelProficiency {
	map<int32, int32> usingProficiencyMap = 1 [json_name = "usingProficiencyMap"];
	map<int32, UnlockProficiency> unlockProficiencyMap = 2 [json_name = "unlockProficiencyMap"];
}
