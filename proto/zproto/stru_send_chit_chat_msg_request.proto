syntax = "proto3";

import "stru_chat_msg_info.proto";
import "enum_chit_chat_channel_type.proto";

package zproto;

message SendChitChatMsgRequest {
	ChitChatChannelType channelType = 2 [json_name = "channelType"];
	uint32 sameRate = 3 [json_name = "sameRate"];
	ChatMsgInfo msgInfo = 4 [json_name = "msgInfo"];
	bool sendToMe = 5 [json_name = "sendToMe"];
}
