syntax = "proto3";

import "enum_chit_chat_channel_type.proto";

package zproto;

message ReportChat {
	ChitChatChannelType chatChannelType = 1 [json_name = "chatChannelType"];
	string channelId = 2 [json_name = "channelId"];
	int64 chatID = 3 [json_name = "chatID"];
	string chatContent = 4 [json_name = "chatContent"];
}
