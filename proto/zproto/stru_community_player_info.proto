syntax = "proto3";

import "stru_community_char_basic_data.proto";
import "stru_community_player_authority_info.proto";
import "stru_community_quit_cohabitant.proto";
import "stru_home_land_player_task_info.proto";

package zproto;

message CommunityPlayerInfo {
	CommunityCharBasicData communityChar = 1 [json_name = "communityChar"];
	CommunityPlayerAuthorityInfo playerAuthorityInfo = 2 [json_name = "playerAuthorityInfo"];
	CommunityQuitCohabitant quitCohabitant = 3 [json_name = "quitCohabitant"];
	HomeLandPlayerTaskInfo homeLandPlayerTaskInfo = 4 [json_name = "homeLandPlayerTaskInfo"];
}
