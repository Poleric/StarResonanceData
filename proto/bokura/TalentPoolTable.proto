syntax = "proto3";

import "table_basic.proto";

package bokura;

message TalentPoolTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Des = 266 [json_name = "Des"];
	string SectIcon = 606 [json_name = "SectIcon"];
	int32 MainTalentId = 187 [json_name = "MainTalentId"];
	int_array SecondaryTalent = 1064 [json_name = "SecondaryTalent"];
	int_array PassiveTalent = 1570 [json_name = "PassiveTalent"];
	int_table TalentPosition = 1593 [json_name = "TalentPosition"];
	int_array RecommendTalent = 1992 [json_name = "RecommendTalent"];
	mlstring SchoolDes = 926 [json_name = "SchoolDes"];
	mlstring RecommendDimension = 852 [json_name = "RecommendDimension"];
	mlstring SchoolIcon = 1576 [json_name = "SchoolIcon"];
	mlstring PlayerSchoolIcon = 1946 [json_name = "PlayerSchoolIcon"];
	int_array FantasySolutionList = 1523 [json_name = "FantasySolutionList"];
	int32 StrategyPage = 158 [json_name = "StrategyPage"];
