syntax = "proto3";

import "table_basic.proto";

package bokura;

message ItemTypeSearchTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int_table FunctionId = 149 [json_name = "FunctionId"];
	int_table HideFunctionId = 389 [json_name = "HideFunctionId"];
}

message ItemTypeSearchTableMgr {
	map<int32, ItemTypeSearchTableBase> datas = 1 [json_name = "datas"];
}
