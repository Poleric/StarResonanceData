syntax = "proto3";

package bokura;

message PersonalTagTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string TagName = 510 [json_name = "TagName"];
	string TagIcon = 25 [json_name = "TagIcon"];
	int32 Type = 673 [json_name = "Type"];
	int32 Sequence = 831 [json_name = "Sequence"];
}

message PersonalTagTableMgr {
	map<int32, PersonalTagTableBase> datas = 1 [json_name = "datas"];
}
