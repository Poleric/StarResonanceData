syntax = "proto3";

import "stru_launch_param.proto";

package zproto;

message ReconnectRequest {
	string accountId = 3 [json_name = "accountId"];
	string token = 4 [json_name = "token"];
	string clientVersion = 5 [json_name = "clientVersion"];
	string clientResourceVersion = 6 [json_name = "clientResourceVersion"];
	int32 os = 7 [json_name = "os"];
	LaunchParam launchParam = 9 [json_name = "launchParam"];
}
