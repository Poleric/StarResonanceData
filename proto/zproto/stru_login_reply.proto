syntax = "proto3";

import "stru_account_info.proto";
import "enum_e_error_code.proto";

package zproto;

message LoginReply {
	EErrorCode errCode = 1 [json_name = "errCode"];
	AccountInfo accountInfo = 2 [json_name = "accountInfo"];
	int64 beginTime = 3 [json_name = "beginTime"];
	string protocolVersion = 4 [json_name = "protocolVersion"];
	string configVersion = 5 [json_name = "configVersion"];
	string timeZone = 6 [json_name = "timeZone"];
	bool isPrivilege = 7 [json_name = "isPrivilege"];
	map<int32, string> platformConfig = 8 [json_name = "platformConfig"];
	bool isChangeAccount = 9 [json_name = "isChangeAccount"];
	int32 installChannelDis = 10 [json_name = "installChannelDis"];
	int32 RegChannelDis = 11 [json_name = "RegChannelDis"];
	bool openAceCheck = 12 [json_name = "openAceCheck"];
}
