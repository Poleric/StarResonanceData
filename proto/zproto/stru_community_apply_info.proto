syntax = "proto3";

import "stru_community_char_basic_data.proto";

package zproto;

message CommunityApplyInfo {
	int64 time = 1 [json_name = "time"];
	int64 charId = 2 [json_name = "charId"];
	int64 homeId = 3 [json_name = "homeId"];
	CommunityCharBasicData charBasicData = 4 [json_name = "charBasicData"];
	int64 communityId = 5 [json_name = "communityId"];
}
