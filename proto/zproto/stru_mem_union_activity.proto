syntax = "proto3";

import "stru_not_claimed_reward.proto";
import "stru_union_activity_target.proto";

package zproto;

message MemUnionActivity {
	int64 lastRefreshTime = 1 [json_name = "lastRefreshTime"];
	map<int32, UnionActivityTarget> personalTargets = 2 [json_name = "personalTargets"];
	repeated int32 receivedPointAwardIds = 3 [json_name = "receivedPointAwardIds"];
	repeated NotClaimedReward noClaimedActiveAwards = 4 [json_name = "noClaimedActiveAwards"];
	int64 nextRefreshTime = 5 [json_name = "nextRefreshTime"];
}
