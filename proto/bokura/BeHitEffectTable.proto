syntax = "proto3";

import "table_basic.proto";

package bokura;

message BeHitEffectTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 WeaponHitType = 1337 [json_name = "WeaponHitType"];
	int32 FleshyType = 1419 [json_name = "FleshyType"];
	string_array EffectArray = 137 [json_name = "EffectArray"];
	float FrameRatio = 373 [json_name = "FrameRatio"];
}

message BeHitEffectTableMgr {
	map<int32, BeHitEffectTableBase> datas = 1 [json_name = "datas"];
}
