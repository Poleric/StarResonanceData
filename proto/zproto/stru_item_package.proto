syntax = "proto3";

import "stru_package.proto";
import "stru_dirty_mask.proto";

package zproto;

message ItemPackage {
	map<int32, Package> packages = 1 [json_name = "packages"];
	map<int32, int32> unlockItems = 2 [json_name = "unlockItems"];
	int32 quickBar = 3 [json_name = "quickBar"];
	int32 itemUuid = 4 [json_name = "itemUuid"];
	map<int32, int64> useGroupCd = 5 [json_name = "useGroupCd"];
}
