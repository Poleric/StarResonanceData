syntax = "proto3";

import "table_basic.proto";

package bokura;

message ChallengeHeroDungeonTableBase {
	int32 DungeonId = 1583 [json_name = "DungeonId"];
	int32 DungeonGroup = 473 [json_name = "DungeonGroup"];
	int32 StarLevel = 1264 [json_name = "StarLevel"];
	string LabelPic = 1513 [json_name = "LabelPic"];
	string Background = 343 [json_name = "Background"];
	int32 ModelId = 555 [json_name = "ModelId"];
	string EffectId = 1555 [json_name = "EffectId"];
	int_array ExtraTarget = 1329 [json_name = "ExtraTarget"];
	int32 BaseRatio = 1148 [json_name = "BaseRatio"];
	int_table Affix = 1436 [json_name = "Affix"];
	int_table SelectAffix = 1243 [json_name = "SelectAffix"];
	int_table ScoreRank = 741 [json_name = "ScoreRank"];
	int32 LimitTime = 348 [json_name = "LimitTime"];
	int_table ScoreAward = 1042 [json_name = "ScoreAward"];
	int_array KeyReward = 1791 [json_name = "KeyReward"];
}

message ChallengeHeroDungeonTableMgr {
	map<int32, ChallengeHeroDungeonTableBase> datas = 1 [json_name = "datas"];
}
