syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message RechargeData {
	int64 accumulateAmount = 1 [json_name = "accumulateAmount"];
	int64 lastRechargeTime = 2 [json_name = "lastRechargeTime"];
	int64 lastRechargeAmount = 3 [json_name = "lastRechargeAmount"];
	int64 lastDiamondAmount = 4 [json_name = "lastDiamondAmount"];
}
