syntax = "proto3";

import "stru_sign_reward_data.proto";

package zproto;

message SignRewardNotifyRequest {
	repeated int32 signDays = 1 [json_name = "signDays"];
	repeated int32 rewardDays = 2 [json_name = "rewardDays"];
	map<int32, SignRewardData> signRewardDataMap = 3 [json_name = "signRewardDataMap"];
}
