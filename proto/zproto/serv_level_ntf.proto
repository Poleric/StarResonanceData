syntax = "proto3";

package zproto;

message LevelNtf {
	message DisplayBossUI {
		bool isEnter = 1 [json_name = "isEnter"];
		int64 bossUuid = 2 [json_name = "bossUuid"];
	}

	message DisplayBossOutOverdriveUI {
		bool isBreak = 1 [json_name = "isBreak"];
		bool isWeak = 2 [json_name = "isWeak"];
	}
}
