syntax = "proto3";

import "stru_show_piece_id_list.proto";
import "stru_show_piece_pair.proto";
import "stru_dirty_mask.proto";

package zproto;

message ShowPieceData {
	map<int32, ShowPieceIdList> OftenUseTypeList = 1 [json_name = "OftenUseTypeList"];
