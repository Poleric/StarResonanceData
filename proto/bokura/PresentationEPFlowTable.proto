syntax = "proto3";

import "table_basic.proto";

package bokura;

message PresentationEPFlowTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string ResPath = 548 [json_name = "ResPath"];
	string FlowName = 1523 [json_name = "FlowName"];
	string FlowType = 16 [json_name = "FlowType"];
	bool GetOption = 63 [json_name = "GetOption"];
	bool IsSavePlayState = 1541 [json_name = "IsSavePlayState"];
	int32 CheckPlayKeyIndex = 565 [json_name = "CheckPlayKeyIndex"];
	int32 CheckPlayType = 1918 [json_name = "CheckPlayType"];
	bool IsDefaultCameraDisabled = 200 [json_name = "IsDefaultCameraDisabled"];
	int32 ContentHiding = 1154 [json_name = "ContentHiding"];
	int_array IgnoreHidingNPC = 955 [json_name = "IgnoreHidingNPC"];
	bool IsModelDialogue = 1706 [json_name = "IsModelDialogue"];
	int_array BlackMask = 911 [json_name = "BlackMask"];
}

message PresentationEPFlowTableMgr {
	map<int32, PresentationEPFlowTableBase> datas = 1 [json_name = "datas"];
}
