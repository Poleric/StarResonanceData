syntax = "proto3";

import "enum_e_error_code.proto";

package zproto;

message SetWorldChatChannelIdReply {
	uint32 channelId = 1 [json_name = "channelId"];
	uint32 userNum = 2 [json_name = "userNum"];
	uint32 maxNum = 3 [json_name = "maxNum"];
	uint32 state = 4 [json_name = "state"];
	EErrorCode errCode = 5 [json_name = "errCode"];
}
