syntax = "proto3";

package zproto;

message DungeonEnterParam {
	uint32 playType = 1 [json_name = "playType"];
	uint32 dungeonId = 2 [json_name = "dungeonId"];
	uint32 roomId = 3 [json_name = "roomId"];
	repeated int32 affix = 4 [json_name = "affix"];
	uint32 selectType = 5 [json_name = "selectType"];
	int64 heroKeyItemUuid = 6 [json_name = "heroKeyItemUuid"];
	int32 masterModeDiff = 7 [json_name = "masterModeDiff"];
}
