		GetFaceDataUrlRequest vRequest = 1 [json_name = "vRequest"];
	}

	message CancelDeleteChar_Ret {
		CancelDeleteCharReply ret = 1 [json_name = "ret"];
	}

	message CancelDeleteChar {
		CancelDeleteCharRequest vRequest = 1 [json_name = "vRequest"];
	}

	message PrivilegeActivate_Ret {
		PrivilegeActivateReply ret = 1 [json_name = "ret"];
	}

	message PrivilegeActivate {
		PrivilegeActivateRequest vRequest = 1 [json_name = "vRequest"];
