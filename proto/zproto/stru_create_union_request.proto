syntax = "proto3";

package zproto;

message CreateUnionRequest {
	string unionName = 2 [json_name = "unionName"];
	repeated uint32 unionIcon = 3 [json_name = "unionIcon"];
	string declaration = 4 [json_name = "declaration"];
	bool autoApproval = 5 [json_name = "autoApproval"];
	repeated uint32 tags = 6 [json_name = "tags"];
}
