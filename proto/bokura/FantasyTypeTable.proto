syntax = "proto3";

import "table_basic.proto";

package bokura;

message FantasyTypeTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Des = 266 [json_name = "Des"];
	mlstring Name = 439 [json_name = "Name"];
	string TypeTips = 209 [json_name = "TypeTips"];
	string TypeShow = 52 [json_name = "TypeShow"];
}

message FantasyTypeTableMgr {
	map<int32, FantasyTypeTableBase> datas = 1 [json_name = "datas"];
}
