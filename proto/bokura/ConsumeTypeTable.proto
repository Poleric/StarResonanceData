syntax = "proto3";

package bokura;

message ConsumeTypeTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Note = 453 [json_name = "Note"];
	int32 Invalid = 1205 [json_name = "Invalid"];
	int32 TimeLimit = 1722 [json_name = "TimeLimit"];
	int32 Exclusive = 1326 [json_name = "Exclusive"];
}

message ConsumeTypeTableMgr {
	map<int32, ConsumeTypeTableBase> datas = 1 [json_name = "datas"];
}
