	int32 ShowMiniMap = 524 [json_name = "ShowMiniMap"];
	int32 MiniMapRatio = 1608 [json_name = "MiniMapRatio"];
	string SubScene = 568 [json_name = "SubScene"];
}

message SceneTableMgr {
	map<int32, SceneTableBase> datas = 1 [json_name = "datas"];
}
