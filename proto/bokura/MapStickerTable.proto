syntax = "proto3";

import "table_basic.proto";

package bokura;

message MapStickerTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	string Icon = 1153 [json_name = "Icon"];
	int32 Number = 1714 [json_name = "Number"];
	int32 SortId = 1586 [json_name = "SortId"];
	mlstring Des = 266 [json_name = "Des"];
	int_array TaskId = 71 [json_name = "TaskId"];
	int32 AwardId = 1197 [json_name = "AwardId"];
}

message MapStickerTableMgr {
	map<int32, MapStickerTableBase> datas = 1 [json_name = "datas"];
}
