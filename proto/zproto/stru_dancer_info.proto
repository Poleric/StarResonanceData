syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message DancerInfo {
	int64 charId = 1 [json_name = "charId"];
	int32 danceSecs = 2 [json_name = "danceSecs"];
	bool isDancing = 3 [json_name = "isDancing"];
	bool hasDrawn = 4 [json_name = "hasDrawn"];
	bool hasSend = 5 [json_name = "hasSend"];
}
