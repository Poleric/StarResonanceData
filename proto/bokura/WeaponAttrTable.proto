syntax = "proto3";

import "table_basic.proto";

package bokura;

message WeaponAttrTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 WeaponID = 1694 [json_name = "WeaponID"];
	int32 Level = 1120 [json_name = "Level"];
	int_table BaseAttr = 965 [json_name = "BaseAttr"];
	int_table ExtraAttr = 1462 [json_name = "ExtraAttr"];
}

message WeaponAttrTableMgr {
	map<int32, WeaponAttrTableBase> datas = 1 [json_name = "datas"];
}
