syntax = "proto3";

import "stru_avatar_info.proto";
import "enum_e_hero_key_roll_type.proto";
import "stru_dirty_mask.proto";

package zproto;

message HeroKeyRollInfo {
	EHeroKeyRollType type = 1 [json_name = "type"];
	int64 charId = 2 [json_name = "charId"];
	string name = 3 [json_name = "name"];
	AvatarInfo avatar = 4 [json_name = "avatar"];
	uint32 rollValue = 5 [json_name = "rollValue"];
}
