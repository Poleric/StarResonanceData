syntax = "proto3";

import "table_basic.proto";

package bokura;

message SeasonNodeTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 HoleId = 820 [json_name = "HoleId"];
	int32 HoleLevel = 829 [json_name = "HoleLevel"];
	int_array NodeId = 1205 [json_name = "NodeId"];
	int32 NodeType = 1959 [json_name = "NodeType"];
	int32 SeasonId = 1669 [json_name = "SeasonId"];
	int_table NodeCollection = 1126 [json_name = "NodeCollection"];
	int_table Collection = 977 [json_name = "Collection"];
	int_table NumberConsume = 1835 [json_name = "NumberConsume"];
	int_table OtherConsume = 1176 [json_name = "OtherConsume"];
}

message SeasonNodeTableMgr {
	map<int32, SeasonNodeTableBase> datas = 1 [json_name = "datas"];
}
