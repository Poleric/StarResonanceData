syntax = "proto3";

import "stru_int_vec3.proto";

package zproto;

message ColorData {
	map<int32, IntVec3> colorDict = 1 [json_name = "colorDict"];
	map<int32, bool> resetDict = 2 [json_name = "resetDict"];
	map<int32, IntVec3> attachmentColor = 3 [json_name = "attachmentColor"];
	map<int32, bool> attachmentReset = 4 [json_name = "attachmentReset"];
}
