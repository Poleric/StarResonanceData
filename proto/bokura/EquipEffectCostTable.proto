syntax = "proto3";

import "table_basic.proto";

package bokura;

message EquipEffectCostTableBase {
	int32 EffectType = 527 [json_name = "EffectType"];
	mlstring EffectTypeName = 911 [json_name = "EffectTypeName"];
	int_table ItemCost = 452 [json_name = "ItemCost"];
}

message EquipEffectCostTableMgr {
	map<int32, EquipEffectCostTableBase> datas = 1 [json_name = "datas"];
}
