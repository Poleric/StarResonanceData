syntax = "proto3";

import "table_basic.proto";

package bokura;

message BuffDataTableBase {
	int64 BuffId = 674 [json_name = "BuffId"];
	int64_array ActionArray = 1470 [json_name = "ActionArray"];
	int64_array EffectArray = 137 [json_name = "EffectArray"];
	int64_array MaterialArray = 1946 [json_name = "MaterialArray"];
	int64_array WWiseArray = 1945 [json_name = "WWiseArray"];
}

message BuffDataTableMgr {
	map<int64, BuffDataTableBase> datas = 1 [json_name = "datas"];
}
