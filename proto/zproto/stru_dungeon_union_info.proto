syntax = "proto3";

import "stru_dance_ball.proto";
import "stru_union_building.proto";
import "stru_union_e_screen_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message DungeonUnionInfo {
	int64 unionId = 1 [json_name = "unionId"];
	map<int32, UnionBuilding> unionBuildings = 2 [json_name = "unionBuildings"];
	map<int32, UnionEScreenInfo> eScreenInfos = 3 [json_name = "eScreenInfos"];
	DanceBall danceBall = 4 [json_name = "danceBall"];
}
