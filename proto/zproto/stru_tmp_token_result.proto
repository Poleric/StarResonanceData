syntax = "proto3";

import "enum_e_error_code.proto";

package zproto;

message TmpTokenResult {
	string tmpSecretId = 1 [json_name = "tmpSecretId"];
	string tmpSecretKey = 2 [json_name = "tmpSecretKey"];
	string tmpToken = 3 [json_name = "tmpToken"];
	int64 expiredTime = 4 [json_name = "expiredTime"];
	string region = 5 [json_name = "region"];
	string bucket = 6 [json_name = "bucket"];
	string objectKey = 7 [json_name = "objectKey"];
	uint32 pictureId = 8 [json_name = "pictureId"];
	int32 version = 9 [json_name = "version"];
	EErrorCode errCode = 10 [json_name = "errCode"];
}
