syntax = "proto3";

import "stru_union_activity_target.proto";

package zproto;

message UnionActivity {
	int64 lastRefreshTime = 1 [json_name = "lastRefreshTime"];
	map<int32, UnionActivityTarget> unionTargets = 2 [json_name = "unionTargets"];
	int64 nextAwardTime = 3 [json_name = "nextAwardTime"];
	map<int32, int64> nextRefreshTime = 4 [json_name = "nextRefreshTime"];
	map<int64, int64> resetHistoryActivePoints = 5 [json_name = "resetHistoryActivePoints"];
	int64 curPoint = 6 [json_name = "curPoint"];
}
