syntax = "proto3";

import "stru_delete_mail_reply.proto";
import "stru_delete_mail_request.proto";
import "stru_get_mail_uuid_list_reply.proto";
import "stru_get_mail_uuid_list_request.proto";
import "stru_read_mail_reply.proto";
import "stru_read_mail_request.proto";

package zproto;

message Mail {
	message ReadMail_Ret {
		ReadMailReply ret = 1 [json_name = "ret"];
	}

	message ReadMail {
		ReadMailRequest vRequest = 1 [json_name = "vRequest"];
	}

	message DeleteMail_Ret {
		DeleteMailReply ret = 1 [json_name = "ret"];
	}

	message DeleteMail {
		DeleteMailRequest vRequest = 1 [json_name = "vRequest"];
	}

	message GetMailUuidList_Ret {
		GetMailUuidListReply ret = 1 [json_name = "ret"];
	}

	message GetMailUuidList {
		GetMailUuidListRequest vRequest = 1 [json_name = "vRequest"];
	}
}
