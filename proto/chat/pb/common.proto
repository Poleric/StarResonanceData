syntax = "proto3";

package chat.pb;

option go_package = "./;chat_pb";

message DelPrivateRecordReq {
	string ClientID = 1 [json_name = "ClientID"];
	string TargetClientID = 2 [json_name = "TargetClientID"];
	repeated uint64 Index = 3 [json_name = "Index"];
	bool All = 4 [json_name = "All"];
}

message DelPrivateRecordRsp {
	enum DelPrivateRecordCode {
		SUCCESS = 0;
		INNER_ERR = 1;
		NOT_REGISTER = 2;
		INDEX_ERR = 3;
	}

	DelPrivateRecordRsp.DelPrivateRecordCode Code = 1 [json_name = "Code"];
	string Msg = 2 [json_name = "Msg"];
	string ClientID = 3 [json_name = "ClientID"];
	string TargetClientID = 4 [json_name = "TargetClientID"];
}

message DelChannelRecordReq {
	string ClientID = 1 [json_name = "ClientID"];
	string ChannelID = 2 [json_name = "ChannelID"];
	uint64 Index = 3 [json_name = "Index"];
}

message DelChannelRecordRsp {
	enum DelChannelRecordCode {
		SUCCESS = 0;
		INNER_ERR = 1;
		NOT_REGISTER = 2;
	}

	DelChannelRecordRsp.DelChannelRecordCode Code = 1 [json_name = "Code"];
	string Msg = 2 [json_name = "Msg"];
	string ClientID = 3 [json_name = "ClientID"];
	string ChannelID = 4 [json_name = "ChannelID"];
}

message DelWorldRecordReq {
	string ClientID = 1 [json_name = "ClientID"];
	uint64 Index = 2 [json_name = "Index"];
}

message DelWorldRecordRsp {
	enum DelWorldRecordCode {
		SUCCESS = 0;
		INNER_ERR = 1;
		NOT_REGISTER = 2;
	}

	DelWorldRecordRsp.DelWorldRecordCode Code = 1 [json_name = "Code"];
	string Msg = 2 [json_name = "Msg"];
	string ClientID = 3 [json_name = "ClientID"];
}

message GetChannelGroupInfoReq {
	string ClientID = 1 [json_name = "ClientID"];
	string GroupID = 2 [json_name = "GroupID"];
}

message ChannelGroupInfo {
	string ChannelID = 1 [json_name = "ChannelID"];
	uint32 MemberCount = 2 [json_name = "MemberCount"];
	uint32 MaxMemberCount = 3 [json_name = "MaxMemberCount"];
}

message GetChannelGroupInfoRsp {
	enum GetChannelGroupInfoCode {
		SUCCESS = 0;
		INNER_ERR = 1;
		NOT_REGISTER = 2;
		GROUP_ID_INVALID = 3;
	}

	GetChannelGroupInfoRsp.GetChannelGroupInfoCode Code = 1 [json_name = "Code"];
	string Msg = 2 [json_name = "Msg"];
	string ClientID = 3 [json_name = "ClientID"];
	string GroupID = 4 [json_name = "GroupID"];
	repeated ChannelGroupInfo ChannelList = 5 [json_name = "ChannelList"];
	string MyChannelID = 6 [json_name = "MyChannelID"];
}

message ChannelGroupSwitchReq {
	string ClientID = 1 [json_name = "ClientID"];
	string GroupID = 2 [json_name = "GroupID"];
	string ChannelID = 3 [json_name = "ChannelID"];
}

message ChannelGroupSwitchRsp {
	enum ChannelGroupSwitchCode {
		SUCCESS = 0;
		INNER_ERR = 1;
		NOT_REGISTER = 2;
		GROUP_ID_INVALID = 3;
		CHANNEL_ID_INVALID = 4;
		ALREADY_IN_CHANNEL = 5;
		LOCKED = 6;
		MEMBER_COUNT_LIMIT = 7;
	}

	ChannelGroupSwitchRsp.ChannelGroupSwitchCode Code = 1 [json_name = "Code"];
	string Msg = 2 [json_name = "Msg"];
	string ClientID = 3 [json_name = "ClientID"];
	string GroupID = 4 [json_name = "GroupID"];
	string ChannelID = 5 [json_name = "ChannelID"];
	uint32 ChannelMemberCount = 6 [json_name = "ChannelMemberCount"];
}

message AddBlackListReq {
	string ClientID = 1 [json_name = "ClientID"];
	string TargetClientID = 2 [json_name = "TargetClientID"];
}

message AddBlackListRsp {
	enum AddBlackListCode {
		SUCCESS = 0;
		INNER_ERROR = 1;
		NOT_REGISTER = 2;
		ALREADY_IN_LIST = 3;
	}

	AddBlackListRsp.AddBlackListCode Code = 1 [json_name = "Code"];
	string Msg = 2 [json_name = "Msg"];
	string ClientID = 3 [json_name = "ClientID"];
	string TargetClientID = 4 [json_name = "TargetClientID"];
}

message RemoveBlackListReq {
	string ClientID = 1 [json_name = "ClientID"];
	string TargetClientID = 2 [json_name = "TargetClientID"];
}

message RemoveBlackListRsp {
	enum RemoveBlackListCode {
		SUCCESS = 0;
		INNER_ERROR = 1;
		NOT_REGISTER = 2;
		NOT_IN_LIST = 3;
	}

	RemoveBlackListRsp.RemoveBlackListCode Code = 1 [json_name = "Code"];
	string Msg = 2 [json_name = "Msg"];
	string ClientID = 3 [json_name = "ClientID"];
	string TargetClientID = 4 [json_name = "TargetClientID"];
}

message GetBlackListReq {
	string ClientID = 1 [json_name = "ClientID"];
}

message GetBlackListRsp {
	enum GetBlackListCode {
		SUCCESS = 0;
		INNER_ERROR = 1;
		NOT_REGISTER = 2;
	}

	GetBlackListRsp.GetBlackListCode Code = 1 [json_name = "Code"];
	string Msg = 2 [json_name = "Msg"];
	repeated string BlackList = 3 [json_name = "BlackList"];
	string ClientID = 4 [json_name = "ClientID"];
}

message SyncBlackListReq {
	string ClientID = 1 [json_name = "ClientID"];
	repeated string BlackList = 2 [json_name = "BlackList"];
}

message SyncBlackListRsp {
	enum SyncBlackListCode {
		SUCCESS = 0;
		INNER_ERROR = 1;
		NOT_REGISTER = 2;
	}

	SyncBlackListRsp.SyncBlackListCode Code = 1 [json_name = "Code"];
	string Msg = 2 [json_name = "Msg"];
	string ClientID = 3 [json_name = "ClientID"];
}

message GetPersonalBanInfoReq {
	string ClientID = 1 [json_name = "ClientID"];
}

message GetPersonalBanInfoRsp {
	enum GetPersonalBanInfo {
		SUCCESS = 0;
		NOT_REGISTER = 1;
	}

	GetPersonalBanInfoRsp.GetPersonalBanInfo Code = 1 [json_name = "Code"];
	string Msg = 2 [json_name = "Msg"];
	string ClientID = 3 [json_name = "ClientID"];
	bool IsBan = 4 [json_name = "IsBan"];
	uint64 BanTimeOut = 5 [json_name = "BanTimeOut"];
	uint32 PrivateLeftCD = 6 [json_name = "PrivateLeftCD"];
	uint32 ChannelLeftCD = 7 [json_name = "ChannelLeftCD"];
	uint32 WorldLeftCD = 8 [json_name = "WorldLeftCD"];
}
