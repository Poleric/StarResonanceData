syntax = "proto3";

import "table_basic.proto";

package bokura;

message SetKeyboardContrastTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Keyboard = 1132 [json_name = "Keyboard"];
	int32 ShowType = 1131 [json_name = "ShowType"];
	string ImageWay = 1135 [json_name = "ImageWay"];
}

message SetKeyboardContrastTableMgr {
	map<int32, SetKeyboardContrastTableBase> datas = 1 [json_name = "datas"];
}
