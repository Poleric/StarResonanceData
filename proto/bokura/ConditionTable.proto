syntax = "proto3";

package bokura;

message ConditionTableBase {
	int32 Type = 673 [json_name = "Type"];
	string Param = 1207 [json_name = "Param"];
	bool IsLua = 1695 [json_name = "IsLua"];
	string Example = 522 [json_name = "Example"];
	string RefreshNum = 1376 [json_name = "RefreshNum"];
}

message ConditionTableMgr {
	map<int32, ConditionTableBase> datas = 1 [json_name = "datas"];
}
