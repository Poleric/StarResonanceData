syntax = "proto3";

import "table_basic.proto";

package bokura;

message ChangeQueueTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Sort = 1643 [json_name = "Sort"];
	int_table Consumable = 426 [json_name = "Consumable"];
	string ConsumableName = 1685 [json_name = "ConsumableName"];
	int_table ExchangeGoods = 1101 [json_name = "ExchangeGoods"];
	string ExchangeName = 1470 [json_name = "ExchangeName"];
	int_table Condition = 1634 [json_name = "Condition"];
	int_array WaitTime = 106 [json_name = "WaitTime"];
}

message ChangeQueueTableMgr {
	map<int32, ChangeQueueTableBase> datas = 1 [json_name = "datas"];
}
