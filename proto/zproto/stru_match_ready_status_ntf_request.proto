syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_match_key_info.proto";
import "stru_match_player_info.proto";

package zproto;

message MatchReadyStatusNtfRequest {
	EErrorCode errCode = 1 [json_name = "errCode"];
	int64 leaderCharId = 2 [json_name = "leaderCharId"];
	string matchToken = 3 [json_name = "matchToken"];
	MatchKeyInfo matchKeyInfo = 4 [json_name = "matchKeyInfo"];
	repeated MatchPlayerInfo matchPlayerInfo = 5 [json_name = "matchPlayerInfo"];
}
