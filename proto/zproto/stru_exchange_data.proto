syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message ExchangeData {
	int32 itemConfigId = 1 [json_name = "itemConfigId"];
	int32 Unlock = 2 [json_name = "Unlock"];
	int32 curExchangeCount = 3 [json_name = "curExchangeCount"];
	int64 expireTime = 4 [json_name = "expireTime"];
	int64 lastRefreshTime = 5 [json_name = "lastRefreshTime"];
}
