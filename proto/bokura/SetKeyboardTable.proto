syntax = "proto3";

import "table_basic.proto";

package bokura;

message SetKeyboardTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int_array ActionIds = 1695 [json_name = "ActionIds"];
	int32 MapCategoryId = 1371 [json_name = "MapCategoryId"];
	mlstring SetDes = 1939 [json_name = "SetDes"];
	int32 KeyboardDes = 383 [json_name = "KeyboardDes"];
	int32 FunctionId = 149 [json_name = "FunctionId"];
	int32 Sort = 1643 [json_name = "Sort"];
	int32 ShowSwitch = 343 [json_name = "ShowSwitch"];
	string GoBack = 1601 [json_name = "GoBack"];
}

message SetKeyboardTableMgr {
	map<int32, SetKeyboardTableBase> datas = 1 [json_name = "datas"];
}
