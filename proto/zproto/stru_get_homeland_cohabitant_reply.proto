syntax = "proto3";

import "stru_community_player_info.proto";
import "stru_community_transfer.proto";
import "enum_e_error_code.proto";

package zproto;

message GetHomelandCohabitantReply {
	CommunityTransfer transferCommunity = 1 [json_name = "transferCommunity"];
	map<int64, CommunityPlayerInfo> cohabitant = 2 [json_name = "cohabitant"];
