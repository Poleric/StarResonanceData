syntax = "proto3";

import "table_basic.proto";

package bokura;

message PaymentTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string ProductName = 1541 [json_name = "ProductName"];
	string Desc = 1953 [json_name = "Desc"];
	int32 ProductType = 618 [json_name = "ProductType"];
	string Currency = 968 [json_name = "Currency"];
	int32 Price = 310 [json_name = "Price"];
	int32 AwardId = 1197 [json_name = "AwardId"];
	int_table Items = 669 [json_name = "Items"];
	int32 MailId = 583 [json_name = "MailId"];
	int32 Platform = 1857 [json_name = "Platform"];
	int32 IsSale = 1626 [json_name = "IsSale"];
}

message PaymentTableMgr {
	map<int32, PaymentTableBase> datas = 1 [json_name = "datas"];
}
