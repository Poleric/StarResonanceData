syntax = "proto3";

package zproto;

message PlaceHolderFishPersonalTotal {
	int64 Total = 1 [json_name = "Total"];
	int64 MythTotal = 2 [json_name = "MythTotal"];
	int32 SumFishType = 3 [json_name = "SumFishType"];
	int32 SumSeaLifeType = 4 [json_name = "SumSeaLifeType"];
	int32 SumTrashType = 5 [json_name = "SumTrashType"];
	int32 MostFishId = 6 [json_name = "MostFishId"];
	int32 FavourZero = 7 [json_name = "FavourZero"];
	string userName = 8 [json_name = "userName"];
	string unionName = 9 [json_name = "unionName"];
	bool isNewbie = 10 [json_name = "isNewbie"];
	int32 fishLv = 11 [json_name = "fishLv"];
	bool isBackflow = 12 [json_name = "isBackflow"];
}
