syntax = "proto3";

import "table_basic.proto";

package bokura;

message ProfileAttrTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 AttrId = 1307 [json_name = "AttrId"];
	mlstring Name = 439 [json_name = "Name"];
	int32 Type = 673 [json_name = "Type"];
	mlstring TypeDisplayName = 1876 [json_name = "TypeDisplayName"];
}

message ProfileAttrTableMgr {
	map<int32, ProfileAttrTableBase> datas = 1 [json_name = "datas"];
}
