syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message GashaGuaranteeInfo {
	uint32 id = 1 [json_name = "id"];
	uint32 guaranteeX = 2 [json_name = "guaranteeX"];
	uint32 guaranteeY = 3 [json_name = "guaranteeY"];
	int32 residueGuaranteeTimeX = 4 [json_name = "residueGuaranteeTimeX"];
	int32 residueGuaranteeTimeY = 5 [json_name = "residueGuaranteeTimeY"];
	int32 residueGuaranteeTimeZ = 6 [json_name = "residueGuaranteeTimeZ"];
	uint32 guaranteeZ = 7 [json_name = "guaranteeZ"];
}
