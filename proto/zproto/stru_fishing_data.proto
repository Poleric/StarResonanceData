syntax = "proto3";

package zproto;

message FishingData {
	int32 rodId = 1 [json_name = "rodId"];
	int32 areaId = 2 [json_name = "areaId"];
	int32 fishId = 3 [json_name = "fishId"];
	int32 stage = 4 [json_name = "stage"];
	bool isGetFish = 5 [json_name = "isGetFish"];
	int32 size = 6 [json_name = "size"];
}
