syntax = "proto3";

import "table_basic.proto";

package bokura;

message SceneObjectTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	int32 ModelID = 2011 [json_name = "ModelID"];
	int32 AttributeId = 1825 [json_name = "AttributeId"];
	bool ExportVoxel = 328 [json_name = "ExportVoxel"];
	string VoxelPath = 434 [json_name = "VoxelPath"];
	int32 DefaultCamp = 1466 [json_name = "DefaultCamp"];
	bool IsShowHp = 36 [json_name = "IsShowHp"];
	string SobjBeHit = 55 [json_name = "SobjBeHit"];
	string SobjBorn = 1868 [json_name = "SobjBorn"];
	string SobjDeath = 756 [json_name = "SobjDeath"];
	bool IsClimbable = 1889 [json_name = "IsClimbable"];
	int32 SceneObjType = 1290 [json_name = "SceneObjType"];
	int32 EndStateId = 1069 [json_name = "EndStateId"];
	string BornEffect = 1140 [json_name = "BornEffect"];
	string DeadEffect = 346 [json_name = "DeadEffect"];
	bool IsUsePrefabLayer = 359 [json_name = "IsUsePrefabLayer"];
	int_table StatusInfo = 1979 [json_name = "StatusInfo"];
	int_table StatusTransition = 109 [json_name = "StatusTransition"];
	int32 DefaultState = 1528 [json_name = "DefaultState"];
	int_table InteractionTemplate = 1682 [json_name = "InteractionTemplate"];
	string_array InteractionEvent = 1343 [json_name = "InteractionEvent"];
	int_table ShowStatusInfo = 1473 [json_name = "ShowStatusInfo"];
	int_table ShowStatusTransition = 1771 [json_name = "ShowStatusTransition"];
}

message SceneObjectTableMgr {
	map<int32, SceneObjectTableBase> datas = 1 [json_name = "datas"];
}
