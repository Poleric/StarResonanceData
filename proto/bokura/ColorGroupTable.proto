syntax = "proto3";

import "table_basic.proto";

package bokura;

message ColorGroupTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Type = 673 [json_name = "Type"];
	string Color = 1995 [json_name = "Color"];
	int_table Hue = 1531 [json_name = "Hue"];
	int32 IfSaturation = 1483 [json_name = "IfSaturation"];
	int_table Saturation = 1234 [json_name = "Saturation"];
	int32 IfValue = 1337 [json_name = "IfValue"];
	int_table Value = 616 [json_name = "Value"];
	int_table UiColor = 26 [json_name = "UiColor"];
	int_table ConsumeH = 233 [json_name = "ConsumeH"];
	int_table Zone = 1971 [json_name = "Zone"];
	int_table ConsumeLow = 73 [json_name = "ConsumeLow"];
	int_table ConsumeHigh = 1761 [json_name = "ConsumeHigh"];
	int_table Unlock = 1666 [json_name = "Unlock"];
}

message ColorGroupTableMgr {
	map<int32, ColorGroupTableBase> datas = 1 [json_name = "datas"];
}
