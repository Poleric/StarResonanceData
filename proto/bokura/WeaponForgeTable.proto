syntax = "proto3";

import "table_basic.proto";

package bokura;

message WeaponForgeTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	int_table ConsumableId = 1714 [json_name = "ConsumableId"];
	int_array ConsumableGold = 18 [json_name = "ConsumableGold"];
	int32 Sort = 1643 [json_name = "Sort"];
}

message WeaponForgeTableMgr {
	map<int32, WeaponForgeTableBase> datas = 1 [json_name = "datas"];
}
