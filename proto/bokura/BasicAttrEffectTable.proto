syntax = "proto3";

import "table_basic.proto";

package bokura;

message BasicAttrEffectTableBase {
	int32 Id = 1463 [json_name = "Id"];
	number_table AttrStrengthTable = 1040 [json_name = "AttrStrengthTable"];
	int32 AttrStrengthMax = 1502 [json_name = "AttrStrengthMax"];
	number_table AttrVitalityTable = 847 [json_name = "AttrVitalityTable"];
	int32 AttrVitalityMax = 406 [json_name = "AttrVitalityMax"];
	number_table AttrDexterityTable = 1100 [json_name = "AttrDexterityTable"];
	int32 AttrDexterityMax = 1989 [json_name = "AttrDexterityMax"];
	number_table AttrIntelligenceTable = 944 [json_name = "AttrIntelligenceTable"];
	int32 AttrIntelligenceMax = 2021 [json_name = "AttrIntelligenceMax"];
	number_table AttrMindTable = 637 [json_name = "AttrMindTable"];
	int32 AttrMindMax = 1971 [json_name = "AttrMindMax"];
	number_table AttrObserveTable = 385 [json_name = "AttrObserveTable"];
	int32 AttrObserveMax = 1690 [json_name = "AttrObserveMax"];
	mlstring AttrIntroduction = 1417 [json_name = "AttrIntroduction"];
}

message BasicAttrEffectTableMgr {
	map<int32, BasicAttrEffectTableBase> datas = 1 [json_name = "datas"];
}
