syntax = "proto3";

import "stru_warehouse_grid.proto";

package zproto;

message WarehouseInfo {
	int64 WarehouseId = 1 [json_name = "WarehouseId"];
	int64 presidentId = 2 [json_name = "presidentId"];
	repeated int64 memIdList = 3 [json_name = "memIdList"];
	repeated WarehouseGrid warehouseGrids = 4 [json_name = "warehouseGrids"];
}
