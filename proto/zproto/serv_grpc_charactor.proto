	message TakeAwardByCdKey_Ret {
		EErrorCode ret = 1 [json_name = "ret"];
	}

	message TakeAwardByCdKey {
		TakeAwardByCdKeyRequest vRequest = 1 [json_name = "vRequest"];
	}

	message SyncLanguage {
		SyncLanguageRequest vRequest = 1 [json_name = "vRequest"];
	}

	message GetFacePushList_Ret {
		GetFacePushListReply ret = 1 [json_name = "ret"];
	}

	message GetFacePushList {
		GetFacePushListRequest vRequest = 1 [json_name = "vRequest"];
	}
}
