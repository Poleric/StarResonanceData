syntax = "proto3";

import "table_basic.proto";

package bokura;

message JumpTableBase {
	int32 Id = 1463 [json_name = "Id"];
	float DefaultSpeed = 925 [json_name = "DefaultSpeed"];
	float OperateSpeed = 1762 [json_name = "OperateSpeed"];
	float ReOperateDefaultSpeed = 1065 [json_name = "ReOperateDefaultSpeed"];
	number_array WindDragCoefficient = 710 [json_name = "WindDragCoefficient"];
	float AmendedGravity = 912 [json_name = "AmendedGravity"];
	number_array JumpTime = 331 [json_name = "JumpTime"];
	number_array PrepareTime = 1970 [json_name = "PrepareTime"];
	number_array JumpBreakTime = 625 [json_name = "JumpBreakTime"];
	string MovePath = 394 [json_name = "MovePath"];
	number_array ShaderBrightness = 198 [json_name = "ShaderBrightness"];
	number_array ShaderLength = 437 [json_name = "ShaderLength"];
	int_array ShaderIsBreath = 172 [json_name = "ShaderIsBreath"];
	number_array EnergyConsume = 2017 [json_name = "EnergyConsume"];
}

message JumpTableMgr {
	map<int32, JumpTableBase> datas = 1 [json_name = "datas"];
}
