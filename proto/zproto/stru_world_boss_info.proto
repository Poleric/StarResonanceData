syntax = "proto3";

import "enum_e_error_code.proto";

package zproto;

message WorldBossInfo {
	int32 bossStage = 1 [json_name = "bossStage"];
	int32 bossKilledNum = 2 [json_name = "bossKilledNum"];
	int32 uuid = 3 [json_name = "uuid"];
	int32 bossCfgId = 4 [json_name = "bossCfgId"];
	EErrorCode errCode = 5 [json_name = "errCode"];
}
