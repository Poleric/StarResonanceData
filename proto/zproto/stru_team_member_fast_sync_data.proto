syntax = "proto3";

import "stru_position.proto";

package zproto;

message TeamMemberFastSyncData {
	int64 charId = 1 [json_name = "charId"];
	int32 sceneId = 2 [json_name = "sceneId"];
	Position position = 3 [json_name = "position"];
	int64 hp = 4 [json_name = "hp"];
	int64 maxHp = 5 [json_name = "maxHp"];
	int32 state = 6 [json_name = "state"];
	int32 sceneAreaId = 7 [json_name = "sceneAreaId"];
}
