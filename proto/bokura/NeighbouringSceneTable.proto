syntax = "proto3";

import "table_basic.proto";

package bokura;

message NeighbouringSceneTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int_array NeighbouringScene = 854 [json_name = "NeighbouringScene"];
	int_array Portal = 1218 [json_name = "Portal"];
}

message NeighbouringSceneTableMgr {
	map<int32, NeighbouringSceneTableBase> datas = 1 [json_name = "datas"];
}
