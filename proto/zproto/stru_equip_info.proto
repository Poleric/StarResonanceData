syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message EquipInfo {
	int32 equipSlot = 1 [json_name = "equipSlot"];
	uint64 itemUuid = 2 [json_name = "itemUuid"];
	uint32 equipSlotRefineLevel = 3 [json_name = "equipSlotRefineLevel"];
	uint32 equipSlotRefineFailedCount = 4 [json_name = "equipSlotRefineFailedCount"];
}
