syntax = "proto3";

import "stru_dungeon_ready_buffer_info.proto";
import "stru_dungeon_ready_item_info.proto";

package zproto;

message DungeonReadyInfo {
	bool isReady = 1 [json_name = "isReady"];
	repeated DungeonReadyBufferInfo buffs = 2 [json_name = "buffs"];
	repeated DungeonReadyItemInfo medicaments = 3 [json_name = "medicaments"];
	repeated DungeonReadyItemInfo items = 4 [json_name = "items"];
}
