syntax = "proto3";

import "table_basic.proto";

package bokura;

message SettingOffTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int32 PivotId = 1300 [json_name = "PivotId"];
	mlstring Button = 1927 [json_name = "Button"];
	string SettingOffAnim = 2041 [json_name = "SettingOffAnim"];
	float RemindRadius = 2013 [json_name = "RemindRadius"];
}

message SettingOffTableMgr {
	map<int32, SettingOffTableBase> datas = 1 [json_name = "datas"];
}
