syntax = "proto3";

import "stru_vec3.proto";

package zproto;

message BuffEffectFakeBullet {
	int32 buffUuid = 1 [json_name = "buffUuid"];
	int32 eventId = 2 [json_name = "eventId"];
	int32 bulletId = 3 [json_name = "bulletId"];
	int32 buffId = 4 [json_name = "buffId"];
	Vec3 bulletOffset = 5 [json_name = "bulletOffset"];
}
