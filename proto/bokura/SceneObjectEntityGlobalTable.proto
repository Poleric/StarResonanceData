syntax = "proto3";

import "table_basic.proto";

package bokura;

message SceneObjectEntityGlobalTableBase {
	int32 UId = 2028 [json_name = "UId"];
	int32 Id = 1463 [json_name = "Id"];
	number_array Position = 686 [json_name = "Position"];
	int32 SourceType = 380 [json_name = "SourceType"];
	string OptionData = 853 [json_name = "OptionData"];
}

message SceneObjectEntityGlobalTableMgr {
	map<int32, SceneObjectEntityGlobalTableBase> datas = 1 [json_name = "datas"];
}
