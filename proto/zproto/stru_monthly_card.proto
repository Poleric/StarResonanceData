syntax = "proto3";

import "stru_item.proto";
import "stru_monthly_card_buy_list.proto";
import "stru_monthly_card_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message MonthlyCard {
	int64 expireTime = 1 [json_name = "expireTime"];
	map<int32, MonthlyCardInfo> monthlyCardInfo = 2 [json_name = "monthlyCardInfo"];
	int32 lastAwardMonthlyCardTime = 3 [json_name = "lastAwardMonthlyCardTime"];
	int32 tipsClicked = 4 [json_name = "tipsClicked"];
	int32 tipsDay = 5 [json_name = "tipsDay"];
	repeated Item items = 6 [json_name = "items"];
	map<int64, MonthlyCardBuyList> monthlyCardBuyList = 7 [json_name = "monthlyCardBuyList"];
}
