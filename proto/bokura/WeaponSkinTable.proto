syntax = "proto3";

import "table_basic.proto";

package bokura;

message WeaponSkinTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	string Icon = 1153 [json_name = "Icon"];
	mlstring Intro = 740 [json_name = "Intro"];
	int_array WeaponModelId = 173 [json_name = "WeaponModelId"];
	int32 WeaponId = 952 [json_name = "WeaponId"];
	int32 Original = 522 [json_name = "Original"];
	int32 Unlock = 1666 [json_name = "Unlock"];
	mlstring UnlockDes = 1991 [json_name = "UnlockDes"];
}

message WeaponSkinTableMgr {
	map<int32, WeaponSkinTableBase> datas = 1 [json_name = "datas"];
}
