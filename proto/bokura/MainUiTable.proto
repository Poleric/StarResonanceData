syntax = "proto3";

import "table_basic.proto";

package bokura;

message MainUiTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Comment = 11 [json_name = "Comment"];
	int_array MainIcon = 1283 [json_name = "MainIcon"];
}

message MainUiTableMgr {
	map<int32, MainUiTableBase> datas = 1 [json_name = "datas"];
}
