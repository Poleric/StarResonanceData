syntax = "proto3";

import "table_basic.proto";

package bokura;

message AffixTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	mlstring Description = 75 [json_name = "Description"];
	string Remark = 1391 [json_name = "Remark"];
	string Icon = 1153 [json_name = "Icon"];
	int32 EffectType = 527 [json_name = "EffectType"];
	int32 TargetType = 736 [json_name = "TargetType"];
	int32 Level = 1120 [json_name = "Level"];
	int_array Mutex = 924 [json_name = "Mutex"];
	int_table Effect = 602 [json_name = "Effect"];
	number_table EffectTime = 1664 [json_name = "EffectTime"];
	int32 GsChange = 1558 [json_name = "GsChange"];
}

message AffixTableMgr {
	map<int32, AffixTableBase> datas = 1 [json_name = "datas"];
}
