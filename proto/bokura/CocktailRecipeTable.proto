syntax = "proto3";

import "table_basic.proto";

package bokura;

message CocktailRecipeTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	mlstring RecipeText = 932 [json_name = "RecipeText"];
	mlstring IntroductionText = 257 [json_name = "IntroductionText"];
	int_table Recipe = 1710 [json_name = "Recipe"];
	string Model = 421 [json_name = "Model"];
	bool IsVisible = 1044 [json_name = "IsVisible"];
}

message CocktailRecipeTableMgr {
	map<int32, CocktailRecipeTableBase> datas = 1 [json_name = "datas"];
}
