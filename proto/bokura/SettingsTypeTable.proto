syntax = "proto3";

package bokura;

message SettingsTypeTableBase {
	int32 TypesId = 1912 [json_name = "TypesId"];
	int32 SystemId = 518 [json_name = "SystemId"];
	string Name = 439 [json_name = "Name"];
	int32 Sort = 1643 [json_name = "Sort"];
}

message SettingsTypeTableMgr {
	map<int32, SettingsTypeTableBase> datas = 1 [json_name = "datas"];
}
