syntax = "proto3";

import "table_basic.proto";

package bokura;

message BdTagTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring TagName = 510 [json_name = "TagName"];
	mlstring TagString = 107 [json_name = "TagString"];
	int32 TagType = 847 [json_name = "TagType"];
	int32 ParentTag = 38 [json_name = "ParentTag"];
}

message BdTagTableMgr {
	map<int32, BdTagTableBase> datas = 1 [json_name = "datas"];
}
