syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_gasha_record.proto";

package zproto;

message GashaRecordReply {
	GashaRecord gashaRecordDatas = 2 [json_name = "gashaRecordDatas"];
	uint32 startId = 3 [json_name = "startId"];
	uint32 count = 4 [json_name = "count"];
	uint32 totalCount = 5 [json_name = "totalCount"];
	EErrorCode errCode = 6 [json_name = "errCode"];
}
