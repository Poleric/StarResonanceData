syntax = "proto3";

import "table_basic.proto";

package bokura;

message PlanetMemoryTableBase {
	int32 RoomId = 108 [json_name = "RoomId"];
	int32 DungeonId = 1583 [json_name = "DungeonId"];
	number_array RoomPos = 838 [json_name = "RoomPos"];
	int_array UnlockRoomId = 345 [json_name = "UnlockRoomId"];
	int32 RoomType = 1966 [json_name = "RoomType"];
	int_array LinkModel = 1139 [json_name = "LinkModel"];
	int_array Affix = 1436 [json_name = "Affix"];
	mlstring RoomName = 1873 [json_name = "RoomName"];
	int32 GsLimit = 148 [json_name = "GsLimit"];
	int_array TargetMonster = 34 [json_name = "TargetMonster"];
	int_array UnlockTime = 478 [json_name = "UnlockTime"];
	int_array ExtraTarget = 1329 [json_name = "ExtraTarget"];
}

message PlanetMemoryTableMgr {
	map<int32, PlanetMemoryTableBase> datas = 1 [json_name = "datas"];
}
