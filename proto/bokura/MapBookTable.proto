syntax = "proto3";

import "table_basic.proto";

package bokura;

message MapBookTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 SceneId = 1506 [json_name = "SceneId"];
	int32 SortId = 1586 [json_name = "SortId"];
	string Model = 421 [json_name = "Model"];
	int32 AwardId = 1197 [json_name = "AwardId"];
	int_array StickerId = 1275 [json_name = "StickerId"];
}

message MapBookTableMgr {
	map<int32, MapBookTableBase> datas = 1 [json_name = "datas"];
}
