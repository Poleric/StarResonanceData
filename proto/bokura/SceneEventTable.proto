syntax = "proto3";

import "table_basic.proto";

package bokura;

message SceneEventTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int_array TargetList = 360 [json_name = "TargetList"];
	int32 Difficult = 1602 [json_name = "Difficult"];
	int_table CompleteAction = 559 [json_name = "CompleteAction"];
	int32 Time = 601 [json_name = "Time"];
}

message SceneEventTableMgr {
	map<int32, SceneEventTableBase> datas = 1 [json_name = "datas"];
}
