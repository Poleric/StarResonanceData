syntax = "proto3";

import "table_basic.proto";

package bokura;

message ProfessionTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	mlstring ShortDescription = 1271 [json_name = "ShortDescription"];
	mlstring Description = 75 [json_name = "Description"];
	int_table Job = 463 [json_name = "Job"];
	string Icon = 1153 [json_name = "Icon"];
	string IconBg = 1829 [json_name = "IconBg"];
	int32 ResTemplateId = 1400 [json_name = "ResTemplateId"];
	int_array Buffs = 3 [json_name = "Buffs"];
	int_table Arrtrs = 558 [json_name = "Arrtrs"];
	int_array ProfessionEffectId = 738 [json_name = "ProfessionEffectId"];
	mlstring TipsDescription = 516 [json_name = "TipsDescription"];
}

message ProfessionTableMgr {
	map<int32, ProfessionTableBase> datas = 1 [json_name = "datas"];
}
