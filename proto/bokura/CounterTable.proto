syntax = "proto3";

package bokura;

message CounterTableBase {
	int64 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	int64 TimeTableId = 56 [json_name = "TimeTableId"];
	int32 RefreshNum = 1376 [json_name = "RefreshNum"];
	int32 Limit = 640 [json_name = "Limit"];
}

message CounterTableMgr {
	map<int64, CounterTableBase> datas = 1 [json_name = "datas"];
}
