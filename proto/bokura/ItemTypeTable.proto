syntax = "proto3";

import "table_basic.proto";

package bokura;

message ItemTypeTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int32 Package = 2016 [json_name = "Package"];
	int32 Classify = 746 [json_name = "Classify"];
	int32 SortId = 1586 [json_name = "SortId"];
	int32 PreviewId = 438 [json_name = "PreviewId"];
}

message ItemTypeTableMgr {
	map<int32, ItemTypeTableBase> datas = 1 [json_name = "datas"];
}
