syntax = "proto3";

import "stru_life_profession_alchemy_info.proto";
import "stru_life_profession_basic.proto";
import "stru_life_profession_recipe.proto";
import "stru_life_profession_target_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message LifeProfession {
	map<int32, LifeProfessionBasic> professionInfo = 1 [json_name = "professionInfo"];
	map<int32, LifeProfessionTargetInfo> lifeTargetInfo = 2 [json_name = "lifeTargetInfo"];
	map<int32, LifeProfessionRecipe> lifeProfessionRecipe = 3 [json_name = "lifeProfessionRecipe"];
	LifeProfessionAlchemyInfo lifeProfessionAlchemyInfo = 4 [json_name = "lifeProfessionAlchemyInfo"];
	map<int32, int32> spareEnergy = 5 [json_name = "spareEnergy"];
	int32 point = 6 [json_name = "point"];
}
