syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message SeasonActivationTarget {
	int32 id = 1 [json_name = "id"];
	int32 targetType = 2 [json_name = "targetType"];
	int32 targetUuid = 3 [json_name = "targetUuid"];
	int32 rewardRate = 4 [json_name = "rewardRate"];
	int32 progress = 5 [json_name = "progress"];
	int32 completedTimes = 6 [json_name = "completedTimes"];
}
