syntax = "proto3";

package zproto;

message TotalFriendliness {
	int32 level = 1 [json_name = "level"];
	int32 curExp = 2 [json_name = "curExp"];
	int64 updateTimeStamp = 3 [json_name = "updateTimeStamp"];
	int32 todayTotalAddExps = 4 [json_name = "todayTotalAddExps"];
	repeated int32 gotLevelAwards = 5 [json_name = "gotLevelAwards"];
}
