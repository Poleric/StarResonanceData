syntax = "proto3";

import "stru_home_land_task.proto";

package zproto;

message HomeLandPlayerTaskInfo {
	int64 nextTaskReflushTime = 1 [json_name = "nextTaskReflushTime"];
	int32 curLeftTimes = 2 [json_name = "curLeftTimes"];
	map<int32, HomeLandTask> curTaskMap = 3 [json_name = "curTaskMap"];
	int64 newNextTaskReflushSec = 4 [json_name = "newNextTaskReflushSec"];
}
