syntax = "proto3";

import "stru_int_vec3.proto";
import "stru_dirty_mask.proto";

package zproto;

message FaceData {
	map<int32, int32> faceInfo = 1 [json_name = "faceInfo"];
	map<int32, IntVec3> colorInfo = 2 [json_name = "colorInfo"];
	float height = 3 [json_name = "height"];
	int32 bodySize = 4 [json_name = "bodySize"];
	int32 voiceId = 5 [json_name = "voiceId"];
}
