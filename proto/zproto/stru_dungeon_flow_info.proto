syntax = "proto3";

import "enum_e_dungeon_state.proto";
import "stru_dirty_mask.proto";

package zproto;

message DungeonFlowInfo {
	EDungeonState state = 1 [json_name = "state"];
	int32 activeTime = 2 [json_name = "activeTime"];
	int32 readyTime = 3 [json_name = "readyTime"];
	int32 playTime = 4 [json_name = "playTime"];
	int32 endTime = 5 [json_name = "endTime"];
	int32 settlementTime = 6 [json_name = "settlementTime"];
	int32 dungeonTimes = 7 [json_name = "dungeonTimes"];
	int32 result = 8 [json_name = "result"];
}
