syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_ichiban_kuji_record_elem.proto";

package zproto;

message IchibanKujiRecordReply {
	int32 poolId = 1 [json_name = "poolId"];
	uint32 startIndex = 2 [json_name = "startIndex"];
	uint32 count = 3 [json_name = "count"];
	uint32 totalCount = 4 [json_name = "totalCount"];
	repeated IchibanKujiRecordElem recordList = 5 [json_name = "recordList"];
	EErrorCode errCode = 6 [json_name = "errCode"];
}
