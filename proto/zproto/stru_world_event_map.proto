syntax = "proto3";

import "stru_world_event_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message WorldEventMap {
	map<uint32, worldEventData> eventMap = 1 [json_name = "eventMap"];
	int32 acceptCount = 2 [json_name = "acceptCount"];
	int64 lastUpdateTime = 3 [json_name = "lastUpdateTime"];
	int64 refreshTime = 4 [json_name = "refreshTime"];
}
