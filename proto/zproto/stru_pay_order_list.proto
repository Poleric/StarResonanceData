syntax = "proto3";

import "stru_pay_data.proto";
import "stru_refund_item_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message PayOrderList {
	repeated string payOrderList = 1 [json_name = "payOrderList"];
	repeated string payRefundList = 2 [json_name = "payRefundList"];
	PayData firstPay = 3 [json_name = "firstPay"];
	map<int64, int32> orderIndexList = 5 [json_name = "orderIndexList"];
	map<int64, RefundItemInfo> orderIndexRefundList = 6 [json_name = "orderIndexRefundList"];
}
