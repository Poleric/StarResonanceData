syntax = "proto3";

import "enum_e_assign_scene_source_type.proto";
import "stru_enter_scene_params.proto";
import "enum_e_scene_assign_type.proto";
import "stru_login_scene_params.proto";
import "stru_scene_init_params.proto";

package zproto;

message AssignSceneParams {
	int32 sceneId = 1 [json_name = "sceneId"];
	int64 creatorCharId = 2 [json_name = "creatorCharId"];
	ESceneAssignType assignType = 3 [json_name = "assignType"];
	SceneInitParams initParam = 4 [json_name = "initParam"];
	EnterSceneParams enterParam = 5 [json_name = "enterParam"];
	LoginSceneParams loginParam = 6 [json_name = "loginParam"];
	EAssignSceneSourceType sourceType = 7 [json_name = "sourceType"];
}
