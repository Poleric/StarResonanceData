syntax = "proto3";

import "stru_cancel_match_result_ntf_request.proto";
import "stru_enter_match_result_ntf_request.proto";
import "stru_match_ready_status_ntf_request.proto";

package zproto;

message MatchNtf {
	message EnterMatchResultNtf {
		EnterMatchResultNtfRequest vRequest = 1 [json_name = "vRequest"];
	}

	message CancelMatchResultNtf {
		CancelMatchResultNtfRequest vRequest = 1 [json_name = "vRequest"];
	}

	message MatchReadyStatusNtf {
		MatchReadyStatusNtfRequest vRequest = 1 [json_name = "vRequest"];
	}
}
