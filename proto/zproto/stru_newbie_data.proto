syntax = "proto3";

import "stru_newbie_act_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message NewbieData {
	int64 totalOnlineTime = 1 [json_name = "totalOnlineTime"];
	bool isNewbie = 2 [json_name = "isNewbie"];
	bool isCancelNewbie = 3 [json_name = "isCancelNewbie"];
	int32 seasonId = 4 [json_name = "seasonId"];
	int32 activateTimes = 5 [json_name = "activateTimes"];
	bool isNotShowTag = 6 [json_name = "isNotShowTag"];
	int64 beginTime = 7 [json_name = "beginTime"];
	NewbieActData actData = 8 [json_name = "actData"];
}
