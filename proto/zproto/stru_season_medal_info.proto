syntax = "proto3";

import "stru_medal_hole.proto";
import "stru_medal_node.proto";
import "stru_dirty_mask.proto";

package zproto;

message SeasonMedalInfo {
	uint32 seasonId = 1 [json_name = "seasonId"];
	map<uint32, MedalHole> normalHoleInfos = 2 [json_name = "normalHoleInfos"];
	MedalHole coreHoleInfo = 3 [json_name = "coreHoleInfo"];
	map<uint32, MedalNode> coreHoleNodeInfos = 4 [json_name = "coreHoleNodeInfos"];
}
