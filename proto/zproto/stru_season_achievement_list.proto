syntax = "proto3";

import "stru_season_achievement.proto";
import "stru_dirty_mask.proto";

package zproto;

message SeasonAchievementList {
	map<uint32, SeasonAchievement> seasonAchievementList = 1 [json_name = "seasonAchievementList"];
	map<uint32, bool> hasInitDones = 2 [json_name = "hasInitDones"];
	uint64 version = 3 [json_name = "version"];
}
