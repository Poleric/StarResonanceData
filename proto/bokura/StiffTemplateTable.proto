syntax = "proto3";

package bokura;

message StiffTemplateTableBase {
	int64 Id = 1463 [json_name = "Id"];
	string Des = 266 [json_name = "Des"];
	int32 BehitType = 1367 [json_name = "BehitType"];
	float HorImpactForce = 806 [json_name = "HorImpactForce"];
	float VerImpactForce = 1732 [json_name = "VerImpactForce"];
	float StiffingTime = 784 [json_name = "StiffingTime"];
	float StiffHangTime = 1600 [json_name = "StiffHangTime"];
	float StiffEndTime = 1209 [json_name = "StiffEndTime"];
	float MinimumHorSpeed = 607 [json_name = "MinimumHorSpeed"];
	float SkillFlowOffset = 204 [json_name = "SkillFlowOffset"];
	float SkillFlowRadius = 990 [json_name = "SkillFlowRadius"];
}

message StiffTemplateTableMgr {
	map<int64, StiffTemplateTableBase> datas = 1 [json_name = "datas"];
}
