syntax = "proto3";

package zproto;

message BuffProgressShowInfo {
	bool isClose = 1 [json_name = "isClose"];
	int32 last = 2 [json_name = "last"];
	int32 value = 3 [json_name = "value"];
	float speed = 4 [json_name = "speed"];
	int32 changeValue = 5 [json_name = "changeValue"];
	bool isOnlySelf = 6 [json_name = "isOnlySelf"];
}
