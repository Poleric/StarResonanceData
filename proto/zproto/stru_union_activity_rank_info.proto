syntax = "proto3";

import "stru_avatar_info.proto";

package zproto;

message UnionActivityRankInfo {
	int64 charId = 1 [json_name = "charId"];
	string charName = 2 [json_name = "charName"];
	AvatarInfo avatarInfo = 3 [json_name = "avatarInfo"];
	int32 rankIdx = 4 [json_name = "rankIdx"];
	int32 value = 5 [json_name = "value"];
}
