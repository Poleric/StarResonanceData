syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_dirty_mask.proto";

package zproto;

message PioneerInfo {
	uint32 currentTotal = 1 [json_name = "currentTotal"];
	map<uint32, uint32> targets = 2 [json_name = "targets"];
	map<int32, bool> awards = 3 [json_name = "awards"];
	map<uint32, bool> enteredZones = 4 [json_name = "enteredZones"];
	uint32 id = 5 [json_name = "id"];
	EErrorCode errCode = 6 [json_name = "errCode"];
}
