syntax = "proto3";

import "table_basic.proto";

package bokura;

message SceneTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	string Comment = 11 [json_name = "Comment"];
	int32 SceneType = 208 [json_name = "SceneType"];
	int32 SceneSubType = 1706 [json_name = "SceneSubType"];
	int32 ParentId = 1361 [json_name = "ParentId"];
	bool IsShareParentSceneData = 1616 [json_name = "IsShareParentSceneData"];
	int32 SceneResourceId = 1781 [json_name = "SceneResourceId"];
	string LoadingPng = 536 [json_name = "LoadingPng"];
	string_array SceneUi = 708 [json_name = "SceneUi"];
	vector2 MapSize = 250 [json_name = "MapSize"];
	string_array MapTexs = 1485 [json_name = "MapTexs"];
	int32 MapRowCount = 1058 [json_name = "MapRowCount"];
	vector2_array MapTexSize = 82 [json_name = "MapTexSize"];
	bool BigWorld = 1871 [json_name = "BigWorld"];
	string_array AudioBank = 1796 [json_name = "AudioBank"];
	int32 SceneEnterType = 132 [json_name = "SceneEnterType"];
	vector3_array BornPos = 1476 [json_name = "BornPos"];
	int32 BornId = 824 [json_name = "BornId"];
	bool CanRevive = 224 [json_name = "CanRevive"];
	int32 ReviveType = 496 [json_name = "ReviveType"];
	int32 ReviveId = 869 [json_name = "ReviveId"];
	int_array ReviveTableId = 1420 [json_name = "ReviveTableId"];
	int32 CamConfig = 102 [json_name = "CamConfig"];
	string Bgm = 1107 [json_name = "Bgm"];
	string LoadingBgm = 360 [json_name = "LoadingBgm"];
	string BattleBgm = 18 [json_name = "BattleBgm"];
