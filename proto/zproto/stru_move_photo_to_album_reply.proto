syntax = "proto3";

import "enum_e_error_code.proto";

package zproto;

message MovePhotoToAlbumReply {
	uint32 photoId = 3 [json_name = "photoId"];
	uint32 prevAlbumId = 4 [json_name = "prevAlbumId"];
	uint32 curAlbumId = 5 [json_name = "curAlbumId"];
	EErrorCode errCode = 6 [json_name = "errCode"];
}
