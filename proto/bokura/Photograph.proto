syntax = "proto3";

import "table_basic.proto";

package bokura;

message PhotographBase {
	int32 Id = 1463 [json_name = "Id"];
	string Parameter = 893 [json_name = "Parameter"];
	number_array Value = 616 [json_name = "Value"];
}

message PhotographMgr {
	map<int32, PhotographBase> datas = 1 [json_name = "datas"];
}
