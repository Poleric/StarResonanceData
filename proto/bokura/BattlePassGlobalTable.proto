syntax = "proto3";

import "table_basic.proto";

package bokura;

message BattlePassGlobalTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 WeeklyExpLimit = 1308 [json_name = "WeeklyExpLimit"];
	mlstring NormalPassName = 2042 [json_name = "NormalPassName"];
	mlstring PrimePassName = 547 [json_name = "PrimePassName"];
	int_table Fashion = 1901 [json_name = "Fashion"];
	int32 FashionLevel = 1423 [json_name = "FashionLevel"];
	int_array AwardPreview = 1161 [json_name = "AwardPreview"];
	int32 PrimePassAddLevel = 658 [json_name = "PrimePassAddLevel"];
	int_array PrimeExtraAward = 952 [json_name = "PrimeExtraAward"];
	int_array LevelCost = 883 [json_name = "LevelCost"];
	int32 NormalPassPaymentID = 123 [json_name = "NormalPassPaymentID"];
	int32 PrimePassPaymentID = 180 [json_name = "PrimePassPaymentID"];
	int32 PassPriceDiffPaymentID = 522 [json_name = "PassPriceDiffPaymentID"];
}

message BattlePassGlobalTableMgr {
	map<int32, BattlePassGlobalTableBase> datas = 1 [json_name = "datas"];
}
