syntax = "proto3";

import "stru_avatar_info.proto";
import "stru_basic_data.proto";
import "stru_equip_data.proto";
import "stru_face_data.proto";
import "stru_fashion_data.proto";
import "stru_personal_zone_show.proto";
import "stru_profession_data.proto";
import "stru_user_attr_data.proto";
import "stru_user_scene_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message TeamMemberSocialData {
	BasicData basicData = 1 [json_name = "basicData"];
	AvatarInfo avatarInfo = 2 [json_name = "avatarInfo"];
	FaceData faceData = 3 [json_name = "faceData"];
	ProfessionData professionData = 4 [json_name = "professionData"];
	EquipData equipData = 5 [json_name = "equipData"];
	FashionData fashionData = 6 [json_name = "fashionData"];
	UserSceneInfo userSceneInfo = 7 [json_name = "userSceneInfo"];
	UserAttrData userAttrData = 8 [json_name = "userAttrData"];
	PersonalZoneShow personalZone = 9 [json_name = "personalZone"];
}
