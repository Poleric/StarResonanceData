syntax = "proto3";

package bokura;

message LocalShowRuleBase {
	int32 Id = 1463 [json_name = "Id"];
	string LangArea = 383 [json_name = "LangArea"];
	string YMD = 1317 [json_name = "YMD"];
	string YMDToYMD = 809 [json_name = "YMDToYMD"];
	string MD = 381 [json_name = "MD"];
	string MDToMD = 1410 [json_name = "MDToMD"];
	string HMS = 602 [json_name = "HMS"];
	string HM = 310 [json_name = "HM"];
}

message LocalShowRuleMgr {
	map<int32, LocalShowRuleBase> datas = 1 [json_name = "datas"];
}
