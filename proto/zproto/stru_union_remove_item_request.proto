syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_union_info.proto";

package zproto;

message UnionRemoveItemRequest {
	UnionInfo unionInfo = 1 [json_name = "unionInfo"];
	EErrorCode errCode = 2 [json_name = "errCode"];
	repeated int32 itemIds = 3 [json_name = "itemIds"];
	repeated int32 itemNum = 4 [json_name = "itemNum"];
}
