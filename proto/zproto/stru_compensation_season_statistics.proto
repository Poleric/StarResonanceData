syntax = "proto3";

import "stru_compensation_record.proto";
import "stru_dirty_mask.proto";

package zproto;

message CompensationSeasonStatistics {
	map<uint32, CompensationRecord> weekData = 1 [json_name = "weekData"];
	map<uint32, int32> compensation = 2 [json_name = "compensation"];
	int32 maxClimbUpLayerId = 3 [json_name = "maxClimbUpLayerId"];
	repeated int64 raidBossIds = 4 [json_name = "raidBossIds"];
	map<int64, int64> raidBossKillTime = 5 [json_name = "raidBossKillTime"];
}
