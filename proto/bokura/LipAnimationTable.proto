syntax = "proto3";

package bokura;

message LipAnimationTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Comment = 11 [json_name = "Comment"];
	string VowelA = 1427 [json_name = "VowelA"];
	string VowelO = 1999 [json_name = "VowelO"];
	string VowelE = 950 [json_name = "VowelE"];
	string VowelI = 1593 [json_name = "VowelI"];
	string VowelU = 587 [json_name = "VowelU"];
}

message LipAnimationTableMgr {
	map<int32, LipAnimationTableBase> datas = 1 [json_name = "datas"];
}
