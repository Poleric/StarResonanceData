syntax = "proto3";

import "stru_homeland_decoration_info.proto";
import "stru_structure.proto";

package zproto;

message InitHomeLandInfo {
	bool isOuter = 1 [json_name = "isOuter"];
	map<int64, Structure> structures = 2 [json_name = "structures"];
	HomelandDecorationInfo decorationInfo = 3 [json_name = "decorationInfo"];
}
