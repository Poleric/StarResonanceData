syntax = "proto3";

import "table_basic.proto";

package bokura;

message EquipAttrLibTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 AttrLibID = 819 [json_name = "AttrLibID"];
	int_array EquipLevelRange = 178 [json_name = "EquipLevelRange"];
	int_array EquipPart = 1740 [json_name = "EquipPart"];
	int_array Attr = 889 [json_name = "Attr"];
	number_table ValueCal = 605 [json_name = "ValueCal"];
}

message EquipAttrLibTableMgr {
	map<int32, EquipAttrLibTableBase> datas = 1 [json_name = "datas"];
}
