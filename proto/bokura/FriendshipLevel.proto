syntax = "proto3";

import "table_basic.proto";

package bokura;

message FriendshipLevelBase {
	int32 Level = 1120 [json_name = "Level"];
	int32 Exp = 970 [json_name = "Exp"];
	bool IsAwardLevel = 1171 [json_name = "IsAwardLevel"];
	mlstring Content = 783 [json_name = "Content"];
	string FunctionUnlock = 1328 [json_name = "FunctionUnlock"];
	int_table RewardID = 212 [json_name = "RewardID"];
	int32 AwardID = 1636 [json_name = "AwardID"];
}

message FriendshipLevelMgr {
	map<int32, FriendshipLevelBase> datas = 1 [json_name = "datas"];
}
