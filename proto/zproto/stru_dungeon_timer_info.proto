syntax = "proto3";

import "enum_e_dungeon_timer_direction.proto";
import "enum_e_dungeon_timer_effect_type.proto";
import "enum_e_dungeon_timer_timer_look_type.proto";
import "enum_e_dungeon_timer_type.proto";
import "stru_dirty_mask.proto";

package zproto;

message DungeonTimerInfo {
	EDungeonTimerType type = 1 [json_name = "type"];
	int32 startTime = 2 [json_name = "startTime"];
	int32 dungeonTimes = 3 [json_name = "dungeonTimes"];
	EDungeonTimerDirection direction = 4 [json_name = "direction"];
	int32 index = 5 [json_name = "index"];
	int32 changeTime = 6 [json_name = "changeTime"];
	EDungeonTimerEffectType effectType = 7 [json_name = "effectType"];
	int32 pauseTime = 8 [json_name = "pauseTime"];
	int32 pauseTotalTime = 9 [json_name = "pauseTotalTime"];
	EDungeonTimerTimerLookType outLookType = 10 [json_name = "outLookType"];
	int32 curPauseTimestamp = 11 [json_name = "curPauseTimestamp"];
}
