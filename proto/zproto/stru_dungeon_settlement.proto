syntax = "proto3";

import "stru_dungeon_award.proto";
import "stru_dungeon_world_boss_settlement.proto";
import "stru_settlement_position.proto";
import "stru_dirty_mask.proto";

package zproto;

message DungeonSettlement {
	int32 passTime = 1 [json_name = "passTime"];
	map<int64, DungeonAward> award = 2 [json_name = "award"];
	map<uint32, SettlementPosition> settlementPos = 3 [json_name = "settlementPos"];
	DungeonWorldBossSettlement worldBossSettlement = 4 [json_name = "worldBossSettlement"];
	int32 masterModeScore = 5 [json_name = "masterModeScore"];
}
