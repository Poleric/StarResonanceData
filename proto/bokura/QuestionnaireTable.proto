syntax = "proto3";

import "table_basic.proto";

package bokura;

message QuestionnaireTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	string Link = 105 [json_name = "Link"];
	int32 LevelLimit = 1507 [json_name = "LevelLimit"];
	int32 DayLimit = 927 [json_name = "DayLimit"];
	int32 MailID = 265 [json_name = "MailID"];
	int_table Award = 187 [json_name = "Award"];
}

message QuestionnaireTableMgr {
	map<int32, QuestionnaireTableBase> datas = 1 [json_name = "datas"];
}
