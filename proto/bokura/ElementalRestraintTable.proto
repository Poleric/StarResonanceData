syntax = "proto3";

package bokura;

message ElementalRestraintTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 PropertyID = 62 [json_name = "PropertyID"];
	int32 DefenseGeneral = 553 [json_name = "DefenseGeneral"];
	int32 DefenseFire = 834 [json_name = "DefenseFire"];
	int32 DefenseWater = 635 [json_name = "DefenseWater"];
	int32 DefenseElectricity = 597 [json_name = "DefenseElectricity"];
	int32 DefenseWood = 1317 [json_name = "DefenseWood"];
	int32 DefenseWind = 1926 [json_name = "DefenseWind"];
	int32 DefenseRock = 512 [json_name = "DefenseRock"];
	int32 DefenseLight = 210 [json_name = "DefenseLight"];
	int32 DefenseDark = 937 [json_name = "DefenseDark"];
}

message ElementalRestraintTableMgr {
	map<int32, ElementalRestraintTableBase> datas = 1 [json_name = "datas"];
}
