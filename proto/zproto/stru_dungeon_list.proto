syntax = "proto3";

import "stru_dungeon_enter_limit.proto";
import "stru_dungeon_info.proto";
import "stru_dungeon_week_target_list.proto";
import "stru_raid_record.proto";
import "stru_dirty_mask.proto";

package zproto;

message DungeonList {
	map<int32, DungeonInfo> completeDungeon = 1 [json_name = "completeDungeon"];
	uint32 resetTime = 2 [json_name = "resetTime"];
	uint32 normalDungeonPassCount = 3 [json_name = "normalDungeonPassCount"];
	DungeonEnterLimit dungeonEnterLimit = 4 [json_name = "dungeonEnterLimit"];
	DungeonWeekTargetList weekTarget = 5 [json_name = "weekTarget"];
	bool isAssist = 6 [json_name = "isAssist"];
	map<int32, RaidRecord> raidRecordTable = 7 [json_name = "raidRecordTable"];
}
