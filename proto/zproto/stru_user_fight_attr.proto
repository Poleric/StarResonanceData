syntax = "proto3";

import "stru_skill_c_d_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message UserFightAttr {
	int64 curHp = 1 [json_name = "curHp"];
	int64 maxHp = 2 [json_name = "maxHp"];
	float originEnergy = 3 [json_name = "originEnergy"];
	repeated uint32 resourceIds = 4 [json_name = "resourceIds"];
	repeated uint32 resources = 5 [json_name = "resources"];
	int32 isDead = 6 [json_name = "isDead"];
	int64 deadTime = 7 [json_name = "deadTime"];
	int32 reviveId = 8 [json_name = "reviveId"];
	repeated SkillCDInfo cdInfo = 9 [json_name = "cdInfo"];
}
