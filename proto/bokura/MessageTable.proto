syntax = "proto3";

import "table_basic.proto";

package bokura;

message MessageTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Content = 783 [json_name = "Content"];
	int32 Type = 673 [json_name = "Type"];
	float DurationTime = 584 [json_name = "DurationTime"];
	mlstring ChatName = 1341 [json_name = "ChatName"];
	float Delay = 399 [json_name = "Delay"];
	int_array RepeatPlay = 1037 [json_name = "RepeatPlay"];
	int_array ShowChannel = 619 [json_name = "ShowChannel"];
	bool FilterRule = 1567 [json_name = "FilterRule"];
	bool IsShowInChat = 1135 [json_name = "IsShowInChat"];
	bool TypewriterEffect = 1435 [json_name = "TypewriterEffect"];
	int32 Interrupt = 1764 [json_name = "Interrupt"];
	string Audio = 1970 [json_name = "Audio"];
}

message MessageTableMgr {
	map<int32, MessageTableBase> datas = 1 [json_name = "datas"];
}
