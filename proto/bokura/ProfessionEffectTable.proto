syntax = "proto3";

import "table_basic.proto";

package bokura;

message ProfessionEffectTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	mlstring ShortDescription = 1271 [json_name = "ShortDescription"];
	mlstring Description = 75 [json_name = "Description"];
	int_array ArrtrId = 1648 [json_name = "ArrtrId"];
	int_array ValueRange = 1881 [json_name = "ValueRange"];
	int_table SignId = 1578 [json_name = "SignId"];
	int32 ResType = 39 [json_name = "ResType"];
	int_array Buffs = 3 [json_name = "Buffs"];
	int_table Arrtrs = 558 [json_name = "Arrtrs"];
	int32 NormalLibID = 1543 [json_name = "NormalLibID"];
	int32 ProLibID = 586 [json_name = "ProLibID"];
	bool IfClose = 838 [json_name = "IfClose"];
