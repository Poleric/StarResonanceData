syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message WeeklyTowerRecord {
	int64 beginTime = 1 [json_name = "beginTime"];
	int32 maxClimbUpId = 2 [json_name = "maxClimbUpId"];
	repeated int32 awardClimbUpIds = 3 [json_name = "awardClimbUpIds"];
	int32 ruleId = 4 [json_name = "ruleId"];
	int32 maxJumpAwardClimbUpId = 5 [json_name = "maxJumpAwardClimbUpId"];
	int32 lastMaxClimbUpId = 6 [json_name = "lastMaxClimbUpId"];
}
