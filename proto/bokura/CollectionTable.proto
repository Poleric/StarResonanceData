	bool ShowHudName = 566 [json_name = "ShowHudName"];
	string Remark = 1391 [json_name = "Remark"];
	int32 Type = 673 [json_name = "Type"];
	int32 ModelId = 555 [json_name = "ModelId"];
	int32 MapIcon = 39 [json_name = "MapIcon"];
	bool IsHighLight = 652 [json_name = "IsHighLight"];
	int_table VisibleCondition = 1353 [json_name = "VisibleCondition"];
	int32 DropModel = 604 [json_name = "DropModel"];
	int32 EntityAttributeID = 742 [json_name = "EntityAttributeID"];
	int_array InteractCondition = 1696 [json_name = "InteractCondition"];
	int32 PickRange = 1216 [json_name = "PickRange"];
	int32 PickActionID = 1309 [json_name = "PickActionID"];
	string PickSound = 397 [json_name = "PickSound"];
	int32 PickTime = 1807 [json_name = "PickTime"];
	int32 BuffInPickTime = 1792 [json_name = "BuffInPickTime"];
	int32 BuffAfterPick = 830 [json_name = "BuffAfterPick"];
	bool IsRefresh = 1720 [json_name = "IsRefresh"];
	string AIConfigPath = 1183 [json_name = "AIConfigPath"];
	string RunAwayAI = 727 [json_name = "RunAwayAI"];
	float AlertRange = 181 [json_name = "AlertRange"];
	int32 RunAwayTime = 1796 [json_name = "RunAwayTime"];
	string DieAction = 177 [json_name = "DieAction"];
	string FeedbackAction = 221 [json_name = "FeedbackAction"];
	int_table InteractionTemplate = 1682 [json_name = "InteractionTemplate"];
	string_array InteractionEvent = 1343 [json_name = "InteractionEvent"];
