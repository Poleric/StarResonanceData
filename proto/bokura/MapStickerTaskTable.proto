syntax = "proto3";

import "table_basic.proto";

package bokura;

message MapStickerTaskTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int_array TargetId = 1432 [json_name = "TargetId"];
	mlstring Title = 695 [json_name = "Title"];
	mlstring Des = 266 [json_name = "Des"];
	int32 TargetNum = 982 [json_name = "TargetNum"];
}

message MapStickerTaskTableMgr {
	map<int32, MapStickerTaskTableBase> datas = 1 [json_name = "datas"];
}
