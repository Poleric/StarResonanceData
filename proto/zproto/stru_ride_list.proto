syntax = "proto3";

import "enum_e_ride_property_type.proto";
import "stru_ride_data.proto";
import "stru_ride_skin_container.proto";
import "stru_dirty_mask.proto";

package zproto;

message RideList {
	map<int32, RideData> rides = 1 [json_name = "rides"];
	ERidePropertyType type = 2 [json_name = "type"];
	map<int32, RideSkinContainer> skinData = 3 [json_name = "skinData"];
}
