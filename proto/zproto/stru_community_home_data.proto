syntax = "proto3";

import "stru_community_homeland_recipe.proto";
import "stru_dirty_mask.proto";

package zproto;

message CommunityHomeData {
	int64 communityId = 1 [json_name = "communityId"];
	int64 homelandId = 2 [json_name = "homelandId"];
	int32 buyCount = 3 [json_name = "buyCount"];
	map<int32, CommunityHomelandRecipe> unlockedRecipes = 4 [json_name = "unlockedRecipes"];
	int32 level = 5 [json_name = "level"];
}
