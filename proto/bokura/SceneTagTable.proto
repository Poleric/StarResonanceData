syntax = "proto3";

import "table_basic.proto";

package bokura;

message SceneTagTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	string Icon1 = 652 [json_name = "Icon1"];
	string Icon2 = 1314 [json_name = "Icon2"];
	int32 Type = 673 [json_name = "Type"];
	string Param = 1207 [json_name = "Param"];
	int32 FunctionId = 149 [json_name = "FunctionId"];
	int32 TrackType = 1246 [json_name = "TrackType"];
	int32 Show = 183 [json_name = "Show"];
	int32 Unlock = 1666 [json_name = "Unlock"];
	int32 Level = 1120 [json_name = "Level"];
	int32 Sort = 1643 [json_name = "Sort"];
	int32 Number = 1714 [json_name = "Number"];
	int32 MiniShow = 591 [json_name = "MiniShow"];
	mlstring Description = 75 [json_name = "Description"];
}

message SceneTagTableMgr {
	map<int32, SceneTagTableBase> datas = 1 [json_name = "datas"];
}
