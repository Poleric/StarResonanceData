syntax = "proto3";

import "stru_item.proto";
import "stru_dirty_mask.proto";

package zproto;

message DungeonAward {
	map<int64, Item> items = 1 [json_name = "items"];
	int32 flagAssist = 2 [json_name = "flagAssist"];
	int32 awardCount = 3 [json_name = "awardCount"];
	repeated int64 firstItems = 4 [json_name = "firstItems"];
}
