syntax = "proto3";

import "table_basic.proto";

package bokura;

message NameCardTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	mlstring UnlockDes = 1991 [json_name = "UnlockDes"];
	string Image1 = 1583 [json_name = "Image1"];
	string Image2 = 2016 [json_name = "Image2"];
	int32 Unlock = 1666 [json_name = "Unlock"];
}

message NameCardTableMgr {
	map<int32, NameCardTableBase> datas = 1 [json_name = "datas"];
}
