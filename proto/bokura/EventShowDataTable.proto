syntax = "proto3";

import "table_basic.proto";

package bokura;

message EventShowDataTableBase {
	int64 Id = 1463 [json_name = "Id"];
	float Start = 678 [json_name = "Start"];
	float Duration = 544 [json_name = "Duration"];
	float End = 1415 [json_name = "End"];
	bool IsAttacker = 920 [json_name = "IsAttacker"];
	int32 StateId = 308 [json_name = "StateId"];
	int32 GroupId = 196 [json_name = "GroupId"];
	int32 EventType = 1355 [json_name = "EventType"];
	string_table ParamList = 1310 [json_name = "ParamList"];
}

message EventShowDataTableMgr {
	map<int64, EventShowDataTableBase> datas = 1 [json_name = "datas"];
}
