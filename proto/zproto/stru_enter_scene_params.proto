syntax = "proto3";

import "stru_transfer_param.proto";
import "google/protobuf/any.proto";

package zproto;

message EnterSceneParams {
	int32 changeSceneType = 1 [json_name = "changeSceneType"];
	int32 sceneId = 2 [json_name = "sceneId"];
	string sceneGuid = 3 [json_name = "sceneGuid"];
	TransferParam transferParam = 4 [json_name = "transferParam"];
	repeated google.protobuf.Any enterSceneParams = 5 [json_name = "enterSceneParams"];
}
