syntax = "proto3";

package zproto;

message DeviceInfo {
	string clientVersion = 1 [json_name = "clientVersion"];
	string systemSoftware = 2 [json_name = "systemSoftware"];
	string systemHardware = 3 [json_name = "systemHardware"];
	string telecomOper = 4 [json_name = "telecomOper"];
	string network = 5 [json_name = "network"];
	int32 screenWidth = 6 [json_name = "screenWidth"];
	int32 screenHight = 7 [json_name = "screenHight"];
	float density = 8 [json_name = "density"];
	string channel = 9 [json_name = "channel"];
	string cpuHardware = 10 [json_name = "cpuHardware"];
	int32 memory = 11 [json_name = "memory"];
	string glRender = 12 [json_name = "glRender"];
	string gLVersion = 13 [json_name = "gLVersion"];
	string deviceId = 14 [json_name = "deviceId"];
	string vClientIP = 15 [json_name = "vClientIP"];
	string vClientIPV6 = 16 [json_name = "vClientIPV6"];
	string ANDROID_OAID = 17 [json_name = "ANDROIDOAID"];
	string IOS_CAID = 18 [json_name = "IOSCAID"];
	string platformUserTag = 19 [json_name = "platformUserTag"];
	string MAC = 20 [json_name = "MAC"];
	string userAgent = 21 [json_name = "userAgent"];
	string OLD_CAID = 22 [json_name = "OLDCAID"];
}
