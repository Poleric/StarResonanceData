syntax = "proto3";

package zproto;

message NotifyQuestChangeStepParam {
	int32 questId = 1 [json_name = "questId"];
	int32 lastStep = 2 [json_name = "lastStep"];
	int32 lastStepStatus = 3 [json_name = "lastStepStatus"];
	int32 currSetp = 4 [json_name = "currSetp"];
	int32 lastQuestStatus = 5 [json_name = "lastQuestStatus"];
}
