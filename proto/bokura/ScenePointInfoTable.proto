syntax = "proto3";

import "table_basic.proto";

package bokura;

message ScenePointInfoTableBase {
	int32 UId = 2028 [json_name = "UId"];
	int32 GroupId = 196 [json_name = "GroupId"];
	number_array Position = 686 [json_name = "Position"];
	float Rotation = 783 [json_name = "Rotation"];
	number_array CamPosition = 1631 [json_name = "CamPosition"];
	float CamRotation = 422 [json_name = "CamRotation"];
	float RandomRadius = 2007 [json_name = "RandomRadius"];
	int32 CameraId = 472 [json_name = "CameraId"];
	float RandomInnerRadius = 843 [json_name = "RandomInnerRadius"];
}

message ScenePointInfoTableMgr {
	map<int32, ScenePointInfoTableBase> datas = 1 [json_name = "datas"];
}
