syntax = "proto3";

import "enum_e_match_ready_status.proto";
import "enum_e_talent_job_type.proto";
import "stru_match_player_show_info.proto";

package zproto;

message MatchPlayerInfo {
	int64 charId = 1 [json_name = "charId"];
	EMatchReadyStatus readyStatus = 2 [json_name = "readyStatus"];
	int32 professionId = 3 [json_name = "professionId"];
	ETalentJobType talentId = 4 [json_name = "talentId"];
	bool isAssist = 5 [json_name = "isAssist"];
	bool isBot = 6 [json_name = "isBot"];
	MatchPlayerShowInfo matchShowInfo = 7 [json_name = "matchShowInfo"];
}
