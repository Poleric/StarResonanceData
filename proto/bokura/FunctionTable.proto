syntax = "proto3";

import "table_basic.proto";

package bokura;

message FunctionTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	string Note = 453 [json_name = "Note"];
	string Atlas = 1702 [json_name = "Atlas"];
	string DialogIcon = 407 [json_name = "DialogIcon"];
	string Icon = 1153 [json_name = "Icon"];
	string_array FunctionOrder = 1467 [json_name = "FunctionOrder"];
	int32 ParentId = 1361 [json_name = "ParentId"];
	int32 Level = 1120 [json_name = "Level"];
	int32 RoleLevel = 567 [json_name = "RoleLevel"];
	int32 QuestId = 874 [json_name = "QuestId"];
	int_array QuestStepId = 481 [json_name = "QuestStepId"];
	int32 TimerId = 190 [json_name = "TimerId"];
	int32 OnOff = 1716 [json_name = "OnOff"];
	int32 Preview = 719 [json_name = "Preview"];
	mlstring PreviewText = 826 [json_name = "PreviewText"];
	int32 OpenTips = 1023 [json_name = "OpenTips"];
}

message FunctionTableMgr {
	map<int32, FunctionTableBase> datas = 1 [json_name = "datas"];
}
