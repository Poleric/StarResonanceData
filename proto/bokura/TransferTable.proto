syntax = "proto3";

import "table_basic.proto";

package bokura;

message TransferTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int32 PivotId = 1300 [json_name = "PivotId"];
	mlstring TransferDec = 1744 [json_name = "TransferDec"];
	int32 ScenePoint = 273 [json_name = "ScenePoint"];
	int_array AwardId = 1197 [json_name = "AwardId"];
	bool IsOn = 20 [json_name = "IsOn"];
	int32 SceneTag = 131 [json_name = "SceneTag"];
}

message TransferTableMgr {
	map<int32, TransferTableBase> datas = 1 [json_name = "datas"];
}
