syntax = "proto3";

import "table_basic.proto";

package bokura;

message FantasySolutionTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	mlstring Des = 266 [json_name = "Des"];
	int32 RecommendedType = 1244 [json_name = "RecommendedType"];
	int_array RecommendFantasyList = 1541 [json_name = "RecommendFantasyList"];
}

message FantasySolutionTableMgr {
	map<int32, FantasySolutionTableBase> datas = 1 [json_name = "datas"];
}
