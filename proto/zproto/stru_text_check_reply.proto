syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_session_info.proto";
import "stru_text_check_data_result.proto";

package zproto;

message TextCheckReply {
	SessionInfo session = 1 [json_name = "session"];
	TextCheckDataResult checkDataResult = 2 [json_name = "checkDataResult"];
	EErrorCode errCode = 3 [json_name = "errCode"];
}
