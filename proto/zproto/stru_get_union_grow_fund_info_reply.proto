syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_grow_fund_mem_info.proto";
import "stru_union_crowd_fund.proto";

package zproto;

message GetUnionGrowFundInfoReply {
	UnionCrowdFund crowdFund = 1 [json_name = "crowdFund"];
	repeated GrowFundMemInfo crowFuncMemList = 2 [json_name = "crowFuncMemList"];
	EErrorCode errCode = 3 [json_name = "errCode"];
}
