syntax = "proto3";

import "stru_profession_info.proto";
import "stru_profession_skill_info.proto";
import "stru_profession_talent_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message ProfessionList {
	int32 curProfessionId = 1 [json_name = "curProfessionId"];
	repeated int32 curAssistProfessions = 3 [json_name = "curAssistProfessions"];
	map<int32, ProfessionInfo> professionList = 4 [json_name = "professionList"];
	map<int32, ProfessionSkillInfo> aoyiSkillInfoMap = 7 [json_name = "aoyiSkillInfoMap"];
	uint32 totalTalentPoints = 8 [json_name = "totalTalentPoints"];
	uint32 totalTalentResetCount = 9 [json_name = "totalTalentResetCount"];
	map<int32, ProfessionTalentInfo> talentList = 10 [json_name = "talentList"];
	int32 resetProfessionListFlag = 11 [json_name = "resetProfessionListFlag"];
	uint32 totalAttackMark = 12 [json_name = "totalAttackMark"];
	uint32 totalGuardMark = 13 [json_name = "totalGuardMark"];
	uint32 totalHealMark = 14 [json_name = "totalHealMark"];
	int32 resetTalentMarkItemFlag = 15 [json_name = "resetTalentMarkItemFlag"];
	int32 resetTalentMarkItemPopUpNotice = 16 [json_name = "resetTalentMarkItemPopUpNotice"];
}
