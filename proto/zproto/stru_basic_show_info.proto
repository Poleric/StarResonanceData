syntax = "proto3";

import "enum_e_body_size.proto";

package zproto;

message BasicShowInfo {
	int64 charID = 1 [json_name = "charID"];
	string name = 2 [json_name = "name"];
	int32 gender = 3 [json_name = "gender"];
	EBodySize bodySize = 4 [json_name = "bodySize"];
	int32 level = 5 [json_name = "level"];
	uint32 curTalentPoolId = 6 [json_name = "curTalentPoolId"];
	uint32 unionHuntRandIdx = 7 [json_name = "unionHuntRandIdx"];
	bool isNewbie = 8 [json_name = "isNewbie"];
	bool isBackflow = 9 [json_name = "isBackflow"];
	int32 mentorShowType = 10 [json_name = "mentorShowType"];
}
