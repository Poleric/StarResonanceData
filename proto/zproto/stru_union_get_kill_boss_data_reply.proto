syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_union_raid_kill_boss_record.proto";

package zproto;

message UnionGetKillBossDataReply {
	int32 killCnt = 1 [json_name = "killCnt"];
	repeated UnionRaidKillBossRecord killBossRecords = 2 [json_name = "killBossRecords"];
	EErrorCode errCode = 3 [json_name = "errCode"];
