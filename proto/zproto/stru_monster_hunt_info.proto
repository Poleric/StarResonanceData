syntax = "proto3";

import "stru_monster_hunt_target.proto";
import "stru_dirty_mask.proto";

package zproto;

message MonsterHuntInfo {
	map<int32, MonsterHuntTarget> monsterHuntList = 1 [json_name = "monsterHuntList"];
	int32 curLevel = 2 [json_name = "curLevel"];
	int32 curExp = 3 [json_name = "curExp"];
	map<int32, int32> levelAwardFlag = 4 [json_name = "levelAwardFlag"];
	map<int32, int64> monsterHuntRefrshTime = 6 [json_name = "monsterHuntRefrshTime"];
}
