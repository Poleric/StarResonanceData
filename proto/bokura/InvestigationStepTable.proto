syntax = "proto3";

import "table_basic.proto";

package bokura;

message InvestigationStepTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int_array Clue = 251 [json_name = "Clue"];
	int_array InferenceStep = 1997 [json_name = "InferenceStep"];
	mlstring Conclusion = 879 [json_name = "Conclusion"];
	mlstring ConclusionTips = 287 [json_name = "ConclusionTips"];
	mlstring ConclusionBubble = 1977 [json_name = "ConclusionBubble"];
	int32 ConclusionAction = 500 [json_name = "ConclusionAction"];
	mlstring_array IockedBubble = 252 [json_name = "IockedBubble"];
	int_array IockedBubbleAction = 506 [json_name = "IockedBubbleAction"];
	mlstring_array ReviewBubble = 364 [json_name = "ReviewBubble"];
	int_array ReviewBubbleAction = 1051 [json_name = "ReviewBubbleAction"];
	bool QuickReasoning = 1018 [json_name = "QuickReasoning"];
}

message InvestigationStepTableMgr {
	map<int32, InvestigationStepTableBase> datas = 1 [json_name = "datas"];
}
