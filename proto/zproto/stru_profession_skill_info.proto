syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message ProfessionSkillInfo {
	int32 skillId = 1 [json_name = "skillId"];
	int32 level = 2 [json_name = "level"];
	repeated int32 replaceSkillIds = 3 [json_name = "replaceSkillIds"];
	int32 remodelLevel = 4 [json_name = "remodelLevel"];
	int32 curSkillSkin = 5 [json_name = "curSkillSkin"];
	map<int32, bool> activeSkillSkins = 6 [json_name = "activeSkillSkins"];
}
