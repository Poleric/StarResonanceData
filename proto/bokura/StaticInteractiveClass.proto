syntax = "proto3";

import "table_basic.proto";

package bokura;

message StaticInteractiveClassBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 InterationTemplate = 1657 [json_name = "InterationTemplate"];
	string_array PlayerActionStart = 530 [json_name = "PlayerActionStart"];
	string_array PlayerActionLoop = 1064 [json_name = "PlayerActionLoop"];
	string_array PlayerActionEnd = 1549 [json_name = "PlayerActionEnd"];
	int32 ExitType = 1391 [json_name = "ExitType"];
}

message StaticInteractiveClassMgr {
	map<int32, StaticInteractiveClassBase> datas = 1 [json_name = "datas"];
}
