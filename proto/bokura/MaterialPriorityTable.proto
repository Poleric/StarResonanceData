syntax = "proto3";

import "table_basic.proto";

package bokura;

message MaterialPriorityTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	string_array MaterialFilePath = 1380 [json_name = "MaterialFilePath"];
	int32 MaterialPriority = 1183 [json_name = "MaterialPriority"];
	int32 MaterialType = 1428 [json_name = "MaterialType"];
}

message MaterialPriorityTableMgr {
	map<int32, MaterialPriorityTableBase> datas = 1 [json_name = "datas"];
}
