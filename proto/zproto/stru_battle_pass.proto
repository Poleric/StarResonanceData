syntax = "proto3";

import "stru_battle_pass_award_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message BattlePass {
	int32 id = 1 [json_name = "id"];
	int32 level = 2 [json_name = "level"];
	int32 curexp = 3 [json_name = "curexp"];
	int32 weekExp = 4 [json_name = "weekExp"];
	int32 expLastTime = 5 [json_name = "expLastTime"];
	bool isUnlock = 6 [json_name = "isUnlock"];
	bool buyNormalPas = 7 [json_name = "buyNormalPas"];
	bool buyPrimePass = 8 [json_name = "buyPrimePass"];
	map<int32, BattlePassAwardInfo> award = 9 [json_name = "award"];
	bool isValid = 10 [json_name = "isValid"];
	bool isSendedMail = 11 [json_name = "isSendedMail"];
}
