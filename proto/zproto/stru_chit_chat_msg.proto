syntax = "proto3";

import "stru_basic_show_info.proto";
import "stru_chat_msg_info.proto";

package zproto;

message ChitChatMsg {
	int64 msgId = 1 [json_name = "msgId"];
	BasicShowInfo sendCharInfo = 2 [json_name = "sendCharInfo"];
	int64 timestamp = 3 [json_name = "timestamp"];
	ChatMsgInfo msgInfo = 4 [json_name = "msgInfo"];
}
