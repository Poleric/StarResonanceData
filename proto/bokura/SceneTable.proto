	bool LuaScript = 1809 [json_name = "LuaScript"];
	float FallDis = 1769 [json_name = "FallDis"];
	int32 Weather = 276 [json_name = "Weather"];
	int32 DayAndNight = 1682 [json_name = "DayAndNight"];
	int32 CutsceneId = 1653 [json_name = "CutsceneId"];
	int32 MainUi = 21 [json_name = "MainUi"];
	bool CanChangeLayer = 1110 [json_name = "CanChangeLayer"];
	number_table MaxLayer = 1414 [json_name = "MaxLayer"];
	int_array PreloadCutscenes = 1546 [json_name = "PreloadCutscenes"];
	int_array PreloadEPFlows = 135 [json_name = "PreloadEPFlows"];
