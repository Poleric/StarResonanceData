syntax = "proto3";

import "stru_int_vec3.proto";

package zproto;

message HomelandSetLamplightRequest {
	int32 lamplightLevel = 1 [json_name = "lamplightLevel"];
	IntVec3 lamplightColor = 2 [json_name = "lamplightColor"];
	int32 dayNightId = 3 [json_name = "dayNightId"];
	int32 mode = 4 [json_name = "mode"];
	bool isOuter = 5 [json_name = "isOuter"];
}
