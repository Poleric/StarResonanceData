syntax = "proto3";

import "table_basic.proto";

package bokura;

message MallTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 FunctionId = 149 [json_name = "FunctionId"];
	mlstring Name = 439 [json_name = "Name"];
	string NameRemark = 1535 [json_name = "NameRemark"];
	int32 HasFatherType = 1360 [json_name = "HasFatherType"];
	int32 MallType = 1688 [json_name = "MallType"];
	int_table RefreshIntervalType = 1604 [json_name = "RefreshIntervalType"];
	int_table WeightId = 2007 [json_name = "WeightId"];
	int32 TimerId = 190 [json_name = "TimerId"];
	int32 Sort = 1643 [json_name = "Sort"];
	int32 ShowCountDown = 1192 [json_name = "ShowCountDown"];
	int32 MallManualRefresh = 1340 [json_name = "MallManualRefresh"];
	int_table RefreshCostItem = 1637 [json_name = "RefreshCostItem"];
	string Icon = 1153 [json_name = "Icon"];
	int_array CurrencyDisplay = 1022 [json_name = "CurrencyDisplay"];
}

message MallTableMgr {
	map<int32, MallTableBase> datas = 1 [json_name = "datas"];
}
