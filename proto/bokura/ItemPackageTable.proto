syntax = "proto3";

import "table_basic.proto";

package bokura;

message ItemPackageTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	string Icon = 1153 [json_name = "Icon"];
	int32 Capacity = 197 [json_name = "Capacity"];
	int32 Show = 183 [json_name = "Show"];
	mlstring_table Classify = 746 [json_name = "Classify"];
	string Consume = 1838 [json_name = "Consume"];
	int32 CapacityExtra = 1638 [json_name = "CapacityExtra"];
}

message ItemPackageTableMgr {
	map<int32, ItemPackageTableBase> datas = 1 [json_name = "datas"];
}
