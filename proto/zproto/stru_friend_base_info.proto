syntax = "proto3";

import "stru_application_info.proto";
import "stru_social_info.proto";

package zproto;

message FriendBaseInfo {
	map<int64, SocialInfo> friendList = 1 [json_name = "friendList"];
	map<int32, string> groupIdList = 3 [json_name = "groupIdList"];
	repeated ApplicationInfo applicationList = 4 [json_name = "applicationList"];
	repeated int32 groupSort = 5 [json_name = "groupSort"];
}
