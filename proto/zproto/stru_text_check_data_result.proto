syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_text_check_item_result.proto";

package zproto;

message TextCheckDataResult {
	EErrorCode errCode = 1 [json_name = "errCode"];
	string errMsg = 2 [json_name = "errMsg"];
	repeated TextCheckItemResult itemResults = 3 [json_name = "itemResults"];
}
