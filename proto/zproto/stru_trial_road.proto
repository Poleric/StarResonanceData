syntax = "proto3";

import "stru_trial_road_room_target_award.proto";
import "stru_trial_road_target_award.proto";
import "stru_dirty_mask.proto";

package zproto;

message TrialRoad {
	repeated int32 passRoom = 1 [json_name = "passRoom"];
	map<int32, TrialRoadRoomTargetAward> roomTargetAward = 2 [json_name = "roomTargetAward"];
	TrialRoadTargetAward targetAward = 3 [json_name = "targetAward"];
}
