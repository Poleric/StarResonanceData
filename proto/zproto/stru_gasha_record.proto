syntax = "proto3";

import "stru_gasha_record_item_info.proto";

package zproto;

message GashaRecord {
	string charIdPool = 1 [json_name = "charIdPool"];
	uint32 poolId = 2 [json_name = "poolId"];
	repeated GashaRecordItemInfo gashaRecordInfo = 3 [json_name = "gashaRecordInfo"];
	int64 firstTimestamp = 4 [json_name = "firstTimestamp"];
}
