syntax = "proto3";

import "stru_char_team.proto";

package zproto;

message CardInfo {
	int64 charId = 1 [json_name = "charId"];
	string name = 2 [json_name = "name"];
	uint32 modelId = 3 [json_name = "modelId"];
	CharTeam teamInfo = 4 [json_name = "teamInfo"];
	bool isFriend = 5 [json_name = "isFriend"];
	string unionName = 6 [json_name = "unionName"];
	uint64 unionId = 7 [json_name = "unionId"];
	int32 roleLevel = 8 [json_name = "roleLevel"];
	int32 gender = 9 [json_name = "gender"];
	uint64 offlineTime = 10 [json_name = "offlineTime"];
}
