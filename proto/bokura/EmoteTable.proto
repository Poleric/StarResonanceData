syntax = "proto3";

import "table_basic.proto";

package bokura;

message EmoteTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int_array FaceDataId = 1991 [json_name = "FaceDataId"];
	int32 EmoteType = 1948 [json_name = "EmoteType"];
	int32 Type = 673 [json_name = "Type"];
	bool IsLoop = 109 [json_name = "IsLoop"];
	string Icon = 1153 [json_name = "Icon"];
	string IsShow = 822 [json_name = "IsShow"];
	string_array Emote = 587 [json_name = "Emote"];
}

message EmoteTableMgr {
	map<int32, EmoteTableBase> datas = 1 [json_name = "datas"];
}
