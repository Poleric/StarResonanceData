syntax = "proto3";

package bokura;

message EntityObjectLimitTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 BaseObjectLimit = 1874 [json_name = "BaseObjectLimit"];
	int32 SummonObjectLimit = 1680 [json_name = "SummonObjectLimit"];
	int32 TimerLimit = 1970 [json_name = "TimerLimit"];
	int32 SaveVarLimit = 1828 [json_name = "SaveVarLimit"];
}

message EntityObjectLimitTableMgr {
	map<int32, EntityObjectLimitTableBase> datas = 1 [json_name = "datas"];
}
