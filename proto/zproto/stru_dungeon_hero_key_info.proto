syntax = "proto3";

import "stru_hero_key_item_info.proto";
import "stru_item.proto";
import "stru_dirty_mask.proto";

package zproto;

message DungeonHeroKeyInfo {
	int64 charId = 1 [json_name = "charId"];
	repeated Item heroKeyItem = 2 [json_name = "heroKeyItem"];
	map<uint32, HeroKeyItemInfo> keyInfo = 3 [json_name = "keyInfo"];
	Item useItem = 4 [json_name = "useItem"];
	repeated Item heroKeyAwardItem = 5 [json_name = "heroKeyAwardItem"];
}
