syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message BuffDBData {
	int64 buffUuid = 1 [json_name = "buffUuid"];
	int64 firerId = 2 [json_name = "firerId"];
	uint32 buffConfigId = 3 [json_name = "buffConfigId"];
	uint32 baseId = 4 [json_name = "baseId"];
	uint32 level = 5 [json_name = "level"];
	uint32 layer = 6 [json_name = "layer"];
	int32 duration = 7 [json_name = "duration"];
	int32 count = 8 [json_name = "count"];
	int64 createTime = 9 [json_name = "createTime"];
	int32 partId = 10 [json_name = "partId"];
	int32 createSceneId = 11 [json_name = "createSceneId"];
	repeated string customParamsKey = 12 [json_name = "customParamsKey"];
	repeated int32 customParams = 13 [json_name = "customParams"];
}
