syntax = "proto3";

import "enum_e_interaction_template_action.proto";

package zproto;

message InteractionTemplateData {
	EInteractionTemplateAction type = 1 [json_name = "type"];
	uint64 objectId = 2 [json_name = "objectId"];
	int32 templateId = 3 [json_name = "templateId"];
	int64 homelandId = 4 [json_name = "homelandId"];
	int32 seatGroupIndex = 5 [json_name = "seatGroupIndex"];
	int32 subTemplateId = 6 [json_name = "subTemplateId"];
}
