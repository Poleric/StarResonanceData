syntax = "proto3";

import "enum_e_instrument_play_type.proto";
import "enum_e_instrument_sync_type.proto";

package zproto;

message InstrumentSyncData {
	EInstrumentSyncType syncType = 1 [json_name = "syncType"];
	int64 playTime = 2 [json_name = "playTime"];
	int32 playParam = 3 [json_name = "playParam"];
	EInstrumentPlayType playType = 4 [json_name = "playType"];
	int64 expectedSyncTime = 5 [json_name = "expectedSyncTime"];
}
