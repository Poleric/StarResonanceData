syntax = "proto3";

import "stru_community_player_info.proto";

package zproto;

message NotifyCommunityCohabitantInfoRequest {
	int64 communityId = 1 [json_name = "communityId"];
	int64 homelandId = 2 [json_name = "homelandId"];
	map<int64, CommunityPlayerInfo> cohabitant = 3 [json_name = "cohabitant"];
	int64 ownerCharId = 4 [json_name = "ownerCharId"];
	int64 removeCharId = 5 [json_name = "removeCharId"];
}
