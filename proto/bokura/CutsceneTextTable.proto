syntax = "proto3";

import "table_basic.proto";

package bokura;

message CutsceneTextTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring SpeakerName = 956 [json_name = "SpeakerName"];
	mlstring TextContent = 736 [json_name = "TextContent"];
	int32 PlotCharactersId = 1282 [json_name = "PlotCharactersId"];
	string VoiceEventName = 346 [json_name = "VoiceEventName"];
	string VoiceControlEvent = 1271 [json_name = "VoiceControlEvent"];
}

message CutsceneTextTableMgr {
	map<int32, CutsceneTextTableBase> datas = 1 [json_name = "datas"];
}
