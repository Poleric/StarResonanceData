syntax = "proto3";

package zproto;

message SessionInfo {
	uint32 peerId = 1 [json_name = "peerId"];
	int64 charId = 2 [json_name = "charId"];
	string accountId = 3 [json_name = "accountId"];
	uint64 traceId = 4 [json_name = "traceId"];
	string remoteIp = 5 [json_name = "remoteIp"];
	string agentGuid = 6 [json_name = "agentGuid"];
	bool isRobot = 7 [json_name = "isRobot"];
}
