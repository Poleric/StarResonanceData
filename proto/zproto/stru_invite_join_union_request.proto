syntax = "proto3";

package zproto;

message InviteJoinUnionRequest {
	int64 InviteId = 2 [json_name = "InviteId"];
	string inviteName = 3 [json_name = "inviteName"];
	string unionName = 4 [json_name = "unionName"];
	int64 unionId = 5 [json_name = "unionId"];
	int64 charid = 6 [json_name = "charid"];
}
