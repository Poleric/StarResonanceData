syntax = "proto3";

import "stru_mail_level_condition.proto";

package zproto;

message MailExtraCondition {
	MailLevelCondition level = 1 [json_name = "level"];
	repeated int32 loginChannels = 2 [json_name = "loginChannels"];
	int32 lastActiveDays = 3 [json_name = "lastActiveDays"];
	repeated string areaIds = 4 [json_name = "areaIds"];
	int64 registerAfterTime = 5 [json_name = "registerAfterTime"];
}
