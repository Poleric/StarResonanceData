syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message InteractionInfo {
	int32 interactionStage = 1 [json_name = "interactionStage"];
	int32 actionId = 2 [json_name = "actionId"];
	int64 originatorId = 3 [json_name = "originatorId"];
	int64 inviteeId = 4 [json_name = "inviteeId"];
	bool isOriginator = 5 [json_name = "isOriginator"];
	int32 interactionType = 6 [json_name = "interactionType"];
}
