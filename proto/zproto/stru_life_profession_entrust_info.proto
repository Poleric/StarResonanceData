syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message LifeProfessionEntrustInfo {
	uint32 lifeProfessionId = 1 [json_name = "lifeProfessionId"];
	uint32 beginTime = 2 [json_name = "beginTime"];
	uint32 endTime = 3 [json_name = "endTime"];
	uint32 baseId = 4 [json_name = "baseId"];
	uint32 count = 5 [json_name = "count"];
	uint32 costId = 6 [json_name = "costId"];
	uint32 cost = 7 [json_name = "cost"];
}
