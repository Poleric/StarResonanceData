syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_item.proto";

package zproto;

message ReceiveUnionActivityAwardReply {
	repeated int32 receivedPointAwardIds = 1 [json_name = "receivedPointAwardIds"];
	repeated Item items = 2 [json_name = "items"];
	int64 unionLastRefreshTime = 3 [json_name = "unionLastRefreshTime"];
	int64 unionCurrentRefreshTime = 4 [json_name = "unionCurrentRefreshTime"];
	int64 lastPoint = 5 [json_name = "lastPoint"];
	int64 currentPoint = 6 [json_name = "currentPoint"];
	EErrorCode errCode = 7 [json_name = "errCode"];
}
