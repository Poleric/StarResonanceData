syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message SkillCDInfo {
	int32 skillLevelId = 1 [json_name = "skillLevelId"];
	int64 skillBeginTime = 2 [json_name = "skillBeginTime"];
	int32 duration = 3 [json_name = "duration"];
	uint32 skillCDType = 4 [json_name = "skillCDType"];
	int64 professionHoldBeginTime = 6 [json_name = "professionHoldBeginTime"];
	int32 chargeCount = 7 [json_name = "chargeCount"];
	int32 validCDTime = 8 [json_name = "validCDTime"];
	int32 subCDRatio = 9 [json_name = "subCDRatio"];
	int64 subCDFixed = 10 [json_name = "subCDFixed"];
	int32 accelerateCDRatio = 11 [json_name = "accelerateCDRatio"];
}
