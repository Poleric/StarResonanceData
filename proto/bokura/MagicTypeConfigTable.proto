syntax = "proto3";

import "table_basic.proto";

package bokura;

message MagicTypeConfigTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	string EnumTypeName = 414 [json_name = "EnumTypeName"];
	string_array EnumNames = 1131 [json_name = "EnumNames"];
	int_array Indexs = 1541 [json_name = "Indexs"];
	string_array Descs = 1085 [json_name = "Descs"];
}

message MagicTypeConfigTableMgr {
	map<int32, MagicTypeConfigTableBase> datas = 1 [json_name = "datas"];
}
