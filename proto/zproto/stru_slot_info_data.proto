syntax = "proto3";

package zproto;

message SlotInfoData {
	int32 id = 1 [json_name = "id"];
	int32 skillId = 2 [json_name = "skillId"];
	bool isReplace = 3 [json_name = "isReplace"];
	bool showEffect = 4 [json_name = "showEffect"];
	int64 cd = 5 [json_name = "cd"];
	bool isAutoBattleClose = 6 [json_name = "isAutoBattleClose"];
}
