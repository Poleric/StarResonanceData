syntax = "proto3";

import "table_basic.proto";

package bokura;

message ParkourStyleActionTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int32 Level = 1120 [json_name = "Level"];
	int32 EnergyValue = 946 [json_name = "EnergyValue"];
	float WaitTime = 106 [json_name = "WaitTime"];
	int32 Dot = 849 [json_name = "Dot"];
}

message ParkourStyleActionTableMgr {
	map<int32, ParkourStyleActionTableBase> datas = 1 [json_name = "datas"];
}
