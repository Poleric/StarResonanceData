syntax = "proto3";

import "enum_e_gm_parsing_type.proto";

package zproto;

message GmCmd {
	string command = 1 [json_name = "command"];
	int64 targetCharId = 2 [json_name = "targetCharId"];
	EGmParsingType parsingType = 3 [json_name = "parsingType"];
	string parameter = 4 [json_name = "parameter"];
}
