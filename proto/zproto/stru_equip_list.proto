syntax = "proto3";

import "stru_equip_attr.proto";
import "stru_equip_enchant_info.proto";
import "stru_equip_info.proto";
import "stru_equip_suit_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message EquipList {
	map<int32, EquipInfo> equipList = 1 [json_name = "equipList"];
	EquipAttr equipAttr = 2 [json_name = "equipAttr"];
	map<uint64, EquipAttr> equipRecastInfo = 4 [json_name = "equipRecastInfo"];
	map<int64, EquipEnchantInfo> equipEnchant = 5 [json_name = "equipEnchant"];
	map<int32, EquipSuitInfo> suitInfoDict = 6 [json_name = "suitInfoDict"];
}
