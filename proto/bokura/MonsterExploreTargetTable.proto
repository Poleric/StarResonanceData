syntax = "proto3";

import "table_basic.proto";

package bokura;

message MonsterExploreTargetTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 TargetType = 736 [json_name = "TargetType"];
	int32 Num = 947 [json_name = "Num"];
	int32 SceneId = 1506 [json_name = "SceneId"];
	int_array Param = 1207 [json_name = "Param"];
	string TargetPos = 1118 [json_name = "TargetPos"];
	bool IsTeamShare = 1925 [json_name = "IsTeamShare"];
	mlstring TargetDes = 1279 [json_name = "TargetDes"];
	bool IsShowProgress = 56 [json_name = "IsShowProgress"];
	mlstring_array SpVariable = 280 [json_name = "SpVariable"];
	mlstring_array SpVariableLimit = 315 [json_name = "SpVariableLimit"];
	mlstring_array SpVariableName = 2006 [json_name = "SpVariableName"];
	int_array IsShowSpVariableProgress = 800 [json_name = "IsShowSpVariableProgress"];
}

message MonsterExploreTargetTableMgr {
	map<int32, MonsterExploreTargetTableBase> datas = 1 [json_name = "datas"];
}
