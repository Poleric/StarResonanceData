syntax = "proto3";

import "table_basic.proto";

package bokura;

message InvestigationClueTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 sort = 822 [json_name = "sort"];
	int_table UnlockCondition = 1014 [json_name = "UnlockCondition"];
	mlstring Clue = 251 [json_name = "Clue"];
	mlstring_array Answer = 311 [json_name = "Answer"];
	mlstring Tips = 1184 [json_name = "Tips"];
	mlstring_array TapBubble = 1681 [json_name = "TapBubble"];
	int_array TapBubbleAction = 1849 [json_name = "TapBubbleAction"];
	mlstring UnlockedBubble = 1539 [json_name = "UnlockedBubble"];
	int32 UnlockedBubbleAction = 130 [json_name = "UnlockedBubbleAction"];
}

message InvestigationClueTableMgr {
	map<int32, InvestigationClueTableBase> datas = 1 [json_name = "datas"];
}
