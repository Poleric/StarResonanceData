syntax = "proto3";

import "table_basic.proto";

package bokura;

message TalentTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 TalentId = 513 [json_name = "TalentId"];
	string Des = 266 [json_name = "Des"];
	mlstring TalentName = 1889 [json_name = "TalentName"];
	string TalentIcon = 180 [json_name = "TalentIcon"];
	int32 TalentType = 676 [json_name = "TalentType"];
	int32 TalentLevel = 580 [json_name = "TalentLevel"];
	int_table TalentEffect = 152 [json_name = "TalentEffect"];
	string_table BuffValueKey = 668 [json_name = "BuffValueKey"];
	int_table BuffPar = 1688 [json_name = "BuffPar"];
	int_table Unlock = 1666 [json_name = "Unlock"];
	int_table PreTalent = 1850 [json_name = "PreTalent"];
	int_table UnlockConsume = 1645 [json_name = "UnlockConsume"];
	int32 BdTagId = 1743 [json_name = "BdTagId"];
}

message TalentTableMgr {
	map<int32, TalentTableBase> datas = 1 [json_name = "datas"];
}
