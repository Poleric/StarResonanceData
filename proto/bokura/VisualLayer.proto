syntax = "proto3";

import "table_basic.proto";

package bokura;

message VisualLayerBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 VisualLayerType = 1532 [json_name = "VisualLayerType"];
	int32 MainUi = 21 [json_name = "MainUi"];
	int_array ReviveTableId = 1420 [json_name = "ReviveTableId"];
	string_array AudioBank = 1796 [json_name = "AudioBank"];
	string Bgm = 1107 [json_name = "Bgm"];
	int_array BlackMask = 911 [json_name = "BlackMask"];
}

message VisualLayerMgr {
	map<int32, VisualLayerBase> datas = 1 [json_name = "datas"];
}
