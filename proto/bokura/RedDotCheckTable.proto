syntax = "proto3";

package bokura;

message RedDotCheckTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string CheckMethodName = 776 [json_name = "CheckMethodName"];
	string FileName = 1506 [json_name = "FileName"];
	int32 FunctionId = 149 [json_name = "FunctionId"];
	int32 CheckMethodType = 690 [json_name = "CheckMethodType"];
}

message RedDotCheckTableMgr {
	map<int32, RedDotCheckTableBase> datas = 1 [json_name = "datas"];
}
