syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_exchange_sale_record.proto";

package zproto;

message ExchangeSaleRecordReply {
	repeated ExchangeSaleRecord buyRecord = 2 [json_name = "buyRecord"];
	repeated ExchangeSaleRecord sellRecord = 3 [json_name = "sellRecord"];
	EErrorCode errCode = 4 [json_name = "errCode"];
}
