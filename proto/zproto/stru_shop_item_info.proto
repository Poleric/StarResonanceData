syntax = "proto3";

import "stru_shop_item_buy_limit.proto";
import "enum_shop_limit_buy_type.proto";

package zproto;

message ShopItemInfo {
	int32 itemId = 1 [json_name = "itemId"];
	int64 startTime = 2 [json_name = "startTime"];
	int64 endTime = 3 [json_name = "endTime"];
	ShopLimitBuyType limitBuyType = 4 [json_name = "limitBuyType"];
	map<int32, ShopItemBuyLimit> buyCount = 5 [json_name = "buyCount"];
}
