syntax = "proto3";

import "stru_cut_scene_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message CutSceneInfos {
	map<int32, CutSceneInfo> cutSceneInfos = 1 [json_name = "cutSceneInfos"];
	map<int32, bool> finishedCutScenes = 2 [json_name = "finishedCutScenes"];
	map<int64, bool> finishedInfos = 3 [json_name = "finishedInfos"];
}
