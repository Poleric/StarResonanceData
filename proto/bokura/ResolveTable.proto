syntax = "proto3";

import "table_basic.proto";

package bokura;

message ResolveTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 ItemID = 609 [json_name = "ItemID"];
	string ItemName = 1477 [json_name = "ItemName"];
	int_array GetItem = 859 [json_name = "GetItem"];
	int32 FunctionId = 149 [json_name = "FunctionId"];
	int32 Limit = 640 [json_name = "Limit"];
}

message ResolveTableMgr {
	map<int32, ResolveTableBase> datas = 1 [json_name = "datas"];
}
