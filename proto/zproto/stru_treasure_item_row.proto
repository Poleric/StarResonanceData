syntax = "proto3";

import "stru_treasure_item_target.proto";
import "stru_dirty_mask.proto";

package zproto;

message TreasureItemRow {
	int32 configId = 1 [json_name = "configId"];
	map<int32, TreasureItemTarget> mainTargets = 2 [json_name = "mainTargets"];
	map<int32, TreasureItemTarget> subTargets = 3 [json_name = "subTargets"];
}
