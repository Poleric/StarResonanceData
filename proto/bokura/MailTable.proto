syntax = "proto3";

import "table_basic.proto";

package bokura;

message MailTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Title = 695 [json_name = "Title"];
	int32 NpcId = 694 [json_name = "NpcId"];
	mlstring NpcName = 1186 [json_name = "NpcName"];
	mlstring Content = 783 [json_name = "Content"];
	int32 AwardId = 1197 [json_name = "AwardId"];
	string MailGroupContent = 1572 [json_name = "MailGroupContent"];
	int32 ExpireTime = 418 [json_name = "ExpireTime"];
	int32 MailType = 56 [json_name = "MailType"];
	int32 Important = 1782 [json_name = "Important"];
	int32 LimitType = 92 [json_name = "LimitType"];
}

message MailTableMgr {
	map<int32, MailTableBase> datas = 1 [json_name = "datas"];
}
