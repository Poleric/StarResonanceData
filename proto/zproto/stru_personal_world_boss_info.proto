syntax = "proto3";

import "stru_common_award_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message PersonalWorldBossInfo {
	int32 score = 1 [json_name = "score"];
	map<int32, CommonAwardInfo> scoreAwardInfo = 2 [json_name = "scoreAwardInfo"];
	map<int32, CommonAwardInfo> bossAwardInfo = 3 [json_name = "bossAwardInfo"];
	int32 uuid = 4 [json_name = "uuid"];
}
