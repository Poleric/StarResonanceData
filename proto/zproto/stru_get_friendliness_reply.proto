syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_friendliness.proto";
import "stru_total_friendliness.proto";

package zproto;

message GetFriendlinessReply {
	map<int64, Friendliness> friendlinessList = 1 [json_name = "friendlinessList"];
	TotalFriendliness totalFriendliness = 2 [json_name = "totalFriendliness"];
	EErrorCode errCode = 3 [json_name = "errCode"];
}
