syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message EquipAttrSet {
	map<int32, int32> basicAttr = 1 [json_name = "basicAttr"];
	map<int32, int32> advanceAttr = 2 [json_name = "advanceAttr"];
	map<int32, int32> recastAttr = 3 [json_name = "recastAttr"];
	map<int32, int32> rareQualityAttr = 4 [json_name = "rareQualityAttr"];
}
