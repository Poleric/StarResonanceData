syntax = "proto3";

import "stru_user_summary_data.proto";

package zproto;

message SocialInfo {
	string remark = 1 [json_name = "remark"];
	bool remind = 2 [json_name = "remind"];
	bool top = 3 [json_name = "top"];
	int32 groupId = 4 [json_name = "groupId"];
	UserSummaryData socialData = 5 [json_name = "socialData"];
	int64 lastRefreshTime = 6 [json_name = "lastRefreshTime"];
}
