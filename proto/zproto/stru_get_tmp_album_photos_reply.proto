syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_photo_graph_show.proto";

package zproto;

message GetTmpAlbumPhotosReply {
	repeated PhotoGraphShow photoGraphs = 1 [json_name = "photoGraphs"];
	int32 curUploadTimes = 2 [json_name = "curUploadTimes"];
	int32 maxUploadTimes = 3 [json_name = "maxUploadTimes"];
	EErrorCode errCode = 4 [json_name = "errCode"];
}
