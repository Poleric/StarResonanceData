syntax = "proto3";

import "stru_notify_add_private_chat_session_request.proto";
import "stru_notify_be_muted_request.proto";
import "stru_notify_clear_chat_history_request.proto";
import "stru_notify_newbie_chat_channel_id_request.proto";
import "stru_notify_newest_chit_chat_msgs_request.proto";

package zproto;

message ChitChatNtf {
	message NotifyNewestChitChatMsgs {
		NotifyNewestChitChatMsgsRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyBeMuted {
		NotifyBeMutedRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyAddPrivateChatSession {
		NotifyAddPrivateChatSessionRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyClearChatHistory {
		NotifyClearChatHistoryRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyNewbieChatChannelId {
		NotifyNewbieChatChannelIdRequest vRequest = 1 [json_name = "vRequest"];
	}
}
