syntax = "proto3";

import "table_basic.proto";

package bokura;

message MonsterFightAreaTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string_array AreaName = 1408 [json_name = "AreaName"];
	int_array AreaHateWeight = 747 [json_name = "AreaHateWeight"];
	number_table AreaRadius = 499 [json_name = "AreaRadius"];
	float AreaMaximumRadius = 262 [json_name = "AreaMaximumRadius"];
	number_table AreaAngle = 1241 [json_name = "AreaAngle"];
	float PlayerHateWeight = 1180 [json_name = "PlayerHateWeight"];
}

message MonsterFightAreaTableMgr {
	map<int32, MonsterFightAreaTableBase> datas = 1 [json_name = "datas"];
}
