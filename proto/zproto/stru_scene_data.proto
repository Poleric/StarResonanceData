syntax = "proto3";

import "stru_last_scene_data.proto";
import "stru_position.proto";
import "stru_dirty_mask.proto";

package zproto;

message SceneData {
	uint32 mapId = 1 [json_name = "mapId"];
	uint32 channelId = 2 [json_name = "channelId"];
	Position pos = 3 [json_name = "pos"];
	int64 levelUuid = 4 [json_name = "levelUuid"];
	Position levelPos = 5 [json_name = "levelPos"];
	uint32 levelMapId = 6 [json_name = "levelMapId"];
	uint32 levelReviveId = 7 [json_name = "levelReviveId"];
	map<uint32, uint32> recordId = 8 [json_name = "recordId"];
	uint32 planeId = 9 [json_name = "planeId"];
	uint32 sceneLayer = 10 [json_name = "sceneLayer"];
	bool canSwitchLayer = 11 [json_name = "canSwitchLayer"];
	Position beforeFallPos = 12 [json_name = "beforeFallPos"];
	string sceneGuid = 13 [json_name = "sceneGuid"];
	string dungeonGuid = 14 [json_name = "dungeonGuid"];
	uint32 lineId = 15 [json_name = "lineId"];
	uint32 visualLayerConfigId = 16 [json_name = "visualLayerConfigId"];
	LastSceneData lastSceneData = 17 [json_name = "lastSceneData"];
	int32 sceneAreaId = 18 [json_name = "sceneAreaId"];
	int32 levelAreaId = 19 [json_name = "levelAreaId"];
	int32 beforeFallSceneAreaId = 20 [json_name = "beforeFallSceneAreaId"];
	int32 staticSceneActVer = 21 [json_name = "staticSceneActVer"];
}
