syntax = "proto3";

import "stru_home_land_item_instance.proto";
import "stru_structure_land_op.proto";

package zproto;

message PollenUpdateStructureRequest {
	int64 homeId = 1 [json_name = "homeId"];
	StructureLandOp op = 2 [json_name = "op"];
	HomeLandItemInstance pollenInstance = 3 [json_name = "pollenInstance"];
}
