syntax = "proto3";

import "stru_picture_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message AvatarInfo {
	int32 avatarId = 1 [json_name = "avatarId"];
	PictureInfo profile = 2 [json_name = "profile"];
	PictureInfo halfBody = 3 [json_name = "halfBody"];
	int32 businessCardStyleId = 4 [json_name = "businessCardStyleId"];
	int32 avatarFrameId = 5 [json_name = "avatarFrameId"];
}
