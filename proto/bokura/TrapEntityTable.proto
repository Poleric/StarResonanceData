syntax = "proto3";

import "table_basic.proto";

package bokura;

message TrapEntityTableBase {
	int32 UId = 2028 [json_name = "UId"];
	int32 Id = 1463 [json_name = "Id"];
	int32 GroupId = 196 [json_name = "GroupId"];
	number_array Position = 686 [json_name = "Position"];
	float Rotation = 783 [json_name = "Rotation"];
	int32 RefreshMode = 1638 [json_name = "RefreshMode"];
	bool RefreshAfterDied = 459 [json_name = "RefreshAfterDied"];
	bool ConstPointRefresh = 811 [json_name = "ConstPointRefresh"];
	float RefreshRangeMin = 1556 [json_name = "RefreshRangeMin"];
	float RefreshRangeMax = 1572 [json_name = "RefreshRangeMax"];
	bool MultiPointsRefresh = 1408 [json_name = "MultiPointsRefresh"];
	number_array RefreshPoints = 1121 [json_name = "RefreshPoints"];
	float RefreshTimeMin = 514 [json_name = "RefreshTimeMin"];
	float RefreshTimeMax = 895 [json_name = "RefreshTimeMax"];
	int32 CampId = 261 [json_name = "CampId"];
	int32 Visible = 788 [json_name = "Visible"];
	int32 Usable = 1633 [json_name = "Usable"];
	float OverrideScale = 1301 [json_name = "OverrideScale"];
	int32 EntMask = 1865 [json_name = "EntMask"];
	float AlertRange = 181 [json_name = "AlertRange"];
	int_table RefreshCondition = 1476 [json_name = "RefreshCondition"];
	bool IsNotGround = 1489 [json_name = "IsNotGround"];
	bool IsStatic = 1021 [json_name = "IsStatic"];
	int32 VisualLayerId = 755 [json_name = "VisualLayerId"];
	int32 SourceType = 380 [json_name = "SourceType"];
	int32 DefaultState = 1528 [json_name = "DefaultState"];
}

message TrapEntityTableMgr {
	map<int32, TrapEntityTableBase> datas = 1 [json_name = "datas"];
}
