syntax = "proto3";

import "stru_map_sticker_task_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message MapStickerInfo {
	map<uint32, MapStickerTaskInfo> stickerMap = 1 [json_name = "stickerMap"];
	repeated uint32 finishMap = 2 [json_name = "finishMap"];
	uint32 awardFlag = 3 [json_name = "awardFlag"];
}
