syntax = "proto3";

import "enum_e_platform_func_type.proto";
import "stru_upload_photo_successful_data.proto";

package zproto;

message UploadPhotoSuccessfulRequest {
	int64 charId = 2 [json_name = "charId"];
	uint32 pictureId = 3 [json_name = "pictureId"];
	EPlatformFuncType funcType = 4 [json_name = "funcType"];
	repeated UploadPhotoSuccessfulData data = 5 [json_name = "data"];
	int64 ownerId = 6 [json_name = "ownerId"];
}
