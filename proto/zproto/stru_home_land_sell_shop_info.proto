syntax = "proto3";

import "stru_collecting_item.proto";

package zproto;

message HomeLandSellShopInfo {
	bool isInit = 1 [json_name = "isInit"];
	int64 nextReflushTime = 2 [json_name = "nextReflushTime"];
	map<int32, CollectingItem> collectingItems = 3 [json_name = "collectingItems"];
	int64 newNextReflushSec = 4 [json_name = "newNextReflushSec"];
}
