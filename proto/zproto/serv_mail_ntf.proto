syntax = "proto3";

import "stru_sync_mail_info_request.proto";
import "stru_sync_mail_list_num_request.proto";
import "stru_sync_new_mail_request.proto";

package zproto;

message MailNtf {
	message SyncMailInfo {
		SyncMailInfoRequest request = 1 [json_name = "request"];
	}

	message SyncMailListNum {
		SyncMailListNumRequest request = 1 [json_name = "request"];
	}

	message SyncNewMail {
		SyncNewMailRequest request = 1 [json_name = "request"];
	}
}
