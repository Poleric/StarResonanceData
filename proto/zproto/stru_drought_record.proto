syntax = "proto3";

package zproto;

message DroughtRecord {
	int64 triggerTime = 1 [json_name = "triggerTime"];
	int32 segmentId = 2 [json_name = "segmentId"];
	int64 duration = 3 [json_name = "duration"];
	int64 actualEndTime = 4 [json_name = "actualEndTime"];
	bool isWatered = 5 [json_name = "isWatered"];
	bool IsExpired = 6 [json_name = "IsExpired"];
}
