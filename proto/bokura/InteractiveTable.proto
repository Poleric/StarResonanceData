syntax = "proto3";

import "table_basic.proto";

package bokura;

message InteractiveTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 TriggerMode = 730 [json_name = "TriggerMode"];
	int32 TriggerBtnId = 482 [json_name = "TriggerBtnId"];
	int32 TriggerType = 1894 [json_name = "TriggerType"];
	number_array TriggerRange = 360 [json_name = "TriggerRange"];
	int32 TriggerAngle = 1636 [json_name = "TriggerAngle"];
	int_table TriggerCondition = 1709 [json_name = "TriggerCondition"];
	int32 IsMore = 1258 [json_name = "IsMore"];
	int32 TriggerTime = 1115 [json_name = "TriggerTime"];
	int32 Insightusable = 71 [json_name = "Insightusable"];
	int32 ModelInvisible = 391 [json_name = "ModelInvisible"];
	int_table Condition = 1634 [json_name = "Condition"];
	string Action = 1280 [json_name = "Action"];
	string_array ActionParam = 1533 [json_name = "ActionParam"];
	int32 SortId = 1586 [json_name = "SortId"];
	int32 TipsGroup = 1901 [json_name = "TipsGroup"];
}

message InteractiveTableMgr {
	map<int32, InteractiveTableBase> datas = 1 [json_name = "datas"];
}
