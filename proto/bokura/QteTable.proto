syntax = "proto3";

import "table_basic.proto";

package bokura;

message QteTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string name = 176 [json_name = "name"];
	int32 QTEType = 1505 [json_name = "QTEType"];
	int32 UIType = 914 [json_name = "UIType"];
	float maxTime = 1798 [json_name = "maxTime"];
	number_table timeQuantum = 900 [json_name = "timeQuantum"];
	int_array triggerCount = 2 [json_name = "triggerCount"];
	number_table triggerTime = 451 [json_name = "triggerTime"];
	int_table playSkill = 1549 [json_name = "playSkill"];
	int_table buffIdWhenSuccess = 1259 [json_name = "buffIdWhenSuccess"];
	int_array buffIdWhenFailure = 959 [json_name = "buffIdWhenFailure"];
	int32 QTEShowSkillId = 1403 [json_name = "QTEShowSkillId"];
	number_table EventParams = 1429 [json_name = "EventParams"];
	int32 functionId = 818 [json_name = "functionId"];
	int_array impactFunctionId = 1586 [json_name = "impactFunctionId"];
	int32 impactType = 357 [json_name = "impactType"];
}

message QteTableMgr {
	map<int32, QteTableBase> datas = 1 [json_name = "datas"];
}
