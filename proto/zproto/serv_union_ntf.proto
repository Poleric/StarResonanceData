syntax = "proto3";

import "stru_notify_building_upgrade_end_request.proto";
import "stru_notify_effect_buf_change_request.proto";
import "stru_notify_invite_join_union_request.proto";
import "stru_notify_member_online_request.proto";
import "stru_notify_official_limit_update_request.proto";
import "stru_notify_request_list_num_request.proto";
import "stru_notify_union_activity_progress_request.proto";
import "stru_notify_union_activity_request.proto";
import "stru_notify_union_info_request.proto";
import "stru_notify_union_official_change_request.proto";
import "stru_notify_union_resource_change_request.proto";
import "stru_notify_union_sub_func_unlock_request.proto";
import "stru_notify_update_member_request.proto";

package zproto;

message UnionNtf {
	message NotifyUnionInfo {
		NotifyUnionInfoRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyOfficialLimitUpdate {
		NotifyOfficialLimitUpdateRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyUpdateMember {
		NotifyUpdateMemberRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyRequestListNum {
		NotifyRequestListNumRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyInviteJoinUnion {
		NotifyInviteJoinUnionRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyUnionActivity {
		NotifyUnionActivityRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyUnionActivityProgress {
		NotifyUnionActivityProgressRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyUnionResourceChange {
		NotifyUnionResourceChangeRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyBuildingUpgradeEnd {
		NotifyBuildingUpgradeEndRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyEffectBufChange {
		NotifyEffectBufChangeRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyUnionOfficialChange {
		NotifyUnionOfficialChangeRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyUnionSubFuncUnlock {
		NotifyUnionSubFuncUnlockRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyMemberOnline {
		NotifyMemberOnlineRequest vRequest = 1 [json_name = "vRequest"];
	}
}
