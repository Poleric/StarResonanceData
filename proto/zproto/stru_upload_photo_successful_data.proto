syntax = "proto3";

import "enum_e_picture_type.proto";

package zproto;

message UploadPhotoSuccessfulData {
	EPictureType pictureType = 1 [json_name = "pictureType"];
	uint32 pictureSize = 2 [json_name = "pictureSize"];
	uint32 version = 3 [json_name = "version"];
	string pictureUrl = 4 [json_name = "pictureUrl"];
}
