syntax = "proto3";

package bokura;

message UnionTagTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Type = 673 [json_name = "Type"];
	string ShowTagRoute = 379 [json_name = "ShowTagRoute"];
	string Description = 75 [json_name = "Description"];
	int32 ShowSort = 1506 [json_name = "ShowSort"];
	int32 IsHide = 1851 [json_name = "IsHide"];
}

message UnionTagTableMgr {
	map<int32, UnionTagTableBase> datas = 1 [json_name = "datas"];
}
