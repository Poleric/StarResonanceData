syntax = "proto3";

import "stru_user_activity_reward_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message UserActivityInfo {
	uint64 startTime = 2 [json_name = "startTime"];
	uint64 endTime = 3 [json_name = "endTime"];
	map<uint32, UserActivityRewardInfo> rewards = 4 [json_name = "rewards"];
}
