syntax = "proto3";

import "table_basic.proto";

package bokura;

message SettingsTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int32 SystemId = 518 [json_name = "SystemId"];
	int32 TypesId = 1912 [json_name = "TypesId"];
	int32 OperateType = 1525 [json_name = "OperateType"];
	string DescribeKey = 1288 [json_name = "DescribeKey"];
	string Des = 266 [json_name = "Des"];
	string Value = 616 [json_name = "Value"];
	int32 DataStorage = 1251 [json_name = "DataStorage"];
	string Link = 105 [json_name = "Link"];
}

message SettingsTableMgr {
	map<int32, SettingsTableBase> datas = 1 [json_name = "datas"];
}
