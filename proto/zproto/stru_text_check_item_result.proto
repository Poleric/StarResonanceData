syntax = "proto3";

import "enum_e_error_code.proto";

package zproto;

message TextCheckItemResult {
	EErrorCode errCode = 1 [json_name = "errCode"];
	string errMsg = 2 [json_name = "errMsg"];
	int32 itemErrCode = 3 [json_name = "itemErrCode"];
	string itemErrMsg = 4 [json_name = "itemErrMsg"];
	string context = 5 [json_name = "context"];
	string requestId = 6 [json_name = "requestId"];
	int32 textCheckResult = 7 [json_name = "textCheckResult"];
	string filteredText = 8 [json_name = "filteredText"];
	int32 lable = 9 [json_name = "lable"];
	string checkDesc = 10 [json_name = "checkDesc"];
}
