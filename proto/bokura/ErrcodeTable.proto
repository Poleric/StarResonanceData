syntax = "proto3";

import "table_basic.proto";

package bokura;

message ErrcodeTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Errcode = 1759 [json_name = "Errcode"];
	mlstring Content = 783 [json_name = "Content"];
	int32 MessageId = 1544 [json_name = "MessageId"];
}

message ErrcodeTableMgr {
	map<int32, ErrcodeTableBase> datas = 1 [json_name = "datas"];
}
