syntax = "proto3";

import "stru_chit_chat_msg.proto";
import "enum_e_error_code.proto";

package zproto;

message GetChipChatRecordsReply {
	bool isEnd = 3 [json_name = "isEnd"];
	int64 maxReadMsgId = 4 [json_name = "maxReadMsgId"];
	repeated ChitChatMsg multiMsgList = 5 [json_name = "multiMsgList"];
	EErrorCode errCode = 6 [json_name = "errCode"];
}
