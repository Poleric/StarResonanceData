syntax = "proto3";

import "table_basic.proto";

package bokura;

message BulletShapeTableBase {
	int64 Id = 1463 [json_name = "Id"];
	int32 ShapeType = 881 [json_name = "ShapeType"];
	number_array ShapeData = 1901 [json_name = "ShapeData"];
	number_table ScaleCurve = 627 [json_name = "ScaleCurve"];
	number_table ScaleCurveSample = 638 [json_name = "ScaleCurveSample"];
}

message BulletShapeTableMgr {
	map<int64, BulletShapeTableBase> datas = 1 [json_name = "datas"];
}
