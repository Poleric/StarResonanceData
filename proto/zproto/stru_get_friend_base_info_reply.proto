syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_friend_base_info.proto";
import "stru_friendliness.proto";
import "stru_total_friendliness.proto";

package zproto;

message GetFriendBaseInfoReply {
	FriendBaseInfo baseInfo = 3 [json_name = "baseInfo"];
	map<int64, Friendliness> friendlinessList = 5 [json_name = "friendlinessList"];
	TotalFriendliness totalFriendliness = 6 [json_name = "totalFriendliness"];
	EErrorCode errCode = 7 [json_name = "errCode"];
}
