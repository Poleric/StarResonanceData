syntax = "proto3";

package bokura;

message ActionTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string ActionEffect = 795 [json_name = "ActionEffect"];
	bool IsBlend = 173 [json_name = "IsBlend"];
	bool IsUpper = 1666 [json_name = "IsUpper"];
	float LookAtBodyWeight = 1807 [json_name = "LookAtBodyWeight"];
	int32 UnlockItem = 702 [json_name = "UnlockItem"];
	bool IsFollow = 1100 [json_name = "IsFollow"];
}

message ActionTableMgr {
	map<int32, ActionTableBase> datas = 1 [json_name = "datas"];
}
