syntax = "proto3";

import "table_basic.proto";

package bokura;

message ItemTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	string Icon = 1153 [json_name = "Icon"];
	int32 Type = 673 [json_name = "Type"];
	int32 GroupId = 196 [json_name = "GroupId"];
	int32 Quality = 1961 [json_name = "Quality"];
	int32 SortID = 504 [json_name = "SortID"];
	mlstring Description = 75 [json_name = "Description"];
	int32 SexLimit = 794 [json_name = "SexLimit"];
	int32 Overlap = 291 [json_name = "Overlap"];
	int32 TimeType = 1317 [json_name = "TimeType"];
	string TimeLimit = 1722 [json_name = "TimeLimit"];
	int32 DropModel = 604 [json_name = "DropModel"];
	int32 CorrelationId = 909 [json_name = "CorrelationId"];
	bool IsSpecialDisplay = 1060 [json_name = "IsSpecialDisplay"];
	int32 SpecialDisplayType = 1207 [json_name = "SpecialDisplayType"];
	int32 QuickUse = 1109 [json_name = "QuickUse"];
}

message ItemTableMgr {
	map<int32, ItemTableBase> datas = 1 [json_name = "datas"];
}
