syntax = "proto3";

import "table_basic.proto";

package bokura;

message AwardTableBase {
	int32 AwardID = 1636 [json_name = "AwardID"];
	int32 AwardType = 286 [json_name = "AwardType"];
	int_table GroupContent = 1304 [json_name = "GroupContent"];
	int_table GroupNum = 1180 [json_name = "GroupNum"];
	number_array GroupRates = 1603 [json_name = "GroupRates"];
	int_array GroupWeight = 1949 [json_name = "GroupWeight"];
	int32 AwardTime = 953 [json_name = "AwardTime"];
	int_array BindInfo = 1890 [json_name = "BindInfo"];
	int_table ProItem = 765 [json_name = "ProItem"];
	number_table ProRule = 656 [json_name = "ProRule"];
	int32 LevelUpConditions = 1210 [json_name = "LevelUpConditions"];
	int_table LevelUpConfig = 195 [json_name = "LevelUpConfig"];
	int_array LevelUpPackage = 1896 [json_name = "LevelUpPackage"];
	int_table PreviewItem = 1527 [json_name = "PreviewItem"];
	int_table PreviewItemInfo = 1522 [json_name = "PreviewItemInfo"];
	int_array LimitType = 92 [json_name = "LimitType"];
	string_table LimitParams = 1714 [json_name = "LimitParams"];
	int_array EquipLvLimit = 1752 [json_name = "EquipLvLimit"];
	int_array AttrFixRatio = 925 [json_name = "AttrFixRatio"];
	int32 PreviewUseLimite = 1454 [json_name = "PreviewUseLimite"];
	int_array SignPara = 2813 [json_name = "SignPara"];
	int32 HidePreview = 2019 [json_name = "HidePreview"];
}

message AwardTableMgr {
	map<int32, AwardTableBase> datas = 1 [json_name = "datas"];
}
