syntax = "proto3";

import "enum_e_receive_reward_status.proto";
import "stru_month_card_item.proto";
import "stru_dirty_mask.proto";

package zproto;

message MonthlyCardInfo {
	EReceiveRewardStatus limitAwardStatus = 1 [json_name = "limitAwardStatus"];
	EReceiveRewardStatus awardStatus = 2 [json_name = "awardStatus"];
	MonthCardItem monthCardItem = 3 [json_name = "monthCardItem"];
	int64 beginTime = 4 [json_name = "beginTime"];
	int64 endTime = 5 [json_name = "endTime"];
}
