syntax = "proto3";

package zproto;

message NoticeInfo {
	uint32 noticeId = 1 [json_name = "noticeId"];
	uint64 sendTime = 2 [json_name = "sendTime"];
	bool isLoop = 3 [json_name = "isLoop"];
	int32 loopNumber = 4 [json_name = "loopNumber"];
	uint32 loopTimeInterval = 5 [json_name = "loopTimeInterval"];
	string contentText = 6 [json_name = "contentText"];
	int64 endTime = 7 [json_name = "endTime"];
}
