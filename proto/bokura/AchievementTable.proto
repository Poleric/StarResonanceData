syntax = "proto3";

import "table_basic.proto";

package bokura;

message AchievementTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string name = 176 [json_name = "name"];
	int32 main_type = 1850 [json_name = "mainType"];
	int32 sub_type = 1973 [json_name = "subType"];
	string desc = 483 [json_name = "desc"];
	int32 show = 601 [json_name = "show"];
	int32 time_limit = 1869 [json_name = "timeLimit"];
	int_table award = 149 [json_name = "award"];
	string icon = 1210 [json_name = "icon"];
}

message AchievementTableMgr {
	map<int32, AchievementTableBase> datas = 1 [json_name = "datas"];
}
