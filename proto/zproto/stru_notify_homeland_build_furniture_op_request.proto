syntax = "proto3";

import "stru_notify_build_furniture_op.proto";

package zproto;

message NotifyHomelandBuildFurnitureOpRequest {
	int64 communityId = 1 [json_name = "communityId"];
	int64 homelandId = 2 [json_name = "homelandId"];
	bool isOuter = 3 [json_name = "isOuter"];
	string sceneGuid = 4 [json_name = "sceneGuid"];
	repeated NotifyBuildFurnitureOp buildFurnitureInfos = 5 [json_name = "buildFurnitureInfos"];
}
