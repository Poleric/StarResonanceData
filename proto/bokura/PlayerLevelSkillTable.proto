syntax = "proto3";

import "table_basic.proto";

package bokura;

message PlayerLevelSkillTableBase {
	int32 BuffId = 674 [json_name = "BuffId"];
	string BuffName = 1105 [json_name = "BuffName"];
	int32 ActiveLevel = 1815 [json_name = "ActiveLevel"];
	int32 Style = 1874 [json_name = "Style"];
	int_table LockItem = 1936 [json_name = "LockItem"];
}

message PlayerLevelSkillTableMgr {
	map<int32, PlayerLevelSkillTableBase> datas = 1 [json_name = "datas"];
}
