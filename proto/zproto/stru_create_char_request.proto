syntax = "proto3";

import "stru_device_info.proto";
import "stru_face_data_db.proto";

package zproto;

message CreateCharRequest {
	string token = 4 [json_name = "token"];
	string name = 5 [json_name = "name"];
	int32 gender = 6 [json_name = "gender"];
	int32 vBodySize = 7 [json_name = "vBodySize"];
	FaceDataDb faceData = 9 [json_name = "faceData"];
	DeviceInfo deviceInfo = 11 [json_name = "deviceInfo"];
	int32 initProfessionId = 13 [json_name = "initProfessionId"];
	int32 areaId = 14 [json_name = "areaId"];
}
