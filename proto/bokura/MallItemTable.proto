syntax = "proto3";

import "table_basic.proto";

package bokura;

message MallItemTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 ItemId = 504 [json_name = "ItemId"];
	int32 Quantity = 1641 [json_name = "Quantity"];
	string ItemName = 1477 [json_name = "ItemName"];
	int32 Sort = 1643 [json_name = "Sort"];
	int32 FunctionId = 149 [json_name = "FunctionId"];
	int32 LimitSex = 835 [json_name = "LimitSex"];
	int32 LimitLevel = 718 [json_name = "LimitLevel"];
	int32 LimitTime = 348 [json_name = "LimitTime"];
	int_table ShowLimitType = 433 [json_name = "ShowLimitType"];
	int_array OriginalPrice = 1949 [json_name = "OriginalPrice"];
	map<int32, int32> Cost = 1056 [json_name = "Cost"];
	int_table RefreshType = 213 [json_name = "RefreshType"];
	int32 Bind = 1803 [json_name = "Bind"];
	int_table DeliverWay = 439 [json_name = "DeliverWay"];
	string_array Label = 432 [json_name = "Label"];
	string_array ShowCountDown = 1192 [json_name = "ShowCountDown"];
	int_table WeightPoolParameter = 1484 [json_name = "WeightPoolParameter"];
	int_table Weight = 140 [json_name = "Weight"];
	int32 CheckDisplay = 341 [json_name = "CheckDisplay"];
}

message MallItemTableMgr {
	map<int32, MallItemTableBase> datas = 1 [json_name = "datas"];
}
