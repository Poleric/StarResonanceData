syntax = "proto3";

import "stru_session_info.proto";
import "enum_text_check_scene_type.proto";

package zproto;

message TextCheckRequest {
	SessionInfo session = 1 [json_name = "session"];
	TextCheckSceneType sceneType = 2 [json_name = "sceneType"];
	repeated string str = 3 [json_name = "str"];
	map<string, string> parame = 4 [json_name = "parame"];
}
