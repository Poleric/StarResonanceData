syntax = "proto3";

import "enum_camera_pattern_type.proto";
import "enum_camera_scheme_type.proto";

package zproto;

message cameraSchemeInfo {
	CameraPatternType cameraPatternType = 1 [json_name = "cameraPatternType"];
	CameraSchemeType cameraSchemeType = 2 [json_name = "cameraSchemeType"];
	string schemeKey = 3 [json_name = "schemeKey"];
	string schemeName = 4 [json_name = "schemeName"];
	uint64 schemeTime = 5 [json_name = "schemeTime"];
	float exposure = 6 [json_name = "exposure"];
	float contrast = 7 [json_name = "contrast"];
	float saturation = 8 [json_name = "saturation"];
	float horizontal = 9 [json_name = "horizontal"];
	float vertical = 10 [json_name = "vertical"];
	float angle = 11 [json_name = "angle"];
	bool depthTag = 12 [json_name = "depthTag"];
	float aperture = 13 [json_name = "aperture"];
	float nearBlend = 14 [json_name = "nearBlend"];
	float farBlend = 15 [json_name = "farBlend"];
	bool focusTag = 16 [json_name = "focusTag"];
	float focus = 17 [json_name = "focus"];
	float worldTime = 18 [json_name = "worldTime"];
	bool isHeadFollow = 19 [json_name = "isHeadFollow"];
	bool isEyeFollow = 20 [json_name = "isEyeFollow"];
	map<uint64, bool> showEntityDicts = 21 [json_name = "showEntityDicts"];
	map<uint64, bool> showUIDicts = 22 [json_name = "showUIDicts"];
	string filterPath = 23 [json_name = "filterPath"];
	uint64 id = 24 [json_name = "id"];
}
