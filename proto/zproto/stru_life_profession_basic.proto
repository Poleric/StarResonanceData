syntax = "proto3";

import "stru_lift_profession_specialization.proto";
import "stru_dirty_mask.proto";

package zproto;

message LifeProfessionBasic {
	int32 id = 1 [json_name = "id"];
	int32 level = 2 [json_name = "level"];
	int32 exp = 3 [json_name = "exp"];
	map<int32, LiftProfessionSpecialization> specialization = 5 [json_name = "specialization"];
	int32 currentSpecializationPoint = 6 [json_name = "currentSpecializationPoint"];
}
