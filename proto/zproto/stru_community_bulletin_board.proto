syntax = "proto3";

import "stru_community_bulletin_board_operator_char.proto";
import "stru_community_bulletin_board_target_char.proto";
import "enum_e_community_bulletin_board_type.proto";

package zproto;

message CommunityBulletinBoard {
	ECommunityBulletinBoardType type = 1 [json_name = "type"];
	CommunityBulletinBoardOperatorChar operatorChar = 2 [json_name = "operatorChar"];
	CommunityBulletinBoardTargetChar targetChar = 3 [json_name = "targetChar"];
	int64 time = 4 [json_name = "time"];
	repeated string content = 5 [json_name = "content"];
}
