syntax = "proto3";

import "table_basic.proto";

package bokura;

message SeasonBPTaskTableBase {
	int32 TargetId = 1432 [json_name = "TargetId"];
	int32 MajorType = 1095 [json_name = "MajorType"];
	int32 TargetGroup = 1238 [json_name = "TargetGroup"];
	int32 Target = 1340 [json_name = "Target"];
	int32 AwardId = 1197 [json_name = "AwardId"];
	int32 ShowWeek = 1339 [json_name = "ShowWeek"];
	string_array Condition = 1634 [json_name = "Condition"];
	int32 DailyTaskRandom = 859 [json_name = "DailyTaskRandom"];
	int32 QuickJumpType = 506 [json_name = "QuickJumpType"];
	int_array QuickJump = 75 [json_name = "QuickJump"];
	int32 Season = 620 [json_name = "Season"];
	int32 PassAward = 1175 [json_name = "PassAward"];
	string Desc = 1953 [json_name = "Desc"];
}

message SeasonBPTaskTableMgr {
	map<int32, SeasonBPTaskTableBase> datas = 1 [json_name = "datas"];
}
