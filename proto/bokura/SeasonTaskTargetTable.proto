syntax = "proto3";

import "table_basic.proto";

package bokura;

message SeasonTaskTargetTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 TargetType = 736 [json_name = "TargetType"];
	int32 Num = 947 [json_name = "Num"];
	int32 SceneId = 1506 [json_name = "SceneId"];
	int_array Param = 1207 [json_name = "Param"];
	mlstring Describe = 1195 [json_name = "Describe"];
}

message SeasonTaskTargetTableMgr {
	map<int32, SeasonTaskTargetTableBase> datas = 1 [json_name = "datas"];
}
