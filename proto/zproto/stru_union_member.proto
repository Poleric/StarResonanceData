syntax = "proto3";

package zproto;

message UnionMember {
	int32 officialId = 1 [json_name = "officialId"];
	int64 memId = 2 [json_name = "memId"];
	int64 joinTime = 3 [json_name = "joinTime"];
	int64 weekActivePoints = 4 [json_name = "weekActivePoints"];
	int64 historyActivePoints = 5 [json_name = "historyActivePoints"];
}
