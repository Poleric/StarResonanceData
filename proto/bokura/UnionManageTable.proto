syntax = "proto3";

import "table_basic.proto";

package bokura;

message UnionManageTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Position = 686 [json_name = "Position"];
	int32 PositionNum = 1912 [json_name = "PositionNum"];
	vector3_array UnionManage = 1491 [json_name = "UnionManage"];
	int32 ShowSort = 1506 [json_name = "ShowSort"];
	int_array UnionAuthoritySit = 166 [json_name = "UnionAuthoritySit"];
}

message UnionManageTableMgr {
	map<int32, UnionManageTableBase> datas = 1 [json_name = "datas"];
}
