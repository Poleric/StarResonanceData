syntax = "proto3";

import "table_basic.proto";

package bokura;

message DayAndNightTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 CycleTime = 1534 [json_name = "CycleTime"];
	vector2_array Stage = 1636 [json_name = "Stage"];
}

message DayAndNightTableMgr {
	map<int32, DayAndNightTableBase> datas = 1 [json_name = "datas"];
}
