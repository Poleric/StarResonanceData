syntax = "proto3";

import "table_basic.proto";

package bokura;

message FantasyTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int32 FantasyType = 381 [json_name = "FantasyType"];
	string FantasyArt = 868 [json_name = "FantasyArt"];
	string FantasyTips = 1588 [json_name = "FantasyTips"];
	int_table ResTemplateId = 1400 [json_name = "ResTemplateId"];
	string_table BuffValueKey = 668 [json_name = "BuffValueKey"];
	int_table BuffPar = 1688 [json_name = "BuffPar"];
	bool IsOnly = 175 [json_name = "IsOnly"];
}

message FantasyTableMgr {
	map<int32, FantasyTableBase> datas = 1 [json_name = "datas"];
}
