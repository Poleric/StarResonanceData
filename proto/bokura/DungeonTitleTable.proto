syntax = "proto3";

import "table_basic.proto";

package bokura;

message DungeonTitleTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	mlstring Content = 783 [json_name = "Content"];
	int32 Weight = 140 [json_name = "Weight"];
}

message DungeonTitleTableMgr {
	map<int32, DungeonTitleTableBase> datas = 1 [json_name = "datas"];
}
