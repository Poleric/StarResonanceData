syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_item.proto";
import "stru_replace_item_data.proto";

package zproto;

message GashaDrawReply {
	repeated Item items = 1 [json_name = "items"];
	map<int32, ReplaceItemData> replaceItems = 2 [json_name = "replaceItems"];
	EErrorCode errCode = 3 [json_name = "errCode"];
}
