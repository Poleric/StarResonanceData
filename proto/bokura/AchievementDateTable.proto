syntax = "proto3";

import "table_basic.proto";

package bokura;

message AchievementDateTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int_array TargetId = 1432 [json_name = "TargetId"];
	int_table Condition = 1634 [json_name = "Condition"];
	int32 PreAchievement = 327 [json_name = "PreAchievement"];
	int32 RewardID = 212 [json_name = "RewardID"];
	string Des = 266 [json_name = "Des"];
	string TypeIcon = 1596 [json_name = "TypeIcon"];
	int32 SeasonId = 1669 [json_name = "SeasonId"];
}

message AchievementDateTableMgr {
	map<int32, AchievementDateTableBase> datas = 1 [json_name = "datas"];
}
