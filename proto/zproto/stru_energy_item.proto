syntax = "proto3";

import "stru_energy_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message EnergyItem {
	uint32 energyLimit = 1 [json_name = "energyLimit"];
	uint32 extraEnergyLimit = 2 [json_name = "extraEnergyLimit"];
	map<uint32, EnergyInfo> energyInfo = 3 [json_name = "energyInfo"];
}
