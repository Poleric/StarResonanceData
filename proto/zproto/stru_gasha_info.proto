syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message GashaInfo {
	uint32 id = 1 [json_name = "id"];
	uint32 drawCount = 4 [json_name = "drawCount"];
	int64 refreshTime = 5 [json_name = "refreshTime"];
	uint32 wishId = 8 [json_name = "wishId"];
	uint32 wishValue = 9 [json_name = "wishValue"];
	uint32 wishFinishCount = 10 [json_name = "wishFinishCount"];
	int64 wishResetTime = 11 [json_name = "wishResetTime"];
	uint32 wishLimit = 12 [json_name = "wishLimit"];
}
