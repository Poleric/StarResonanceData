syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_get_first_pay_info.proto";

package zproto;

message GetFirstPayReply {
	repeated int32 firstPayInfo = 1 [json_name = "firstPayInfo"];
	map<int32, GetFirstPayInfo> ladderPayInfo = 2 [json_name = "ladderPayInfo"];
	EErrorCode errCode = 3 [json_name = "errCode"];
}
