syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message SignStatus {
	bool isSigned = 1 [json_name = "isSigned"];
	bool isRewarded = 2 [json_name = "isRewarded"];
	bool isSupplement = 3 [json_name = "isSupplement"];
	int64 signTime = 4 [json_name = "signTime"];
	int64 rewardTime = 5 [json_name = "rewardTime"];
}
