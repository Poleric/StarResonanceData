syntax = "proto3";

import "table_basic.proto";

package bokura;

message PhotoParamTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Des = 266 [json_name = "Des"];
	int32 PointId = 1791 [json_name = "PointId"];
	vector2 DistanceTake = 1624 [json_name = "DistanceTake"];
	vector2 DistanceHint = 147 [json_name = "DistanceHint"];
	vector2 Angle = 1093 [json_name = "Angle"];
	int_array TargetId = 1432 [json_name = "TargetId"];
}

message PhotoParamTableMgr {
	map<int32, PhotoParamTableBase> datas = 1 [json_name = "datas"];
}
