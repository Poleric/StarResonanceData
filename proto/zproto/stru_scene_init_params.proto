syntax = "proto3";

import "stru_dungeon_hot_key_context.proto";
import "stru_dungeon_single_ai_mode_context.proto";
import "stru_dungeon_union_info.proto";
import "stru_homeland_info.proto";
import "stru_match_key_info.proto";
import "stru_planet_memory_context.proto";
import "stru_ride_seat_info.proto";
import "stru_weekly_tower_info.proto";
import "google/protobuf/any.proto";

package zproto;

message SceneInitParams {
	repeated int64 owners = 1 [json_name = "owners"];
	int64 changeFlag = 4 [json_name = "changeFlag"];
	PlanetMemoryContext context = 5 [json_name = "context"];
	repeated int32 affixes = 6 [json_name = "affixes"];
	int32 teamId = 7 [json_name = "teamId"];
	int64 communityId = 8 [json_name = "communityId"];
	int64 homelandId = 9 [json_name = "homelandId"];
	int32 communityMapId = 10 [json_name = "communityMapId"];
	HomelandInfo homelandInfo = 12 [json_name = "homelandInfo"];
	DungeonUnionInfo unionInfo = 15 [json_name = "unionInfo"];
	DungeonSingleAiModeContext singleAiModeContext = 16 [json_name = "singleAiModeContext"];
	DungeonHotKeyContext dungeonHotKeyContext = 17 [json_name = "dungeonHotKeyContext"];
	string sceneGuidIndex = 19 [json_name = "sceneGuidIndex"];
	WeeklyTowerInfo weeklyTowerInfo = 20 [json_name = "weeklyTowerInfo"];
	RideSeatInfo rideSeatInfo = 21 [json_name = "rideSeatInfo"];
	repeated google.protobuf.Any initParams = 22 [json_name = "initParams"];
	int32 masterModeDiff = 23 [json_name = "masterModeDiff"];
	MatchKeyInfo matchKeyInfo = 24 [json_name = "matchKeyInfo"];
}
