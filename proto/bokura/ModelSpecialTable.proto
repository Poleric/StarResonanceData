syntax = "proto3";

import "table_basic.proto";

package bokura;

message ModelSpecialTableBase {
	int32 ModelPrefabID = 5 [json_name = "ModelPrefabID"];
	string ModelPrefabDesc = 1152 [json_name = "ModelPrefabDesc"];
	string Skeleton = 1130 [json_name = "Skeleton"];
	string AnimTemplate = 1244 [json_name = "AnimTemplate"];
	string_array Weapon = 24 [json_name = "Weapon"];
	bool UseHeadIK = 338 [json_name = "UseHeadIK"];
	int32 LookAtAngle = 910 [json_name = "LookAtAngle"];
	int32 LookAtSpeed = 275 [json_name = "LookAtSpeed"];
	int32 LookAtDistance = 1940 [json_name = "LookAtDistance"];
}

message ModelSpecialTableMgr {
	map<int32, ModelSpecialTableBase> datas = 1 [json_name = "datas"];
}
