syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_item.proto";
import "stru_mail_base.proto";

package zproto;

message GetMailAppendixReply {
	map<int64, MailBase> mails = 3 [json_name = "mails"];
	repeated Item rewards = 4 [json_name = "rewards"];
	EErrorCode errCode = 5 [json_name = "errCode"];
}
