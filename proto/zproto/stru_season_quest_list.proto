syntax = "proto3";

import "stru_season_quest_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message SeasonQuestList {
	map<uint32, SeasonQuestData> seasonMap = 1 [json_name = "seasonMap"];
	int32 refreshWeek = 2 [json_name = "refreshWeek"];
	int64 refreshTimeStamp = 3 [json_name = "refreshTimeStamp"];
}
