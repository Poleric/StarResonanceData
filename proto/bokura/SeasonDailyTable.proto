syntax = "proto3";

package bokura;

message SeasonDailyTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Season = 620 [json_name = "Season"];
	int32 Day = 1533 [json_name = "Day"];
	int32 DailyEquipLevel = 1082 [json_name = "DailyEquipLevel"];
	int32 GrowRangeAdd = 1918 [json_name = "GrowRangeAdd"];
}

message SeasonDailyTableMgr {
	map<int32, SeasonDailyTableBase> datas = 1 [json_name = "datas"];
}
