syntax = "proto3";

import "table_basic.proto";

package bokura;

message WeaponLevelTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Exp = 970 [json_name = "Exp"];
	bool Broke = 1739 [json_name = "Broke"];
	int_table ItemPrice = 1450 [json_name = "ItemPrice"];
	int_table ExtrCost = 1404 [json_name = "ExtrCost"];
	int32 SkillMaxLevel = 111 [json_name = "SkillMaxLevel"];
}

message WeaponLevelTableMgr {
	map<int32, WeaponLevelTableBase> datas = 1 [json_name = "datas"];
}
