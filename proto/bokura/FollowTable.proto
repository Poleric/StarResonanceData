	number_array ParaScaDouble = 258 [json_name = "ParaScaDouble"];
	number_array ParaScaBase = 2047 [json_name = "ParaScaBase"];
	number_array ParaPreDis = 1023 [json_name = "ParaPreDis"];
	number_array ParaPreDouble = 98 [json_name = "ParaPreDouble"];
	number_array ParaSPreBase = 105 [json_name = "ParaSPreBase"];
