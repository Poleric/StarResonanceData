syntax = "proto3";

import "stru_avatar_info.proto";
import "stru_basic_data.proto";
import "stru_char_team.proto";
import "stru_community_summary_data.proto";
import "stru_privilege_data.proto";
import "stru_profession_data.proto";
import "stru_union_data.proto";

package zproto;

message UserSummaryData {
	BasicData basicData = 1 [json_name = "basicData"];
	AvatarInfo avatarInfo = 2 [json_name = "avatarInfo"];
	ProfessionData professionData = 4 [json_name = "professionData"];
	int64 fightPoint = 5 [json_name = "fightPoint"];
	CharTeam teamData = 6 [json_name = "teamData"];
	UnionData unionData = 7 [json_name = "unionData"];
	CommunitySummaryData communityData = 8 [json_name = "communityData"];
	PrivilegeData privilegeData = 9 [json_name = "privilegeData"];
}
