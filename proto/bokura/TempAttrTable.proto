syntax = "proto3";

import "table_basic.proto";

package bokura;

message TempAttrTableBase {
	int64 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	string Desc = 1953 [json_name = "Desc"];
	int32 AttrType = 633 [json_name = "AttrType"];
	int32 LogicType = 198 [json_name = "LogicType"];
	int_array AttrParams = 10 [json_name = "AttrParams"];
	int32 LowerLimit = 1339 [json_name = "LowerLimit"];
	int32 UpperLimit = 1615 [json_name = "UpperLimit"];
	bool IsSyncClient = 880 [json_name = "IsSyncClient"];
}

message TempAttrTableMgr {
	map<int64, TempAttrTableBase> datas = 1 [json_name = "datas"];
}
