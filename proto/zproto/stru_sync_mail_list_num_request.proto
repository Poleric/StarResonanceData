syntax = "proto3";

package zproto;

message SyncMailListNumRequest {
	int32 normalNum = 1 [json_name = "normalNum"];
	int32 importantNum = 2 [json_name = "importantNum"];
	repeated int64 normalUnReadList = 3 [json_name = "normalUnReadList"];
	repeated int64 importantUnReadList = 4 [json_name = "importantUnReadList"];
	int32 collectNum = 5 [json_name = "collectNum"];
	repeated int64 collectUnReadList = 6 [json_name = "collectUnReadList"];
}
