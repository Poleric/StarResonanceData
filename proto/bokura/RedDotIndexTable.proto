syntax = "proto3";

import "table_basic.proto";

package bokura;

message RedDotIndexTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string RedSignKey = 1816 [json_name = "RedSignKey"];
	int32 FunctionId = 149 [json_name = "FunctionId"];
	int_array CloseCheck = 1875 [json_name = "CloseCheck"];
	int_array LoseCheck = 588 [json_name = "LoseCheck"];
	int_array ChildrenID = 1155 [json_name = "ChildrenID"];
	int_array ShowType = 1131 [json_name = "ShowType"];
	string PicturePath = 1204 [json_name = "PicturePath"];
	string EffectPath = 1536 [json_name = "EffectPath"];
	int_array OffSet = 509 [json_name = "OffSet"];
	int_array Size = 1135 [json_name = "Size"];
	int32 ServerType = 718 [json_name = "ServerType"];
}

message RedDotIndexTableMgr {
	map<int32, RedDotIndexTableBase> datas = 1 [json_name = "datas"];
}
