syntax = "proto3";

package zproto;

message NotifyInstructionInfoRequest {
	int32 type = 1 [json_name = "type"];
	string title = 2 [json_name = "title"];
	string msg = 3 [json_name = "msg"];
	string url = 4 [json_name = "url"];
	string data = 5 [json_name = "data"];
	int32 logoutTime = 6 [json_name = "logoutTime"];
	string ruleName = 7 [json_name = "ruleName"];
	string traceId = 8 [json_name = "traceId"];
	int32 modal = 9 [json_name = "modal"];
	int32 logoutType = 10 [json_name = "logoutType"];
}
