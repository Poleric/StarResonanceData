syntax = "proto3";

package bokura;

message EffectTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Comment = 11 [json_name = "Comment"];
	string Path = 172 [json_name = "Path"];
	float PlayTime = 1323 [json_name = "PlayTime"];
}

message EffectTableMgr {
	map<int32, EffectTableBase> datas = 1 [json_name = "datas"];
}
