syntax = "proto3";

import "table_basic.proto";

package bokura;

message HousingItemsBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 SortId = 1586 [json_name = "SortId"];
	mlstring Name = 439 [json_name = "Name"];
	string Icon = 1153 [json_name = "Icon"];
	int32 Type = 673 [json_name = "Type"];
	int32 Quality = 1961 [json_name = "Quality"];
	string Res = 1275 [json_name = "Res"];
}

message HousingItemsMgr {
	map<int32, HousingItemsBase> datas = 1 [json_name = "datas"];
}
