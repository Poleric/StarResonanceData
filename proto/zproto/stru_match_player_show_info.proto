syntax = "proto3";

import "stru_avatar_info.proto";
import "enum_e_body_size.proto";
import "stru_personal_zone_show.proto";

package zproto;

message MatchPlayerShowInfo {
	string name = 1 [json_name = "name"];
	int32 gender = 2 [json_name = "gender"];
	EBodySize bodySize = 3 [json_name = "bodySize"];
	int32 level = 4 [json_name = "level"];
	AvatarInfo avatarInfo = 5 [json_name = "avatarInfo"];
	PersonalZoneShow personalZone = 6 [json_name = "personalZone"];
}
