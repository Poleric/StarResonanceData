syntax = "proto3";

import "table_basic.proto";

package bokura;

message SceneAreaTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	int_array Station = 569 [json_name = "Station"];
	int32 Region = 12 [json_name = "Region"];
	string BgmEvent = 515 [json_name = "BgmEvent"];
	number_array NamePosition = 1735 [json_name = "NamePosition"];
}

message SceneAreaTableMgr {
	map<int32, SceneAreaTableBase> datas = 1 [json_name = "datas"];
}
