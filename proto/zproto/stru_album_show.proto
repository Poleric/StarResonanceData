syntax = "proto3";

import "enum_e_album_right.proto";
import "stru_image_info.proto";

package zproto;

message AlbumShow {
	uint32 albumId = 1 [json_name = "albumId"];
	string name = 2 [json_name = "name"];
	bool canAccess = 3 [json_name = "canAccess"];
	EAlbumRight access = 4 [json_name = "access"];
	uint32 coverPhotoId = 5 [json_name = "coverPhotoId"];
	ImageInfo coverThumbnailInfo = 6 [json_name = "coverThumbnailInfo"];
	repeated uint32 photoIds = 7 [json_name = "photoIds"];
}
