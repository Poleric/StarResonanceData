syntax = "proto3";

import "table_basic.proto";

package bokura;

message StaticInteractiveObjectTableBase {
	int32 Id = 1463 [json_name = "Id"];
	number_array Position = 686 [json_name = "Position"];
	number_array RotY = 1477 [json_name = "RotY"];
	int32 ClassId = 29 [json_name = "ClassId"];
	number_array Radius = 1839 [json_name = "Radius"];
	number_array TriggerPosition = 37 [json_name = "TriggerPosition"];
	int_table InteractionTemplate = 1682 [json_name = "InteractionTemplate"];
	string_array InteractionEvent = 1343 [json_name = "InteractionEvent"];
	int32 SourceType = 380 [json_name = "SourceType"];
}

message StaticInteractiveObjectTableMgr {
	map<int32, StaticInteractiveObjectTableBase> datas = 1 [json_name = "datas"];
}
