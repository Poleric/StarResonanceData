syntax = "proto3";

import "stru_season_activation_target.proto";
import "stru_dirty_mask.proto";

package zproto;

message SeasonActivation {
	int32 seasonId = 1 [json_name = "seasonId"];
	int32 activationPoint = 2 [json_name = "activationPoint"];
	int32 refreshTime = 3 [json_name = "refreshTime"];
	map<int32, SeasonActivationTarget> activationTargets = 4 [json_name = "activationTargets"];
	map<uint32, int32> stageRewardStatus = 5 [json_name = "stageRewardStatus"];
}
