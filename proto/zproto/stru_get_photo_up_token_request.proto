syntax = "proto3";

import "stru_client_image.proto";
import "enum_e_platform_func_type.proto";

package zproto;

message GetPhotoUpTokenRequest {
	uint32 photoId = 2 [json_name = "photoId"];
	string renderInfo = 3 [json_name = "renderInfo"];
	uint32 albumId = 4 [json_name = "albumId"];
	repeated ClientImage imagesInfo = 5 [json_name = "imagesInfo"];
	string photoDesc = 6 [json_name = "photoDesc"];
	EPlatformFuncType funcType = 7 [json_name = "funcType"];
	int64 ownerId = 8 [json_name = "ownerId"];
	string text = 9 [json_name = "text"];
}
