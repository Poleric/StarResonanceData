syntax = "proto3";

package bokura;

message StageBehaveCallEventTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 EventType = 1355 [json_name = "EventType"];
	string LuaEventName = 1421 [json_name = "LuaEventName"];
	int32 CSharpEventId = 1806 [json_name = "CSharpEventId"];
	string Desc = 1953 [json_name = "Desc"];
}

message StageBehaveCallEventTableMgr {
	map<int32, StageBehaveCallEventTableBase> datas = 1 [json_name = "datas"];
}
