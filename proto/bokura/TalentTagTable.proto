syntax = "proto3";

import "table_basic.proto";

package bokura;

message TalentTagTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Des = 266 [json_name = "Des"];
	int32 TagType = 847 [json_name = "TagType"];
	int32 FightResId = 1204 [json_name = "FightResId"];
	mlstring TagName = 510 [json_name = "TagName"];
	string TagIcon = 25 [json_name = "TagIcon"];
	string TagIconBg = 1743 [json_name = "TagIconBg"];
	string TagIconMark = 723 [json_name = "TagIconMark"];
	mlstring SimpleDes = 139 [json_name = "SimpleDes"];
	mlstring DetailsDes = 103 [json_name = "DetailsDes"];
	int_array TalentAssociatedID = 1389 [json_name = "TalentAssociatedID"];
	int_array FantasyHoleList = 997 [json_name = "FantasyHoleList"];
}

message TalentTagTableMgr {
	map<int32, TalentTagTableBase> datas = 1 [json_name = "datas"];
}
