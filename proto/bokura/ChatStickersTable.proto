syntax = "proto3";

package bokura;

message ChatStickersTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Type = 673 [json_name = "Type"];
	int32 GroupId = 196 [json_name = "GroupId"];
	string Res = 1275 [json_name = "Res"];
	int32 UnlockItem = 702 [json_name = "UnlockItem"];
}

message ChatStickersTableMgr {
	map<int32, ChatStickersTableBase> datas = 1 [json_name = "datas"];
}
