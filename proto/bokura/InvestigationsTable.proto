syntax = "proto3";

import "table_basic.proto";

package bokura;

message InvestigationsTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring InvestigationTheme = 906 [json_name = "InvestigationTheme"];
	int_table UnlockCondition = 1014 [json_name = "UnlockCondition"];
	int_array InvestigationStep = 1383 [json_name = "InvestigationStep"];
	int_table CompletionConditions = 178 [json_name = "CompletionConditions"];
	mlstring ThemeIntroduction = 1677 [json_name = "ThemeIntroduction"];
	mlstring IockedTips = 1728 [json_name = "IockedTips"];
	string ThemePic = 1303 [json_name = "ThemePic"];
	int32 Guarantee = 1155 [json_name = "Guarantee"];
}

message InvestigationsTableMgr {
	map<int32, InvestigationsTableBase> datas = 1 [json_name = "datas"];
}
