syntax = "proto3";

package zproto;

message NotifyCommunityLevelUpdateRequest {
	int32 newLevel = 1 [json_name = "newLevel"];
	int64 newExp = 2 [json_name = "newExp"];
	int32 oldLevel = 3 [json_name = "oldLevel"];
	int64 oldExp = 4 [json_name = "oldExp"];
	int64 oldResource = 5 [json_name = "oldResource"];
	int64 newResource = 6 [json_name = "newResource"];
}
