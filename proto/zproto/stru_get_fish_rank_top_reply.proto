syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_fish_rank_info.proto";

package zproto;

message GetFishRankTopReply {
	int32 fishAreaId = 1 [json_name = "fishAreaId"];
	map<int32, FishRankInfo> rankList = 2 [json_name = "rankList"];
	EErrorCode errCode = 3 [json_name = "errCode"];
}
