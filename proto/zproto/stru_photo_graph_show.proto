syntax = "proto3";

import "stru_image_info.proto";
import "stru_photo_owner_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message PhotoGraphShow {
	uint32 photoId = 1 [json_name = "photoId"];
	repeated ImageInfo images = 2 [json_name = "images"];
	string renderInfo = 3 [json_name = "renderInfo"];
	string photoDesc = 4 [json_name = "photoDesc"];
	PhotoOwnerData ownerInfo = 5 [json_name = "ownerInfo"];
}
