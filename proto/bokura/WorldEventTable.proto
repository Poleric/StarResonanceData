syntax = "proto3";

import "table_basic.proto";

package bokura;

message WorldEventTableBase {
	int32 EventId = 1932 [json_name = "EventId"];
	string Name = 439 [json_name = "Name"];
	int32 EventType = 1355 [json_name = "EventType"];
	int32 Score = 1699 [json_name = "Score"];
	int32 TimerId = 190 [json_name = "TimerId"];
	int32 NoticeTime = 857 [json_name = "NoticeTime"];
	int32 Cycle = 954 [json_name = "Cycle"];
	int32 LastTime = 999 [json_name = "LastTime"];
	int_array EventForm = 988 [json_name = "EventForm"];
	int32 Count = 2025 [json_name = "Count"];
	int32 Alert = 1863 [json_name = "Alert"];
	int32 Award = 187 [json_name = "Award"];
	int_table FullAward = 352 [json_name = "FullAward"];
	int32 StartMessage = 518 [json_name = "StartMessage"];
	string PhaseTime = 1605 [json_name = "PhaseTime"];
}

message WorldEventTableMgr {
	map<int32, WorldEventTableBase> datas = 1 [json_name = "datas"];
}
