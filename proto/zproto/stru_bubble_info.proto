syntax = "proto3";

import "stru_bubble_target_record.proto";
import "stru_dirty_mask.proto";

package zproto;

message BubbleInfo {
	uint32 bubbleScore = 1 [json_name = "bubbleScore"];
	uint32 bubbleAwardCount = 2 [json_name = "bubbleAwardCount"];
	repeated uint64 additionalTargetUuidList = 3 [json_name = "additionalTargetUuidList"];
	int64 lastRefreshTime = 4 [json_name = "lastRefreshTime"];
	repeated BubbleTargetRecord targetRecordList = 5 [json_name = "targetRecordList"];
}
