syntax = "proto3";

import "table_basic.proto";

package bokura;

message ChatPersonalizedTagBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring TagName = 510 [json_name = "TagName"];
	string TagBG = 1998 [json_name = "TagBG"];
	string TagIcon = 25 [json_name = "TagIcon"];
	int32 Sequence = 831 [json_name = "Sequence"];
}

message ChatPersonalizedTagMgr {
	map<int32, ChatPersonalizedTagBase> datas = 1 [json_name = "datas"];
}
