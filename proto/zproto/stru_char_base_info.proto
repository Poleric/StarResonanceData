syntax = "proto3";

import "stru_avatar_info.proto";
import "stru_char_team.proto";
import "enum_e_body_size.proto";
import "enum_e_gender.proto";
import "stru_face_data.proto";
import "stru_profile_info.proto";
import "stru_user_union.proto";
import "stru_dirty_mask.proto";

package zproto;

message CharBaseInfo {
	int64 charId = 1 [json_name = "charId"];
	string accountId = 2 [json_name = "accountId"];
	int64 showId = 3 [json_name = "showId"];
	uint32 serverId = 4 [json_name = "serverId"];
	string name = 5 [json_name = "name"];
	EGender gender = 6 [json_name = "gender"];
	bool isDeleted = 7 [json_name = "isDeleted"];
	bool isForbid = 8 [json_name = "isForbid"];
	bool isMute = 9 [json_name = "isMute"];
	float x = 10 [json_name = "x"];
	float y = 11 [json_name = "y"];
	float Z = 12 [json_name = "Z"];
	float dir = 13 [json_name = "dir"];
	FaceData faceData = 14 [json_name = "faceData"];
	uint32 cardId = 15 [json_name = "cardId"];
	int64 createTime = 16 [json_name = "createTime"];
	int64 onlineTime = 17 [json_name = "onlineTime"];
	int64 offlineTime = 18 [json_name = "offlineTime"];
	ProfileInfo profileInfo = 19 [json_name = "profileInfo"];
	CharTeam teamInfo = 20 [json_name = "teamInfo"];
	uint64 CharState = 21 [json_name = "CharState"];
	EBodySize bodySize = 22 [json_name = "bodySize"];
	UserUnion unionInfo = 23 [json_name = "unionInfo"];
	repeated int32 personalState = 24 [json_name = "personalState"];
	AvatarInfo avatarInfo = 25 [json_name = "avatarInfo"];
	uint64 totalOnlineTime = 26 [json_name = "totalOnlineTime"];
	string openId = 27 [json_name = "openId"];
	int32 sdkType = 28 [json_name = "sdkType"];
	int32 os = 29 [json_name = "os"];
	int32 initProfessionId = 31 [json_name = "initProfessionId"];
	uint64 lastCalTotalTime = 32 [json_name = "lastCalTotalTime"];
	int32 areaId = 33 [json_name = "areaId"];
	string clientVersion = 34 [json_name = "clientVersion"];
	int32 fightPoint = 35 [json_name = "fightPoint"];
	int64 sumSave = 36 [json_name = "sumSave"];
	string clientResourceVersion = 37 [json_name = "clientResourceVersion"];
	int64 lastOfflineTime = 38 [json_name = "lastOfflineTime"];
	int32 dayAccDurTime = 39 [json_name = "dayAccDurTime"];
	int64 lastAccDurTimestamp = 40 [json_name = "lastAccDurTimestamp"];
	int64 lastOnlineTime = 42 [json_name = "lastOnlineTime"];
}
