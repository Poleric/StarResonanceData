syntax = "proto3";

import "stru_action_group_action_clip.proto";
import "stru_action_group_face_clip.proto";
import "enum_e_action_group_track_type.proto";
import "stru_dirty_mask.proto";

package zproto;

message ActionGroupTrack {
	EActionGroupTrackType trackType = 1 [json_name = "trackType"];
	repeated ActionGroupActionClip actionClipList = 2 [json_name = "actionClipList"];
	repeated ActionGroupFaceClip faceClipList = 3 [json_name = "faceClipList"];
}
