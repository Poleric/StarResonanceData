syntax = "proto3";

import "stru_energy_item_info.proto";
import "stru_dirty_mask.proto";

package zproto;

message EnergyInfo {
	uint32 energyValue = 1 [json_name = "energyValue"];
	uint32 unlockNum = 2 [json_name = "unlockNum"];
	map<uint32, EnergyItemInfo> energyItemInfo = 3 [json_name = "energyItemInfo"];
}
