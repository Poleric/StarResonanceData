syntax = "proto3";

import "table_basic.proto";

package bokura;

message FaceOptionTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Option = 773 [json_name = "Option"];
	int32 ColorGroup = 68 [json_name = "ColorGroup"];
	int32 Random = 1636 [json_name = "Random"];
	int_table RandomType = 575 [json_name = "RandomType"];
	int32 Tab = 860 [json_name = "Tab"];
}

message FaceOptionTableMgr {
	map<int32, FaceOptionTableBase> datas = 1 [json_name = "datas"];
}
