syntax = "proto3";

import "enum_e_error_code.proto";

package zproto;

message GetMailManagerReply {
	int32 normalNum = 1 [json_name = "normalNum"];
	repeated int64 normalUnReadList = 2 [json_name = "normalUnReadList"];
	int32 collectNum = 3 [json_name = "collectNum"];
	repeated int64 collectUnReadList = 6 [json_name = "collectUnReadList"];
	EErrorCode errCode = 7 [json_name = "errCode"];
}
