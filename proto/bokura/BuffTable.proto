syntax = "proto3";

import "table_basic.proto";

package bokura;

message BuffTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 Level = 1120 [json_name = "Level"];
	string NameDesign = 1649 [json_name = "NameDesign"];
	string Note = 453 [json_name = "Note"];
	mlstring Name = 439 [json_name = "Name"];
	string Icon = 1153 [json_name = "Icon"];
	mlstring Desc = 1953 [json_name = "Desc"];
	int32 BuffType = 905 [json_name = "BuffType"];
	int32 BuffPriority = 1108 [json_name = "BuffPriority"];
	int32 TipsDescription = 516 [json_name = "TipsDescription"];
	int32 Visible = 788 [json_name = "Visible"];
	int_array RepeatAddRule = 200 [json_name = "RepeatAddRule"];
	number_table DestroyParam = 1532 [json_name = "DestroyParam"];
	bool DeleteDead = 66 [json_name = "DeleteDead"];
	bool DeleteOffline = 144 [json_name = "DeleteOffline"];
	bool DeleteChangeScene = 348 [json_name = "DeleteChangeScene"];
	bool DeleteChangeVisualLayer = 601 [json_name = "DeleteChangeVisualLayer"];
	bool DeleteWeaponChange = 1049 [json_name = "DeleteWeaponChange"];
	int_array Tags = 232 [json_name = "Tags"];
	int_array SpecialAttr = 649 [json_name = "SpecialAttr"];
	int32 BuffAbilityType = 1839 [json_name = "BuffAbilityType"];
	bool IsClientBuff = 1713 [json_name = "IsClientBuff"];
	string ShowHUDIcon = 125 [json_name = "ShowHUDIcon"];
	int32 HudSwitch = 92 [json_name = "HudSwitch"];
}

message BuffTableMgr {
	map<int32, BuffTableBase> datas = 1 [json_name = "datas"];
}
