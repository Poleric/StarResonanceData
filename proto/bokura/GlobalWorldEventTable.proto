syntax = "proto3";

import "table_basic.proto";

package bokura;

message GlobalWorldEventTableBase {
	int32 Index = 1400 [json_name = "Index"];
	string Id = 1463 [json_name = "Id"];
	int_array Value = 616 [json_name = "Value"];
}

message GlobalWorldEventTableMgr {
	map<int32, GlobalWorldEventTableBase> datas = 1 [json_name = "datas"];
}
