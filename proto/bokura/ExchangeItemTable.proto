syntax = "proto3";

import "table_basic.proto";

package bokura;

message ExchangeItemTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 ExchangeID = 194 [json_name = "ExchangeID"];
	int32 GetItemId = 987 [json_name = "GetItemId"];
	int32 GetNum = 281 [json_name = "GetNum"];
	string Name = 439 [json_name = "Name"];
	int_table ConsumableID = 920 [json_name = "ConsumableID"];
	string UnlockConditions = 613 [json_name = "UnlockConditions"];
	int32 RefreshType = 213 [json_name = "RefreshType"];
	int32 RefreshNum = 1376 [json_name = "RefreshNum"];
	int32 SexLimit = 794 [json_name = "SexLimit"];
	int32 Sort = 1643 [json_name = "Sort"];
}

message ExchangeItemTableMgr {
	map<int32, ExchangeItemTableBase> datas = 1 [json_name = "datas"];
}
