syntax = "proto3";

import "stru_delay_hit_target_info.proto";

package zproto;

message DelayHitInfo {
	int32 effectId = 1 [json_name = "effectId"];
	int32 buffUuid = 2 [json_name = "buffUuid"];
	int32 eventId = 3 [json_name = "eventId"];
	float playTime = 4 [json_name = "playTime"];
	repeated DelayHitTargetInfo targetInfos = 5 [json_name = "targetInfos"];
}
