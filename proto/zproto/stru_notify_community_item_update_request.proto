syntax = "proto3";

import "stru_home_land_item_instance.proto";

package zproto;

message NotifyCommunityItemUpdateRequest {
	map<int64, int64> removeInstances = 1 [json_name = "removeInstances"];
	map<int64, HomeLandItemInstance> addInstances = 2 [json_name = "addInstances"];
	map<int64, HomeLandItemInstance> updateInstances = 3 [json_name = "updateInstances"];
}
