syntax = "proto3";

import "stru_item.proto";
import "stru_dirty_mask.proto";

package zproto;

message Package {
	int32 type = 1 [json_name = "type"];
	int32 maxCapacity = 2 [json_name = "maxCapacity"];
	map<int32, int64> itemCd = 3 [json_name = "itemCd"];
	map<int64, Item> items = 4 [json_name = "items"];
	int64 publicCd = 5 [json_name = "publicCd"];
	int32 changeVersion = 6 [json_name = "changeVersion"];
}
