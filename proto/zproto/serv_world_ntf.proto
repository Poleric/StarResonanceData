import "stru_tips_info.proto";
import "stru_unlock_cook_book_info.proto";
import "stru_world_boss_rank_info_param.proto";

package zproto;

message WorldNtf {
	message SyncPioneerInfo {
		uint32 targetId = 1 [json_name = "targetId"];
		uint32 targetNum = 2 [json_name = "targetNum"];
	}

	message SyncSwitchChange {
		uint32 id = 1 [json_name = "id"];
		uint32 onOff = 2 [json_name = "onOff"];
	}

	message SyncSwitchInfo {
		SwitchInfo info = 1 [json_name = "info"];
	}

	message SyncContainerData {
		CharSerialize vData = 1 [json_name = "vData"];
	}

	message SyncDungeonData {
		DungeonSyncData vData = 1 [json_name = "vData"];
	}

	message AwardNotify {
		AwardData award = 1 [json_name = "award"];
	}

	message CardInfoAck {
		int64 charId = 1 [json_name = "charId"];
		CardInfo info = 2 [json_name = "info"];
	}

	message SyncSeason {
		int32 vSeason = 1 [json_name = "vSeason"];
	}

	message UserAction {
		int64 vCharId = 1 [json_name = "vCharId"];
		int32 vActionId = 2 [json_name = "vActionId"];
	}

	message NotifyDisplayPlayHelp {
		int32 vPlayHelpId = 1 [json_name = "vPlayHelpId"];
	}

	message NotifyApplicationInteraction {
		int64 vOrigId = 1 [json_name = "vOrigId"];
		int32 vActionId = 2 [json_name = "vActionId"];
	}

	message NotifyIsAgree {
		int64 vInviteeId = 1 [json_name = "vInviteeId"];
		int32 vActionId = 2 [json_name = "vActionId"];
		bool vIsAgree = 3 [json_name = "vIsAgree"];
	}

	message NotifyCancelAction {
		int64 vCancelCharId = 1 [json_name = "vCancelCharId"];
	}

	message NotifyUploadPictureResult {
		bool success = 1 [json_name = "success"];
		EPictureType photoType = 2 [json_name = "photoType"];
		uint32 photoId = 3 [json_name = "photoId"];
		string photoName = 4 [json_name = "photoName"];
	}

	message SyncInvite {
		SyncInviteRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyRedDotChange {
		int32 vRedDotId = 1 [json_name = "vRedDotId"];
		int32 vValue = 2 [json_name = "vValue"];
	}

	message ChangeNameResultNtf {
		int32 vCode = 1 [json_name = "vCode"];
	}

	message NotifyReviveUser {
		int64 vActorUuid = 1 [json_name = "vActorUuid"];
	}

	message NotifyParkourRankInfo {
		int32 vRankId = 1 [json_name = "vRankId"];
	}

	message NotifyParkourRecordInfo {
		int32 result = 1 [json_name = "result"];
		ParkourRecord vRecord = 2 [json_name = "vRecord"];
	}

	message NotifyShowTips {
		TipsInfo vTips = 1 [json_name = "vTips"];
	}

	message NotifyNoticeInfo {
		NoticeInfo vInfo = 1 [json_name = "vInfo"];
	}

	message NotifyClientKickOff {
		EErrorCode errCode = 1 [json_name = "errCode"];
	}

	message PaymentResponse {
		PaymentResult vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyUnlockCookBook {
		UnlockCookBookInfo vInfo = 1 [json_name = "vInfo"];
	}

	message NotifyCustomEvent {
		ClientCustomEventParams eventParams = 1 [json_name = "eventParams"];
	}

	message NotifyStartPlayingDungeon {
		StartPlayingDungeonParam vParam = 1 [json_name = "vParam"];
	}

	message ChangeShowIdResultNtf {
		EErrorCode errCode = 1 [json_name = "errCode"];
	}

	message NotifyShowItems {
		ShowItemsInfo vInfo = 1 [json_name = "vInfo"];
	}

	message NotifySeasonActivationTargetInfo {
		int32 vSeasonId = 1 [json_name = "vSeasonId"];
		bool isRefresh = 2 [json_name = "isRefresh"];
	}

	message NotifyTextCheckResult {
		EErrorCode errCode = 1 [json_name = "errCode"];
	}

	message NotifyDebugMessageTip {
		DebugMessageTipInfo vInfo = 1 [json_name = "vInfo"];
	}

	message NotifyUserCloseFunction {
		NotifyFunctionParams vParam = 1 [json_name = "vParam"];
	}

	message NotifyServerCloseFunction {
		NotifyFunctionParams vParam = 1 [json_name = "vParam"];
	}

	message NotifyAwardAllItems {
		NotifyAwardAllItemInfo vAllItem = 1 [json_name = "vAllItem"];
	}

	message NotifyAllMemberReady {
		bool vOpenOrClose = 1 [json_name = "vOpenOrClose"];
	}

	message NotifyCaptainReady {
		string vMemberName = 1 [json_name = "vMemberName"];
		int64 vCharId = 2 [json_name = "vCharId"];
		DungeonReadyInfo vReadyInfo = 3 [json_name = "vReadyInfo"];
	}

	message NotifyUserAllSourcePrivilegeEffectData {
		NotifyAllSourcePrivilegeEffectData vAllPrivilegeEffects = 1 [json_name = "vAllPrivilegeEffects"];
	}

	message NotifyQuestAccept {
		NotifyQuestAcceptParam vParam = 1 [json_name = "vParam"];
	}

	message NotifyQuestChangeStep {
		NotifyQuestChangeStepParam vParam = 1 [json_name = "vParam"];
	}

	message NotifyQuestGiveUp {
		NotifyQuestGiveUpParam vParam = 1 [json_name = "vParam"];
	}

	message NotifyQuestComplete {
		NotifyQuestCompleteParam vParam = 1 [json_name = "vParam"];
	}

	message NotifyUserAllValidBattlePassData {
		NotifyAllValidBattlePassData validBattlePassData = 1 [json_name = "validBattlePassData"];
	}

	message NotifyNoticeMultiLanguageInfo {
		NoticeMultiLanguageInfo vInfo = 1 [json_name = "vInfo"];
	}

	message QteBegin {
		uint32 qteId = 1 [json_name = "qteId"];
	}

	message QuestAbort {
		int32 questId = 1 [json_name = "questId"];
	}

	message NotifyBuyShopResult {
		NotifyBuyShopResultParam param = 1 [json_name = "param"];
	}

	message NotifyShopItemCanBuy {
		NotifyShopItemCanBuyParam param = 1 [json_name = "param"];
	}

	message WorldBossRankInfoNtf {
		WorldBossRankInfoParam rankInfo = 1 [json_name = "rankInfo"];
	}

	message EnterMatchResultNtf {
		EnterMatchResultNtfRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyDriverApplyRide {
		DriverApplyRideParam param = 1 [json_name = "param"];
	}

	message NotifyInviteApplyRide {
		InviteApplyRideParam param = 1 [json_name = "param"];
	}

	message NotifyRideIsAgree {
		NotifyRideIsAgreeParam param = 1 [json_name = "param"];
	}

	message NotifyPayInfo {
		NotifyPayParam param = 1 [json_name = "param"];
	}

	message NotifyLifeProfessionWorkHistoryChange {
		NotifyLifeProfessionWorkHistoryChangeInfo info = 1 [json_name = "info"];
	}

	message NotifyLifeProfessionUnlockRecipe {
		NotifyLifeProfessionUnlockRecipeInfo info = 1 [json_name = "info"];
	}

	message SignRewardNotify {
		SignRewardNotifyRequest vRequest = 1 [json_name = "vRequest"];
	}

	message MahjongStartNtf {
		MahjongStartNtfRequest vRequest = 1 [json_name = "vRequest"];
	}

	message MahjongEndNtf {
		MahjongEndNtfRequest vRequest = 1 [json_name = "vRequest"];
	}

	message NotifyEntryRandomData {
		EntryRandomDataParam param = 1 [json_name = "param"];
	}

	message NotifyPlayDataAttackInfo {
		int64 vAttacker = 1 [json_name = "vAttacker"];
		int64 vVictim = 2 [json_name = "vVictim"];
	}
}
