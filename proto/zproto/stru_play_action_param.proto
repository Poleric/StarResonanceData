syntax = "proto3";

package zproto;

message PlayActionParam {
	int32 actionId = 1 [json_name = "actionId"];
	bool isUpper = 2 [json_name = "isUpper"];
	bool IsDanceTogether = 3 [json_name = "IsDanceTogether"];
	int32 mountId = 4 [json_name = "mountId"];
	int32 mountSize = 5 [json_name = "mountSize"];
}
