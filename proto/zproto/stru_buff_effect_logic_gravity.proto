syntax = "proto3";

import "enum_e_gravitational_type.proto";

package zproto;

message BuffEffectLogicGravity {
	EGravitationalType type = 1 [json_name = "type"];
	float strength = 2 [json_name = "strength"];
	float strengthLow = 3 [json_name = "strengthLow"];
	float internalRadius = 4 [json_name = "internalRadius"];
	float externalRadius = 5 [json_name = "externalRadius"];
	int32 entityType = 6 [json_name = "entityType"];
	int32 campTargetType = 7 [json_name = "campTargetType"];
	bool isImpactHover = 8 [json_name = "isImpactHover"];
	bool isUseWeightFactor = 9 [json_name = "isUseWeightFactor"];
}
