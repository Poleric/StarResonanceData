syntax = "proto3";

import "table_basic.proto";

package bokura;

message DungeonsTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	mlstring Content = 783 [json_name = "Content"];
	int32 FunctionID = 850 [json_name = "FunctionID"];
	int32 PlayType = 199 [json_name = "PlayType"];
	int32 SceneID = 751 [json_name = "SceneID"];
	int_table Condition = 1634 [json_name = "Condition"];
	int_array LimitedNum = 1856 [json_name = "LimitedNum"];
	int_array ItemConsume = 1717 [json_name = "ItemConsume"];
	int_array DungeonsLimit = 949 [json_name = "DungeonsLimit"];
	int32 KickTime = 1615 [json_name = "KickTime"];
	int32 EndTime = 173 [json_name = "EndTime"];
	int32 MonsterGS = 537 [json_name = "MonsterGS"];
	int32 ShowResultHudType = 794 [json_name = "ShowResultHudType"];
	vector3 ResultCurscenePos = 1488 [json_name = "ResultCurscenePos"];
	int_array ExploreConfig = 957 [json_name = "ExploreConfig"];
	int_table ExploreAward = 1402 [json_name = "ExploreAward"];
	int32 HideQuest = 539 [json_name = "HideQuest"];
	int_table DungeonTarget = 614 [json_name = "DungeonTarget"];
	int_array FirstPassAward = 890 [json_name = "FirstPassAward"];
	int_array PassAward = 1175 [json_name = "PassAward"];
	int32 CountLimit = 1222 [json_name = "CountLimit"];
	mlstring FailText = 954 [json_name = "FailText"];
	int32 DisableTransport = 758 [json_name = "DisableTransport"];
	int32 ActiveStateTime = 813 [json_name = "ActiveStateTime"];
	int32 ReadyStateTime = 369 [json_name = "ReadyStateTime"];
	int32 PlayingStateTime = 550 [json_name = "PlayingStateTime"];
	int32 SettlementStateTime = 737 [json_name = "SettlementStateTime"];
	int32 ExitTransferType = 1080 [json_name = "ExitTransferType"];
	int_array Affix = 1436 [json_name = "Affix"];
	int32 AffixPool = 870 [json_name = "AffixPool"];
	bool AttrGrowRangeBuff = 683 [json_name = "AttrGrowRangeBuff"];
	int32 DungeonsAttrGrowRange = 1802 [json_name = "DungeonsAttrGrowRange"];
}

message DungeonsTableMgr {
	map<int32, DungeonsTableBase> datas = 1 [json_name = "datas"];
}
