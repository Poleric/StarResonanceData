syntax = "proto3";

import "table_basic.proto";

package bokura;

message TeamTargetTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Name = 439 [json_name = "Name"];
	bool HasFatherType = 1360 [json_name = "HasFatherType"];
	int32 BelongType = 1416 [json_name = "BelongType"];
	string TimeCycle = 647 [json_name = "TimeCycle"];
	string Time = 601 [json_name = "Time"];
	int32 FunctionID = 850 [json_name = "FunctionID"];
	int32 RelativeDungeonId = 1344 [json_name = "RelativeDungeonId"];
	int32 MemberCountStopMatch = 326 [json_name = "MemberCountStopMatch"];
	int32 Sort = 1643 [json_name = "Sort"];
	string Icon = 1153 [json_name = "Icon"];
}

message TeamTargetTableMgr {
	map<int32, TeamTargetTableBase> datas = 1 [json_name = "datas"];
}
