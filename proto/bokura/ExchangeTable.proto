syntax = "proto3";

import "table_basic.proto";

package bokura;

message ExchangeTableBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring ShopName = 1379 [json_name = "ShopName"];
	int32 SystemId = 518 [json_name = "SystemId"];
	string Npc = 854 [json_name = "Npc"];
	int32 ShowType = 1131 [json_name = "ShowType"];
	string CurrencyDisplay = 1022 [json_name = "CurrencyDisplay"];
}

message ExchangeTableMgr {
	map<int32, ExchangeTableBase> datas = 1 [json_name = "datas"];
}
