syntax = "proto3";

import "stru_friendliness_exp_level.proto";

package zproto;

message NotifyFriendlinessExpLvRequest {
	repeated FriendlinessExpLevel changeList = 1 [json_name = "changeList"];
	int32 totalLevel = 2 [json_name = "totalLevel"];
	int32 totalExp = 3 [json_name = "totalExp"];
	int32 todayTotalAddExps = 4 [json_name = "todayTotalAddExps"];
	int64 updateTimeStamp = 5 [json_name = "updateTimeStamp"];
}
