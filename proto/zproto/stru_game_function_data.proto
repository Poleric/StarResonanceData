syntax = "proto3";

import "stru_function_time_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message GameFunctionData {
	uint32 Id = 1 [json_name = "Id"];
	bool state = 2 [json_name = "state"];
	uint32 productId = 3 [json_name = "productId"];
	map<uint32, FunctionTimeData> functionTimes = 4 [json_name = "functionTimes"];
}
