syntax = "proto3";

package bokura;

message PlotCharactersTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string PlotCharactersName = 988 [json_name = "PlotCharactersName"];
	string PlotCharactersGender = 342 [json_name = "PlotCharactersGender"];
	string PlotCharactersAge = 1071 [json_name = "PlotCharactersAge"];
	string PlotCharactersContent = 1541 [json_name = "PlotCharactersContent"];
}

message PlotCharactersTableMgr {
	map<int32, PlotCharactersTableBase> datas = 1 [json_name = "datas"];
}
