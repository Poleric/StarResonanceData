syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_union_e_screen_info.proto";

package zproto;

message GetUnionEScreenListReply {
	repeated UnionEScreenInfo eScreenList = 1 [json_name = "eScreenList"];
	int32 curSetTimes = 2 [json_name = "curSetTimes"];
	int32 maxSetTimes = 3 [json_name = "maxSetTimes"];
	EErrorCode errCode = 4 [json_name = "errCode"];
}
