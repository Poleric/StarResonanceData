syntax = "proto3";

import "table_basic.proto";

package bokura;

message BulletRunTableBase {
	int64 Id = 1463 [json_name = "Id"];
	int32 MotionType = 1988 [json_name = "MotionType"];
	float StartSpeed = 475 [json_name = "StartSpeed"];
	float AcceleratedSpeed = 1871 [json_name = "AcceleratedSpeed"];
	float MaxSpeed = 818 [json_name = "MaxSpeed"];
	int32 DirectionType = 956 [json_name = "DirectionType"];
	bool IsFollowTarget = 1689 [json_name = "IsFollowTarget"];
	float MaxFollowAngle = 221 [json_name = "MaxFollowAngle"];
	float ExStartSpeed = 1374 [json_name = "ExStartSpeed"];
	float ExAcceleratedSpeed = 686 [json_name = "ExAcceleratedSpeed"];
	float ExMaxSpeed = 625 [json_name = "ExMaxSpeed"];
	string CurvePath = 35 [json_name = "CurvePath"];
	int64 CurveId = 431 [json_name = "CurveId"];
	bool IsRandomRadian = 314 [json_name = "IsRandomRadian"];
	float RandomPosTop = 441 [json_name = "RandomPosTop"];
	float RandomPosBottom = 417 [json_name = "RandomPosBottom"];
	float RandomPosLeft = 1923 [json_name = "RandomPosLeft"];
	float RandomPosRight = 463 [json_name = "RandomPosRight"];
	int32 FollowType = 1184 [json_name = "FollowType"];
	vector3 OffsetPos = 1569 [json_name = "OffsetPos"];
	float OriginalDir = 964 [json_name = "OriginalDir"];
	float MinZoom = 1209 [json_name = "MinZoom"];
	float MaxZoom = 1411 [json_name = "MaxZoom"];
	float ZoomSpeed = 583 [json_name = "ZoomSpeed"];
	bool ZoomIsLoop = 832 [json_name = "ZoomIsLoop"];
	int32 FollowConfigId = 684 [json_name = "FollowConfigId"];
	bool CheckObstacle = 934 [json_name = "CheckObstacle"];
	bool IsStand = 1391 [json_name = "IsStand"];
	bool IsLockTarget = 804 [json_name = "IsLockTarget"];
	bool IsCanDodge = 394 [json_name = "IsCanDodge"];
}

message BulletRunTableMgr {
	map<int64, BulletRunTableBase> datas = 1 [json_name = "datas"];
}
