syntax = "proto3";

import "enum_e_error_code.proto";
import "enum_e_platform_func_type.proto";
import "stru_image_cos_key.proto";
import "stru_tmp_token_result.proto";

package zproto;

message GetPhotoTokenNtfRequest {
	EErrorCode errCode = 2 [json_name = "errCode"];
	TmpTokenResult result = 3 [json_name = "result"];
	repeated ImageCosKey cosKeys = 4 [json_name = "cosKeys"];
	EPlatformFuncType funcType = 5 [json_name = "funcType"];
}
