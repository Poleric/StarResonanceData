	int32 TypeGroup = 887 [json_name = "TypeGroup"];
	mlstring MainTitle = 132 [json_name = "MainTitle"];
	int32 HelpGroup = 556 [json_name = "HelpGroup"];
	mlstring GroupName = 581 [json_name = "GroupName"];
	mlstring Title = 695 [json_name = "Title"];
	mlstring_array Content = 783 [json_name = "Content"];
