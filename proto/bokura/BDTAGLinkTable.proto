syntax = "proto3";

import "table_basic.proto";

package bokura;

message BDTAGLinkTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Note = 453 [json_name = "Note"];
	int32 NoteType = 256 [json_name = "NoteType"];
	int32 FindType = 830 [json_name = "FindType"];
	string FindBody = 1554 [json_name = "FindBody"];
	string_table FindConditions = 1892 [json_name = "FindConditions"];
	string TargetPara = 1655 [json_name = "TargetPara"];
	int32 SkillLevelType = 1660 [json_name = "SkillLevelType"];
	int32 TargetNodeType = 1957 [json_name = "TargetNodeType"];
}

message BDTAGLinkTableMgr {
	map<int32, BDTAGLinkTableBase> datas = 1 [json_name = "datas"];
}
