syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_mem_union_activity.proto";
import "stru_union_activity.proto";
import "stru_union_target_info.proto";

package zproto;

message GetUnionActivityInfoReply {
	UnionActivity unionActivity = 1 [json_name = "unionActivity"];
	MemUnionActivity selfActivity = 2 [json_name = "selfActivity"];
	repeated UnionTargetInfo unionTarget = 3 [json_name = "unionTarget"];
	repeated int32 receivedPointAwardIds = 4 [json_name = "receivedPointAwardIds"];
	EErrorCode errCode = 5 [json_name = "errCode"];
}
