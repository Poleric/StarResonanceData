syntax = "proto3";

import "enum_e_body_size.proto";
import "stru_dirty_mask.proto";

package zproto;

message BasicData {
	int64 charID = 1 [json_name = "charID"];
	int64 showId = 2 [json_name = "showId"];
	string name = 3 [json_name = "name"];
	int32 gender = 4 [json_name = "gender"];
	EBodySize bodySize = 5 [json_name = "bodySize"];
	int32 level = 6 [json_name = "level"];
	int32 sceneId = 7 [json_name = "sceneId"];
	repeated int32 personalState = 8 [json_name = "personalState"];
	int64 offlineTime = 9 [json_name = "offlineTime"];
	string sceneGuid = 10 [json_name = "sceneGuid"];
	int64 createTime = 11 [json_name = "createTime"];
	uint32 curTalentPoolId = 12 [json_name = "curTalentPoolId"];
	uint32 botAiId = 13 [json_name = "botAiId"];
	int32 registerChannel = 14 [json_name = "registerChannel"];
	uint64 charState = 15 [json_name = "charState"];
	int64 onlineTime = 16 [json_name = "onlineTime"];
	int64 sumSaveDiamond = 17 [json_name = "sumSaveDiamond"];
	bool isNewbie = 18 [json_name = "isNewbie"];
	int32 seasonLevel = 19 [json_name = "seasonLevel"];
	bool isBackflow = 20 [json_name = "isBackflow"];
}
