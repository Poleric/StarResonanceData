syntax = "proto3";

import "table_basic.proto";

package bokura;

message BulletTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	float Start = 678 [json_name = "Start"];
	float Duration = 544 [json_name = "Duration"];
	int32 ModelID = 2011 [json_name = "ModelID"];
	int32 BoomCount = 1236 [json_name = "BoomCount"];
	int32 BoomInterval = 1754 [json_name = "BoomInterval"];
	int32 DamageInterval = 1760 [json_name = "DamageInterval"];
	int64 BulletAttrId = 1786 [json_name = "BulletAttrId"];
	int_array Tags = 232 [json_name = "Tags"];
	int32 DeadShowStageId = 2044 [json_name = "DeadShowStageId"];
	int32 BulletCount = 1315 [json_name = "BulletCount"];
	vector2 DamageWeight = 1615 [json_name = "DamageWeight"];
	int32 DamageWeightType = 1350 [json_name = "DamageWeightType"];
	bool FakeBullet = 1566 [json_name = "FakeBullet"];
}

message BulletTableMgr {
	map<int32, BulletTableBase> datas = 1 [json_name = "datas"];
}
