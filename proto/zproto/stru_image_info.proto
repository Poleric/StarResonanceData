syntax = "proto3";

import "enum_e_picture_type.proto";
import "stru_dirty_mask.proto";

package zproto;

message ImageInfo {
	EPictureType type = 1 [json_name = "type"];
	uint32 size = 2 [json_name = "size"];
	uint32 version = 3 [json_name = "version"];
	string cosUrl = 4 [json_name = "cosUrl"];
	string extraInfo = 5 [json_name = "extraInfo"];
	uint32 reviewStartTime = 6 [json_name = "reviewStartTime"];
}
