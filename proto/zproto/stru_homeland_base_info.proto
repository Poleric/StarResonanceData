syntax = "proto3";

import "stru_community_transfer.proto";
import "stru_home_land_clutter_generation_record.proto";
import "stru_home_land_clutter_info.proto";
import "stru_home_land_item_instance.proto";
import "stru_home_land_sell_shop_info.proto";
import "stru_homeland_visit_info.proto";

package zproto;

message HomelandBaseInfo {
	HomelandVisitInfo visitInfo = 1 [json_name = "visitInfo"];
	int64 exp = 2 [json_name = "exp"];
	int64 homeResource = 3 [json_name = "homeResource"];
	int64 lastsubtractcleanlinesstime = 4 [json_name = "lastsubtractcleanlinesstime"];
	HomeLandClutterInfo homeLandClutter = 5 [json_name = "homeLandClutter"];
	HomeLandClutterGenerationRecord homeLandClutterGenerationRecord = 6 [json_name = "homeLandClutterGenerationRecord"];
	HomeLandSellShopInfo homeLandSellShopInfo = 7 [json_name = "homeLandSellShopInfo"];
	map<int64, HomeLandItemInstance> items = 8 [json_name = "items"];
	map<int64, int64> slots = 9 [json_name = "slots"];
	map<int64, int64> itemToSlot = 10 [json_name = "itemToSlot"];
	int64 Capacity = 11 [json_name = "Capacity"];
	int64 UsedSlots = 12 [json_name = "UsedSlots"];
	string checkInContent = 13 [json_name = "checkInContent"];
	CommunityTransfer transferCommunity = 14 [json_name = "transferCommunity"];
	repeated int32 innerFinishTasks = 15 [json_name = "innerFinishTasks"];
	repeated int32 outerFinishTasks = 16 [json_name = "outerFinishTasks"];
}
