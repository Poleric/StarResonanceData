syntax = "proto3";

import "table_basic.proto";

package bokura;

message ModTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string ModPic = 197 [json_name = "ModPic"];
	int32 ModLvl = 395 [json_name = "ModLvl"];
	int32 EffectType = 527 [json_name = "EffectType"];
	int32 EffectConfig = 110 [json_name = "EffectConfig"];
	int_array EffectParameter = 761 [json_name = "EffectParameter"];
	int_array TagId = 1054 [json_name = "TagId"];
}

message ModTableMgr {
	map<int32, ModTableBase> datas = 1 [json_name = "datas"];
}
