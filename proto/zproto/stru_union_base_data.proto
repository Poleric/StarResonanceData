syntax = "proto3";

import "stru_photo_graph_show.proto";

package zproto;

message UnionBaseData {
	int64 Id = 1 [json_name = "Id"];
	repeated uint32 Icon = 2 [json_name = "Icon"];
	string Name = 3 [json_name = "Name"];
	uint32 level = 4 [json_name = "level"];
	uint32 num = 5 [json_name = "num"];
	uint32 maxNum = 6 [json_name = "maxNum"];
	repeated uint32 tags = 7 [json_name = "tags"];
	string declaration = 8 [json_name = "declaration"];
	int64 presidentId = 9 [json_name = "presidentId"];
	uint32 onlineNum = 10 [json_name = "onlineNum"];
	string slogan = 11 [json_name = "slogan"];
	PhotoGraphShow coverPhotoInfo = 12 [json_name = "coverPhotoInfo"];
	uint32 coverPhotoId = 13 [json_name = "coverPhotoId"];
}
