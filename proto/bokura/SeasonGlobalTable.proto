syntax = "proto3";

import "table_basic.proto";

package bokura;

message SeasonGlobalTableBase {
	int32 SeasonId = 1669 [json_name = "SeasonId"];
	mlstring SeasonName = 1905 [json_name = "SeasonName"];
	int32 SeasonTimeId = 1735 [json_name = "SeasonTimeId"];
	int32 MinEquipLevel = 1395 [json_name = "MinEquipLevel"];
	int32 MaxEquipLevel = 507 [json_name = "MaxEquipLevel"];
	int32 MaxWeaponLevel = 1229 [json_name = "MaxWeaponLevel"];
	int32 BattlePassCardId = 635 [json_name = "BattlePassCardId"];
}

message SeasonGlobalTableMgr {
	map<int32, SeasonGlobalTableBase> datas = 1 [json_name = "datas"];
}
