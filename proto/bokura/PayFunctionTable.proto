syntax = "proto3";

import "table_basic.proto";

package bokura;

message PayFunctionTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int_array PaymentId = 884 [json_name = "PaymentId"];
	mlstring Name = 439 [json_name = "Name"];
	string Desc = 1953 [json_name = "Desc"];
	int32 ShowType = 1131 [json_name = "ShowType"];
	string Icon = 1153 [json_name = "Icon"];
	int32 Sort = 1643 [json_name = "Sort"];
	int_table Label = 432 [json_name = "Label"];
	int32 IsSale = 1626 [json_name = "IsSale"];
}

message PayFunctionTableMgr {
	map<int32, PayFunctionTableBase> datas = 1 [json_name = "datas"];
}
