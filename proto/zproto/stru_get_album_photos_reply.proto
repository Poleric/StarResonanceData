syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_photo_graph_show.proto";

package zproto;

message GetAlbumPhotosReply {
	int64 charId = 3 [json_name = "charId"];
	uint32 albumId = 4 [json_name = "albumId"];
	repeated PhotoGraphShow photoGraphs = 5 [json_name = "photoGraphs"];
	EErrorCode errCode = 6 [json_name = "errCode"];
}
