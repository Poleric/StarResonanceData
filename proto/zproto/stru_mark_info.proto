syntax = "proto3";

import "stru_mark_position.proto";
import "stru_dirty_mask.proto";

package zproto;

message MarkInfo {
	int64 tagId = 1 [json_name = "tagId"];
	string title = 2 [json_name = "title"];
	string content = 3 [json_name = "content"];
	uint32 iconId = 4 [json_name = "iconId"];
	MarkPosition position = 5 [json_name = "position"];
	int32 mapLayerId = 6 [json_name = "mapLayerId"];
}
