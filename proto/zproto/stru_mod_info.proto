syntax = "proto3";

import "stru_mod_part_upgrade_record.proto";
import "stru_dirty_mask.proto";

package zproto;

message ModInfo {
	repeated int32 partIds = 1 [json_name = "partIds"];
	repeated ModPartUpgradeRecord upgradeRecords = 2 [json_name = "upgradeRecords"];
	int32 successRate = 3 [json_name = "successRate"];
	repeated int32 initLinkNums = 4 [json_name = "initLinkNums"];
}
