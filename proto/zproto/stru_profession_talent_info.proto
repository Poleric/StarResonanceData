syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message ProfessionTalentInfo {
	uint32 usedTalentPoints = 1 [json_name = "usedTalentPoints"];
	repeated uint32 talentNodeIds = 2 [json_name = "talentNodeIds"];
	int32 talentStageCfgId = 4 [json_name = "talentStageCfgId"];
	int32 talentIlegalResetCount = 5 [json_name = "talentIlegalResetCount"];
	int32 usedAttackMark = 6 [json_name = "usedAttackMark"];
	int32 usedGuardMark = 7 [json_name = "usedGuardMark"];
	int32 usedHealMark = 8 [json_name = "usedHealMark"];
}
