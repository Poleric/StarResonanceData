syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message PivotInfo {
	int32 id = 1 [json_name = "id"];
	repeated int32 breakPoint = 2 [json_name = "breakPoint"];
	repeated int32 rewardStage = 3 [json_name = "rewardStage"];
	int32 rewardFullState = 4 [json_name = "rewardFullState"];
}
