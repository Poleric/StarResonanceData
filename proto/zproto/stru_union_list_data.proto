syntax = "proto3";

import "stru_union_base_data.proto";
import "stru_user_summary_data.proto";

package zproto;

message UnionListData {
	UnionBaseData baseInfo = 1 [json_name = "baseInfo"];
	bool isReq = 2 [json_name = "isReq"];
	UserSummaryData presidentInfo = 3 [json_name = "presidentInfo"];
	bool autoPass = 4 [json_name = "autoPass"];
}
