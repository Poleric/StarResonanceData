syntax = "proto3";

import "table_basic.proto";

package bokura;

message BDTAGRootTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	int32 RootType = 1799 [json_name = "RootType"];
	int32 RootTypeId = 163 [json_name = "RootTypeId"];
	int32 SkillLevel = 1667 [json_name = "SkillLevel"];
	string_array TagPath = 488 [json_name = "TagPath"];
}

message BDTAGRootTableMgr {
	map<int32, BDTAGRootTableBase> datas = 1 [json_name = "datas"];
}
