syntax = "proto3";

import "table_basic.proto";

package bokura;

message ChatBubbleBase {
	int32 Id = 1463 [json_name = "Id"];
	mlstring Content = 783 [json_name = "Content"];
	int32 PlotCharactersId = 1282 [json_name = "PlotCharactersId"];
}

message ChatBubbleMgr {
	map<int32, ChatBubbleBase> datas = 1 [json_name = "datas"];
}
