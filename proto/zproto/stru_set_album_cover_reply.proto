syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_image_info.proto";

package zproto;

message SetAlbumCoverReply {
	uint32 albumId = 3 [json_name = "albumId"];
	uint32 coverPhotoId = 4 [json_name = "coverPhotoId"];
	ImageInfo coverThumbnailInfo = 5 [json_name = "coverThumbnailInfo"];
	EErrorCode errCode = 6 [json_name = "errCode"];
}
