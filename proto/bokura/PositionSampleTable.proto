syntax = "proto3";

import "table_basic.proto";

package bokura;

message PositionSampleTableBase {
	int64 Id = 1463 [json_name = "Id"];
	string Name = 439 [json_name = "Name"];
	number_table SampleInfo = 1926 [json_name = "SampleInfo"];
	int32 HasChangeFlag = 1764 [json_name = "HasChangeFlag"];
}

message PositionSampleTableMgr {
	map<int64, PositionSampleTableBase> datas = 1 [json_name = "datas"];
}
