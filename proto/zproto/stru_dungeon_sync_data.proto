package zproto;

message DungeonSyncData {
	int64 sceneUuid = 1 [json_name = "sceneUuid"];
	DungeonFlowInfo flowInfo = 2 [json_name = "flowInfo"];
	DungeonTitle title = 3 [json_name = "title"];
	DungeonTarget target = 4 [json_name = "target"];
	DungeonDamage damage = 5 [json_name = "damage"];
	DungeonVote vote = 6 [json_name = "vote"];
	DungeonSettlement settlement = 7 [json_name = "settlement"];
	DungeonPioneer DungeonPioneer = 8 [json_name = "DungeonPioneer"];
	DungeonPlanetMemoryRoom planetRoomInfo = 9 [json_name = "planetRoomInfo"];
	DungeonVar dungeonVar = 10 [json_name = "dungeonVar"];
	DungeonRankList dungeonRank = 11 [json_name = "dungeonRank"];
	DungeonAffixData dungeonAffixData = 12 [json_name = "dungeonAffixData"];
	DungeonEvent dungeonEvent = 13 [json_name = "dungeonEvent"];
	DungeonScore dungeonScore = 14 [json_name = "dungeonScore"];
	DungeonTimerInfo timerInfo = 15 [json_name = "timerInfo"];
	DungeonHeroKeyInfo heroKey = 16 [json_name = "heroKey"];
	DungeonUnionInfo dungeonUnionInfo = 17 [json_name = "dungeonUnionInfo"];
	DungeonPlayerList dungeonPlayerList = 18 [json_name = "dungeonPlayerList"];
	DungeonReviveInfo reviveInfo = 19 [json_name = "reviveInfo"];
	DungeonRandomEntityConfigIdInfo randomEntityConfigIdInfo = 20 [json_name = "randomEntityConfigIdInfo"];
	DungeonSceneInfo dungeonSceneInfo = 21 [json_name = "dungeonSceneInfo"];
	DungeonVarAll dungeonVarAll = 22 [json_name = "dungeonVarAll"];
	DungeonRaidInfo dungeonRaidInfo = 23 [json_name = "dungeonRaidInfo"];
	DungeonAreaInfo dungeonAreaInfo = 24 [json_name = "dungeonAreaInfo"];
	DungeonPhaseData dungeonPhaseData = 25 [json_name = "dungeonPhaseData"];
	DungeonHideSeekData dungeonHideSeekData = 26 [json_name = "dungeonHideSeekData"];
	EErrorCode errCode = 27 [json_name = "errCode"];
}
