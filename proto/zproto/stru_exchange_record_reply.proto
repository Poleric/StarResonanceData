syntax = "proto3";

import "enum_e_error_code.proto";
import "stru_exchange_record_item_data.proto";

package zproto;

message ExchangeRecordReply {
	repeated ExchangeRecordItemData buyRecord = 2 [json_name = "buyRecord"];
	repeated ExchangeRecordItemData sellRecord = 3 [json_name = "sellRecord"];
	EErrorCode errCode = 4 [json_name = "errCode"];
}
