syntax = "proto3";

import "stru_investigate_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message InvestigateList {
	map<uint32, InvestigateData> investigateMap = 1 [json_name = "investigateMap"];
	map<uint32, bool> compInvestigateMap = 2 [json_name = "compInvestigateMap"];
	repeated uint32 compReasoningMap = 3 [json_name = "compReasoningMap"];
}
