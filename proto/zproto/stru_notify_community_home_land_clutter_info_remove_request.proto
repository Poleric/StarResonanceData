syntax = "proto3";

import "stru_clutter.proto";

package zproto;

message NotifyCommunityHomeLandClutterInfoRemoveRequest {
	int64 communityId = 1 [json_name = "communityId"];
	int64 homelandId = 2 [json_name = "homelandId"];
	map<int64, Clutter> removeHomeLandClutter = 3 [json_name = "removeHomeLandClutter"];
}
