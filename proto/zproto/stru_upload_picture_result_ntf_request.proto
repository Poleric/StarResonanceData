syntax = "proto3";

import "enum_e_error_code.proto";
import "enum_e_picture_type.proto";
import "stru_picture_info.proto";

package zproto;

message UploadPictureResultNtfRequest {
	EErrorCode errCode = 2 [json_name = "errCode"];
	EPictureType pictureType = 3 [json_name = "pictureType"];
	PictureInfo pictureInfo = 4 [json_name = "pictureInfo"];
}
