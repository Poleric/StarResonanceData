syntax = "proto3";

import "enum_e_homeland_lamplight_state.proto";

package zproto;

message HomelandSwitchLamplightRequest {
	int64 structureUuid = 1 [json_name = "structureUuid"];
	EHomelandLamplightState lamplightState = 2 [json_name = "lamplightState"];
	bool isOuter = 3 [json_name = "isOuter"];
}
