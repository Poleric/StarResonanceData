syntax = "proto3";

message mlstring {
	int64 id = 1 [json_name = "id"];
}

message mlstring_array {
	repeated .mlstring array = 1 [json_name = "array"];
}

message mlstring_table {
	repeated .mlstring_array array = 1 [json_name = "array"];
}

message string_array {
	repeated string array = 1 [json_name = "array"];
}

message string_table {
	repeated .string_array array = 1 [json_name = "array"];
}

message int_array {
	repeated int32 array = 1 [json_name = "array", packed = true];
}

message int64_array {
	repeated int64 array = 1 [json_name = "array", packed = true];
}

message int_table {
	repeated .int_array array = 1 [json_name = "array"];
}

message int64_table {
	repeated .int64_array array = 1 [json_name = "array"];
}

message number_array {
	repeated float array = 1 [json_name = "array", packed = true];
}

message number_table {
	repeated .number_array array = 1 [json_name = "array"];
}

message string_index {
	map<int64, string> index = 1 [json_name = "index"];
}

message vector2 {
	float X = 1 [json_name = "X"];
	float Y = 2 [json_name = "Y"];
}

message vector3 {
	float X = 1 [json_name = "X"];
	float Y = 2 [json_name = "Y"];
	float Z = 3 [json_name = "Z"];
}

message vector2_array {
	repeated .vector2 array = 1 [json_name = "array"];
}

message vector3_array {
	repeated .vector3 array = 1 [json_name = "array"];
}

message vector2_table {
	repeated .vector2_array array = 1 [json_name = "array"];
}

message vector3_table {
	repeated .vector3_array array = 1 [json_name = "array"];
}
