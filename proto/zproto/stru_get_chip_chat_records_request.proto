syntax = "proto3";

import "enum_chit_chat_channel_type.proto";

package zproto;

message GetChipChatRecordsRequest {
	ChitChatChannelType channelType = 2 [json_name = "channelType"];
	int64 descMsgId = 3 [json_name = "descMsgId"];
	uint32 recordNum = 4 [json_name = "recordNum"];
	int64 targetId = 5 [json_name = "targetId"];
}
