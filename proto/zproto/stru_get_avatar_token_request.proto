syntax = "proto3";

import "enum_e_picture_type.proto";
import "stru_picture_verify.proto";

package zproto;

message GetAvatarTokenRequest {
	PictureVerify verifyInfo = 2 [json_name = "verifyInfo"];
	EPictureType pictureType = 3 [json_name = "pictureType"];
	int32 pictureId = 4 [json_name = "pictureId"];
	string pictureName = 5 [json_name = "pictureName"];
}
