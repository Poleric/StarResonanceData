syntax = "proto3";

package bokura;

message FacialExpressionTableBase {
	int32 Id = 1463 [json_name = "Id"];
	string FacialName = 1569 [json_name = "FacialName"];
	string Remark = 1391 [json_name = "Remark"];
	string Path = 172 [json_name = "Path"];
}

message FacialExpressionTableMgr {
	map<int32, FacialExpressionTableBase> datas = 1 [json_name = "datas"];
}
