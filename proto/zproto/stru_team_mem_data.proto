syntax = "proto3";

import "stru_team_member_social_data.proto";
import "stru_dirty_mask.proto";

package zproto;

message TeamMemData {
	int64 charId = 1 [json_name = "charId"];
	uint32 enterTime = 2 [json_name = "enterTime"];
	int32 callStatus = 3 [json_name = "callStatus"];
	int32 talentId = 4 [json_name = "talentId"];
	int32 onlineStatus = 5 [json_name = "onlineStatus"];
	int32 sceneId = 6 [json_name = "sceneId"];
	bool voiceIsOpen = 7 [json_name = "voiceIsOpen"];
	int32 groupId = 8 [json_name = "groupId"];
	TeamMemberSocialData socialData = 9 [json_name = "socialData"];
}
