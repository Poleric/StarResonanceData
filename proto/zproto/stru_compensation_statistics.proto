syntax = "proto3";

import "stru_compensation_season_statistics.proto";
import "stru_dirty_mask.proto";

package zproto;

message CompensationStatistics {
	map<uint32, CompensationSeasonStatistics> seasonData = 1 [json_name = "seasonData"];
	uint32 lastSeasonId = 2 [json_name = "lastSeasonId"];
	int64 curPoint = 3 [json_name = "curPoint"];
	int64 maxPoint = 4 [json_name = "maxPoint"];
	map<uint32, int32> lastWeek = 5 [json_name = "lastWeek"];
}
