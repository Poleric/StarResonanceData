syntax = "proto3";

import "table_basic.proto";

package bokura;

message SkillLevelTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int_table Cost = 1056 [json_name = "Cost"];
	int_table ExtraCost = 1788 [json_name = "ExtraCost"];
}

message SkillLevelTableMgr {
	map<int32, SkillLevelTableBase> datas = 1 [json_name = "datas"];
}
