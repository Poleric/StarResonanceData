syntax = "proto3";

import "table_basic.proto";

package bokura;

message ActivationTableBase {
	int32 Id = 1463 [json_name = "Id"];
	int32 TargetType = 736 [json_name = "TargetType"];
	int32 SceneId = 1506 [json_name = "SceneId"];
	int_array Param = 1207 [json_name = "Param"];
	int32 Activation = 1705 [json_name = "Activation"];
	mlstring TargetDes = 1279 [json_name = "TargetDes"];
}

message ActivationTableMgr {
	map<int32, ActivationTableBase> datas = 1 [json_name = "datas"];
}
