syntax = "proto3";

import "enum_e_team_member_type.proto";
import "stru_user_summary_data.proto";

package zproto;

message NotifyInvitationRequest {
	int64 teamid = 1 [json_name = "teamid"];
	uint32 targetId = 2 [json_name = "targetId"];
	uint32 teamNum = 3 [json_name = "teamNum"];
	UserSummaryData inviteMemData = 4 [json_name = "inviteMemData"];
	ETeamMemberType teamMemberType = 5 [json_name = "teamMemberType"];
}
