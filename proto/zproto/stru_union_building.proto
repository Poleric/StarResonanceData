syntax = "proto3";

import "stru_dirty_mask.proto";

package zproto;

message UnionBuilding {
	int32 buildingId = 1 [json_name = "buildingId"];
	int32 buildingLevel = 2 [json_name = "buildingLevel"];
	int64 upgradeFinishTime = 3 [json_name = "upgradeFinishTime"];
	int64 hasSpeedUpSec = 4 [json_name = "hasSpeedUpSec"];
}
